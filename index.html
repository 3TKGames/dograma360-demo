  border: 1px solid light-dark(var(--primary-foreground), var(--foreground));
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

              &lt;p&gt;Doğrama360; müşteri, proje, ölçü, fiyat, malzeme ve üretim kayıtlarını yönetmeye yarayan yıllık lisanslı bir iş yazılımıdır.&lt;/p&gt;
              &lt;p&gt;Hesap sahibi; girdiği bilgilerin doğruluğundan, müşteri verilerini işlemek için geçerli hukuki sebebe sahip olmaktan, çalışanlarına uygun yetki vermekten ve şifresini korumaktan sorumludur.&lt;/p&gt;
              &lt;p&gt;Gereksiz özel nitelikli veya hassas veri yüklenmemeli; uygulama hukuka aykırı içerik, yetkisiz erişim ya da üçüncü kişilerin haklarını ihlal edecek biçimde kullanılmamalıdır.&lt;/p&gt;
              &lt;p&gt;Ücret, yenileme, iptal, destek, hizmet seviyesi, sorumluluk sınırları ve uyuşmazlık hükümleri ticari satıştan önce hizmet sağlayıcının resmî unvanı ve adresiyle birlikte tamamlanacaktır.&lt;/p&gt;

              &lt;p&gt;&lt;strong&gt;Toplanan hesap verileri:&lt;/strong&gt; ad soyad, e-posta, isteğe bağlı firma adı, kimlik doğrulama ve güvenlik kayıtları. Çalışma alanında kullanıcının eklediği müşteri, proje, ölçü, teklif ve üretim bilgileri de saklanır.&lt;/p&gt;
              &lt;p&gt;&lt;strong&gt;Amaçlar:&lt;/strong&gt; hesabı açmak ve güvenliğini sağlamak, hizmeti sunmak, kayıtları cihazlar arasında eşitlemek, destek vermek ve yasal yükümlülükleri yerine getirmek.&lt;/p&gt;
              &lt;p&gt;&lt;strong&gt;Hizmet sağlayıcılar:&lt;/strong&gt; kimlik doğrulama ve veritabanı için Supabase; web yayını için GitHub Pages; e-posta gönderimi için yapılandırılan e-posta sağlayıcısı kullanılabilir. Seçilen sunucu bölgesine göre veriler yurt dışına aktarılabilir.&lt;/p&gt;
              &lt;p&gt;&lt;strong&gt;Saklama ve haklar:&lt;/strong&gt; veriler hizmet ve yasal saklama ihtiyacı sürdüğü müddetçe tutulur; sonrasında silinir veya anonimleştirilir. Erişim, düzeltme, silme, aktarım ve itiraz talepleri için iletişim kanalı ticari yayından önce burada açıkça belirtilecektir.&lt;/p&gt;
              &lt;p&gt;&lt;strong&gt;Önemli:&lt;/strong&gt; Veri sorumlusunun veya hizmet sağlayıcının resmî ticari unvanı, adresi ve gizlilik iletişim bilgisi ticari yayına geçmeden önce doldurulmalıdır.&lt;/p&gt;

        return String(value).replace(/[&amp;&lt;&gt;&#x27;&quot;]/g, character =&gt; ({ &#x27;&amp;&#x27;: &#x27;&amp;amp;&#x27;, &#x27;&lt;&#x27;: &#x27;&amp;lt;&#x27;, &#x27;&gt;&#x27;: &#x27;&amp;gt;&#x27;, &quot;&#x27;&quot;: &#x27;&amp;#39;&#x27;, &#x27;&quot;&#x27;: &#x27;&amp;quot;&#x27; }[character]));
      }

      function makeId(prefix) {
        return `${prefix}-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
      }

      function automaticSystemForItem(product, materialId, requestedId = &#x27;&#x27;) {
        const application = productApplication(product);
        const matches = system =&gt; {
          const materialMatch = systemMaterials(system).includes(&#x27;all&#x27;) || systemMaterials(system).includes(materialId);
          const applicationMatch = systemApplications(system).includes(&#x27;all&#x27;) || systemApplications(system).includes(application);
          return materialMatch &amp;&amp; applicationMatch;
        };
        const requested = systems.find(system =&gt; system.id === requestedId &amp;&amp; matches(system));
        const preferred = systems.find(system =&gt; system.id === preferredSystemIdForProduct(product) &amp;&amp; matches(system));
        return requested || preferred || systems.find(system =&gt; matches(system) &amp;&amp; !systemMaterials(system).includes(&#x27;all&#x27;)) || systems.find(matches) || systems[0];
      }

      function completeProjectItemTechnical(item, index = 0) {
        const product = products.find(entry =&gt; entry.id === item.productId) || products[0];
        const materialId = item.materialId &amp;&amp; product.materials.includes(item.materialId) ? item.materialId : product.materials[0];
        const system = automaticSystemForItem(product, materialId, item.systemId);
        const glassId = item.glassId &amp;&amp; glassLabels[item.glassId] ? item.glassId : &#x27;double&#x27;;
        const finishId = item.finishId &amp;&amp; finishLabels[item.finishId] ? item.finishId : &#x27;white&#x27;;
        const operationId = item.operationId &amp;&amp; operationLabels[item.operationId] ? item.operationId : &#x27;manual&#x27;;
        const wasIncomplete = item.measurementOnly === true || !item.systemId || !item.materialId;
        Object.assign(item, {
          measurementOnly: false,
          productId: product.id,
          productName: item.productName || product.name,
          width: Number(item.width) || 1800,
          height: Number(item.height) || 2200,
          qty: Math.max(1, Number(item.qty) || 1),
          materialId,
          material: materialTypes[materialId].label,
          systemId: system.id,
          system: system.name,
          glassId,
          glass: glassLabels[glassId],
          finishId,
          finish: finishLabels[finishId],
          operationId,
          operation: operationLabels[operationId],
          technicalSource: item.technicalSource || (wasIncomplete ? &#x27;automatic&#x27; : &#x27;selected&#x27;)
        });
        if (!Array.isArray(item.orderRows) || !item.orderRows.length || !(Number(item.total) &gt; 0)) {
          const previous = { selected: state.selected, width: state.width, height: state.height, qty: state.qty, material: state.material, systemId: state.systemId, glass: state.glass, finish: state.finish, operation: state.operation };
          try {
            state.selected = product.id;
            state.width = Number(item.width) || 1800;
            state.height = Number(item.height) || 2200;
            state.qty = item.qty;
            state.material = materialId;
            state.systemId = system.id;
            state.glass = glassId;
            state.finish = finishId;
            state.operation = operationId;
            const calc = calculate();
            item.orderRows = currentMaterialRows(calc).map(row =&gt; ({ ...row }));
            if (!(Number(item.total) &gt; 0)) item.total = calc.grandTotal;
          } finally {
            Object.assign(state, previous);
          }
        }
        return item;
      }

      function completeProjectTechnicalData(project) {
        if (!project || !Array.isArray(project.items)) return project;
        project.items.forEach((item, index) =&gt; completeProjectItemTechnical(item, index));
        refreshProjectTotals(project);
        return project;
      }

      function applyThemePreference(theme, saveWorkspace = false) {
        const value = [&#x27;system&#x27;, &#x27;light&#x27;, &#x27;dark&#x27;].includes(theme) ? theme : &#x27;system&#x27;;
        state.theme = value;
        if (value === &#x27;system&#x27;) delete document.documentElement.dataset.theme;
        else document.documentElement.dataset.theme = value;
        try { if (parent !== window) parent.postMessage({ type: &#x27;dograma360-theme&#x27;, theme: value }, &#x27;*&#x27;); } catch (error) { /* Gömülü önizlemede ana sayfa değişmeyebilir. */ }
        root.querySelectorAll(&#x27;#d360-auth-theme, #d360-theme&#x27;).forEach(select =&gt; { select.value = value; });
        try { localStorage.setItem(&#x27;dograma360-theme&#x27;, value); } catch (error) { /* Bulut kaydı kullanılacak. */ }
        if (saveWorkspace &amp;&amp; (authState.user || authState.demo)) persistData();
      }

      try {
        const savedTheme = localStorage.getItem(&#x27;dograma360-theme&#x27;);
        if ([&#x27;system&#x27;, &#x27;light&#x27;, &#x27;dark&#x27;].includes(savedTheme)) state.theme = savedTheme;
      } catch (error) { /* Tarayıcı depolaması kapalıysa cihaz ayarı kullanılır. */ }
      applyThemePreference(state.theme);

      function priceValue(code, fallback) {
        const item = priceMaterials.find(material =&gt; material.code === code);
        return item ? Number(item.price) : fallback;
      }

      function profileRate(materialId) {
        const codes = { pvc: &#x27;PVC-KANAT70&#x27;, aluCold: &#x27;ALU-50&#x27;, aluThermal: &#x27;ALU-TB75&#x27;, wood: &#x27;AHSP-LAM&#x27;, woodAlu: &#x27;AHSP-ALU&#x27;, steel: &#x27;CELIK-60&#x27;, steelThermal: &#x27;ST-TB-FRAME&#x27;, stainless: &#x27;PASLANMAZ&#x27;, fiberglass: &#x27;FRP-FRAME&#x27;, grpDoor: &#x27;GRP-FRAME&#x27;, composite: &#x27;COMP-RAIL&#x27;, glass: &#x27;CAM-TEMP&#x27; };
        return priceValue(codes[materialId], materialTypes[materialId].rate);
      }

      function glassRate(glassId) {
        const codes = { double: &#x27;CAM-ISI&#x27;, lowe: &#x27;CAM-LOWE&#x27;, triple: &#x27;CAM-3LU&#x27;, tempered: &#x27;CAM-TEMP&#x27;, laminated: &#x27;CAM-LAM&#x27;, acoustic: &#x27;CAM-AKUS&#x27;, fire: &#x27;CAM-FIRE&#x27;, panel: &#x27;PANEL-40&#x27; };
        return priceValue(codes[glassId], glassRates[glassId]);
      }

      function workspacePayload() {
        return {
          version: 10,
          customers: cloneValue(customers),
          projects: cloneValue(projects),
          teamMembers: cloneValue(teamMembers),
          systems: cloneValue(systems),
          deletedSystemIds: cloneValue(state.deletedSystemIds),
          priceMaterials: cloneValue(priceMaterials),
          pricing: { currency: state.currency, exchangeRate: state.exchangeRate, profitRate: state.profitRate, vatRate: state.vatRate },
          appearance: { theme: state.theme },
          workspace: { activeRole: state.activeRole, membershipPlan: state.membershipPlan, simpleHomeVersion: 1 },
          updatedAt: new Date().toISOString()
        };
      }

      function resetWorkspace() {
        customers.splice(0, customers.length);
        projects.splice(0, projects.length);
        teamMembers.splice(0, teamMembers.length);
        systems.splice(0, systems.length, ...cloneValue(seedWorkspace.systems));
        priceMaterials.splice(0, priceMaterials.length, ...cloneValue(seedWorkspace.priceMaterials));
        state.currency = seedWorkspace.pricing.currency;
        state.exchangeRate = seedWorkspace.pricing.exchangeRate;
        state.profitRate = seedWorkspace.pricing.profitRate;
        state.vatRate = seedWorkspace.pricing.vatRate;
        state.activeRole = seedWorkspace.workspace.activeRole;
        state.membershipPlan = seedWorkspace.workspace.membershipPlan;
        state.selectedProjectId = null;
        state.selectedCustomerId = null;
        state.measureCustomerId = &#x27;&#x27;;
        state.measureProjectId = &#x27;&#x27;;
        state.deletedSystemIds = [];
      }

      function applyWorkspace(stored) {
        resetWorkspace();
        if (!stored || typeof stored !== &#x27;object&#x27;) return;
        if (Array.isArray(stored.customers)) customers.splice(0, customers.length, ...stored.customers);
        if (Array.isArray(stored.projects)) projects.splice(0, projects.length, ...stored.projects);
        if (Array.isArray(stored.teamMembers)) teamMembers.splice(0, teamMembers.length, ...stored.teamMembers);
        state.deletedSystemIds = Array.isArray(stored.deletedSystemIds) ? [...new Set(stored.deletedSystemIds)] : [];
        if (Array.isArray(stored.systems)) {
          const savedById = new Map(stored.systems.map(system =&gt; [system.id, system]));
          const mergedSystems = seedWorkspace.systems.filter(seed =&gt; !state.deletedSystemIds.includes(seed.id)).map(seed =&gt; normalizeSystem({ ...seed, ...(savedById.get(seed.id) || {}) }));
          stored.systems.filter(system =&gt; !state.deletedSystemIds.includes(system.id) &amp;&amp; !seedWorkspace.systems.some(seed =&gt; seed.id === system.id)).forEach(system =&gt; mergedSystems.unshift(normalizeSystem(system)));
          systems.splice(0, systems.length, ...mergedSystems);
        }
        if (Array.isArray(stored.priceMaterials)) {
          const savedMaterialByCode = new Map(stored.priceMaterials.map(material =&gt; [material.code, material]));
          const mergedMaterials = seedWorkspace.priceMaterials.map(seed =&gt; ({ ...seed, ...(savedMaterialByCode.get(seed.code) || {}) }));
          stored.priceMaterials.filter(material =&gt; !seedWorkspace.priceMaterials.some(seed =&gt; seed.code === material.code)).forEach(material =&gt; mergedMaterials.unshift(material));
          priceMaterials.splice(0, priceMaterials.length, ...mergedMaterials);
        }
        if (stored.pricing) {
          state.currency = stored.pricing.currency || &#x27;TRY&#x27;;
          state.exchangeRate = Number(stored.pricing.exchangeRate) || 1;
          state.profitRate = Number(stored.pricing.profitRate) || 0;
          state.vatRate = Number(stored.pricing.vatRate) || 0;
        }
        if (stored.appearance &amp;&amp; [&#x27;system&#x27;, &#x27;light&#x27;, &#x27;dark&#x27;].includes(stored.appearance.theme)) applyThemePreference(stored.appearance.theme);
        if (stored.workspace &amp;&amp; stored.workspace.simpleHomeVersion === 1 &amp;&amp; roleDefinitions.some(role =&gt; role.id === stored.workspace.activeRole)) state.activeRole = stored.workspace.activeRole;
        if (stored.workspace &amp;&amp; membershipPlans[stored.workspace.membershipPlan]) state.membershipPlan = stored.workspace.membershipPlan;
        else if (Number(stored.version) &gt; 0) state.membershipPlan = &#x27;company&#x27;;
        customers.forEach(customer =&gt; { if (!customer.status) customer.status = &#x27;Aktif&#x27;; });
        projects.forEach(project =&gt; {
          if (!materialTypes[project.defaultMaterialId]) project.defaultMaterialId = (project.items &amp;&amp; project.items[0] &amp;&amp; project.items[0].materialId) || &#x27;pvc&#x27;;
          completeProjectTechnicalData(project);
        });
      }

      function userStorageKey(userId) {
        return userId ? `dograma360-workspace-${userId}` : &#x27;dograma360-prototype-v4&#x27;;
      }

      function setSyncStatus(message, isError = false) {
        const syncStatus = root.querySelector(&#x27;#d360-sync-status&#x27;);
        if (!syncStatus) return;
        syncStatus.classList.toggle(&#x27;text-destructive&#x27;, isError);
        syncStatus.innerHTML = `&lt;i data-lucide=&quot;${isError ? &#x27;cloud-off&#x27; : &#x27;cloud-check&#x27;}&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;${escapeHtml(message)}`;
        ensureIcons();
      }

      async function saveWorkspaceToCloud(payload) {
        if (!cloudClient || !authState.user || authState.demo) return;
        setSyncStatus(&#x27;Buluta kaydediliyor…&#x27;);
        const { error } = await cloudClient.from(&#x27;workspaces&#x27;).upsert({
          user_id: authState.user.id,
          data: payload,
          updated_at: new Date().toISOString()
        }, { onConflict: &#x27;user_id&#x27; });
        if (error) {
          setSyncStatus(&#x27;Bulut kaydı başarısız&#x27;, true);
          return;
        }
        setSyncStatus(&#x27;Tüm değişiklikler kaydedildi&#x27;);
      }

      function persistData(immediateCloud = false) {
        const payload = workspacePayload();
        try {
          localStorage.setItem(userStorageKey(authState.user &amp;&amp; authState.user.id), JSON.stringify(payload));
        } catch (error) {
          setSyncStatus(&#x27;Bu tarayıcı yerel kayda izin vermiyor&#x27;, true);
        }
        if (!cloudClient || !authState.user || authState.demo) return;
        clearTimeout(cloudSaveTimer);
        if (immediateCloud) {
          saveWorkspaceToCloud(payload);
          return;
        }
        cloudSaveTimer = setTimeout(() =&gt; { saveWorkspaceToCloud(payload); }, 450);
      }

      function readLocalWorkspace(userId) {
        try {
          localStorage.removeItem(&#x27;dograma360-prototype-v3&#x27;);
          const accountData = JSON.parse(localStorage.getItem(userStorageKey(userId)) || &#x27;null&#x27;);
          if (accountData) return { data: accountData, legacy: false };
          const legacyData = JSON.parse(localStorage.getItem(&#x27;dograma360-prototype-v4&#x27;) || &#x27;null&#x27;);
          return legacyData ? { data: legacyData, legacy: true } : { data: null, legacy: false };
        } catch (error) {
          return { data: null, legacy: false };
        }
      }

      async function restoreWorkspaceForUser(userId) {
        resetWorkspace();
        const cached = readLocalWorkspace(userId);
        if (!cloudClient || !userId) {
          if (cached.data) applyWorkspace(cached.data);
          return;
        }
        setSyncStatus(&#x27;Bulut kayıtları yükleniyor…&#x27;);
        const { data, error } = await cloudClient.from(&#x27;workspaces&#x27;).select(&#x27;data&#x27;).eq(&#x27;user_id&#x27;, userId).maybeSingle();
        if (error) {
          if (cached.data) applyWorkspace(cached.data);
          setSyncStatus(&#x27;Yerel kayıt açıldı; bulut bağlantısını kontrol edin&#x27;, true);
          return;
        }
        if (data &amp;&amp; data.data) {
          applyWorkspace(data.data);
          try { localStorage.setItem(userStorageKey(userId), JSON.stringify(data.data)); } catch (storageError) { /* no-op */ }
          setSyncStatus(&#x27;Bulut kayıtları yüklendi&#x27;);
          return;
        }
        if (cached.data) applyWorkspace(cached.data);
        await saveWorkspaceToCloud(workspacePayload());
        if (cached.legacy) {
          try { localStorage.removeItem(&#x27;dograma360-prototype-v4&#x27;); } catch (storageError) { /* no-op */ }
        }
      }

      function setAuthMessage(message, isError = false) {
        authStatus.textContent = message;
        authStatus.classList.toggle(&#x27;text-destructive&#x27;, isError);
      }

      function authErrorMessage(error) {
        const code = error &amp;&amp; (error.code || error.message || &#x27;&#x27;);
        if (/invalid_credentials|Invalid login/i.test(code)) return &#x27;E-posta veya şifre hatalı.&#x27;;
        if (/email_address_not_authorized/i.test(code)) return &#x27;Bu adrese e-posta gönderilemedi. Üretim için SMTP ayarı gereklidir.&#x27;;
        if (/already registered|user_already_exists/i.test(code)) return &#x27;Bu e-posta ile daha önce hesap açılmış.&#x27;;
        if (/rate|429/i.test(code)) return &#x27;Çok fazla deneme yapıldı. Lütfen kısa bir süre sonra tekrar deneyin.&#x27;;
        if (/expired|invalid.*otp|token/i.test(code)) return &#x27;Doğrulama bağlantısı geçersiz veya süresi dolmuş. Yeni bağlantı isteyin.&#x27;;
        return &#x27;İşlem tamamlanamadı. İnternet bağlantınızı kontrol edip tekrar deneyin.&#x27;;
      }

      function showAuthMode(mode) {
        const signIn = mode === &#x27;signin&#x27;;
        root.querySelector(&#x27;#d360-signin-form&#x27;).hidden = !signIn;
        root.querySelector(&#x27;#d360-signup-form&#x27;).hidden = signIn;
        root.querySelector(&#x27;#d360-verify-form&#x27;).hidden = true;
        root.querySelectorAll(&#x27;[data-auth-mode]&#x27;).forEach(button =&gt; {
          const active = button.dataset.authMode === mode;
          button.classList.toggle(&#x27;btn-primary&#x27;, active);
          button.setAttribute(&#x27;aria-selected&#x27;, String(active));
        });
        if (!signIn) updateSignupLegalState();
        setAuthMessage(signIn ? &#x27;E-posta ve şifrenizi girin.&#x27; : &#x27;Bilgilerinizi girin; doğrulama bağlantısını e-postanıza gönderelim.&#x27;);
      }

      function authRedirectUrl() {
        return `${globalThis.location.origin}${globalThis.location.pathname}`;
      }

      function showVerification(email) {
        authState.pendingEmail = email;
        root.querySelector(&#x27;#d360-signin-form&#x27;).hidden = true;
        root.querySelector(&#x27;#d360-signup-form&#x27;).hidden = true;
        root.querySelector(&#x27;#d360-verify-form&#x27;).hidden = false;
        root.querySelector(&#x27;#d360-verify-help&#x27;).textContent = `${email} adresine güvenli bir doğrulama bağlantısı gönderdik.`;
        setAuthMessage(&#x27;Bağlantı gönderildi. E-postanızın gereksiz klasörünü de kontrol edin.&#x27;);
      }

      function setAuthBusy(busy, message) {
        [&#x27;#d360-signin-submit&#x27;, &#x27;#d360-signup-submit&#x27;, &#x27;#d360-resend-code&#x27;].forEach(selector =&gt; {
          const button = root.querySelector(selector);
          if (button) button.disabled = busy;
        });
        if (!busy) updateSignupLegalState();
        if (message) setAuthMessage(message);
      }

      function updateSignupLegalState() {
        const termsAccepted = root.querySelector(&#x27;#d360-terms-accept&#x27;).checked;
        const privacyAcknowledged = root.querySelector(&#x27;#d360-privacy-ack&#x27;).checked;
        const submit = root.querySelector(&#x27;#d360-signup-submit&#x27;);
        const status = root.querySelector(&#x27;#d360-legal-status&#x27;);
        submit.disabled = !(termsAccepted &amp;&amp; privacyAcknowledged);
        status.textContent = termsAccepted &amp;&amp; privacyAcknowledged
          ? &#x27;Zorunlu onaylar tamamlandı. Pazarlama izni isteğe bağlıdır.&#x27;
          : &#x27;Devam etmek için Üyelik Sözleşmesi ile Aydınlatma Metni’ni onaylayın.&#x27;;
      }

      async function activateSession(session) {
        const user = session &amp;&amp; session.user;
        if (!user || authState.loadingUserId === user.id) return;
        if (authState.user &amp;&amp; authState.user.id === user.id &amp;&amp; !appShell.hidden) return;
        authState.loadingUserId = user.id;
        authState.session = session;
        authState.user = user;
        authState.demo = false;
        authScreen.hidden = true;
        appShell.hidden = false;
        const metadata = user.user_metadata || {};
        root.querySelector(&#x27;#d360-user-name&#x27;).textContent = metadata.full_name || user.email || &#x27;Kullanıcı&#x27;;
        root.querySelector(&#x27;#d360-company-name&#x27;).textContent = metadata.company_name || &#x27;Doğrama360 hesabı&#x27;;
        await restoreWorkspaceForUser(user.id);
        refreshWorkspaceViews();
        authState.loadingUserId = null;
      }

      function showSignedOut() {
        authState.session = null;
        authState.user = null;
        authState.demo = false;
        appShell.hidden = true;
        authScreen.hidden = false;
        showAuthMode(&#x27;signin&#x27;);
        ensureIcons();
      }

      function openDemoMode() {
        authState.demo = true;
        authScreen.hidden = true;
        appShell.hidden = false;
        root.querySelector(&#x27;#d360-user-name&#x27;).textContent = &#x27;Tanıtım kullanıcısı&#x27;;
        root.querySelector(&#x27;#d360-company-name&#x27;).textContent = &#x27;Yerel tanıtım hesabı&#x27;;
        const cached = readLocalWorkspace(null);
        if (cached.data) applyWorkspace(cached.data);
        refreshWorkspaceViews();
        setSyncStatus(&#x27;Yalnızca bu tarayıcıya kaydediliyor&#x27;);
      }

      function initializeAuthentication() {
        root.querySelectorAll(&#x27;#d360-auth-theme, #d360-theme&#x27;).forEach(select =&gt; {
          select.addEventListener(&#x27;change&#x27;, event =&gt; applyThemePreference(event.target.value, true));
        });
        root.querySelectorAll(&#x27;[data-auth-mode]&#x27;).forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; showAuthMode(button.dataset.authMode)));
        [&#x27;#d360-terms-accept&#x27;, &#x27;#d360-privacy-ack&#x27;].forEach(selector =&gt; {
          root.querySelector(selector).addEventListener(&#x27;change&#x27;, updateSignupLegalState);
        });
        updateSignupLegalState();
        root.querySelector(&#x27;#d360-change-email&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; showAuthMode(&#x27;signup&#x27;));
        root.querySelector(&#x27;#d360-demo-login&#x27;).addEventListener(&#x27;click&#x27;, openDemoMode);
        root.querySelector(&#x27;#d360-signin-form&#x27;).addEventListener(&#x27;submit&#x27;, async event =&gt; {
          event.preventDefault();
          if (!cloudClient) return setAuthMessage(&#x27;Bulut hesabı henüz yapılandırılmadı.&#x27;, true);
          setAuthBusy(true, &#x27;Giriş yapılıyor…&#x27;);
          const email = root.querySelector(&#x27;#d360-signin-email&#x27;).value.trim();
          const password = root.querySelector(&#x27;#d360-signin-password&#x27;).value;
          const { data, error } = await cloudClient.auth.signInWithPassword({ email, password });
          setAuthBusy(false);
          if (error) return setAuthMessage(authErrorMessage(error), true);
          await activateSession(data.session);
        });
        root.querySelector(&#x27;#d360-signup-form&#x27;).addEventListener(&#x27;submit&#x27;, async event =&gt; {
          event.preventDefault();
          if (!cloudClient) return setAuthMessage(&#x27;Bulut hesabı henüz yapılandırılmadı.&#x27;, true);
          const fullName = root.querySelector(&#x27;#d360-signup-name&#x27;).value.trim();
          const companyName = root.querySelector(&#x27;#d360-signup-company&#x27;).value.trim();
          const email = root.querySelector(&#x27;#d360-signup-email&#x27;).value.trim();
          const password = root.querySelector(&#x27;#d360-signup-password&#x27;).value;
          const confirmation = root.querySelector(&#x27;#d360-signup-password-confirm&#x27;).value;
          const termsAccepted = root.querySelector(&#x27;#d360-terms-accept&#x27;).checked;
          const privacyAcknowledged = root.querySelector(&#x27;#d360-privacy-ack&#x27;).checked;
          const marketingConsent = root.querySelector(&#x27;#d360-marketing-consent&#x27;).checked;
          if (password !== confirmation) return setAuthMessage(&#x27;Şifreler aynı değil.&#x27;, true);
          if (!termsAccepted || !privacyAcknowledged) return setAuthMessage(&#x27;Hesap açmak için Üyelik Sözleşmesi ve Aydınlatma Metni onaylanmalıdır.&#x27;, true);
          setAuthBusy(true, &#x27;Doğrulama bağlantısı gönderiliyor…&#x27;);
          const acceptedAt = new Date().toISOString();
          const metadata = {
            full_name: fullName,
            terms_accepted: true,
            terms_version: LEGAL_VERSIONS.terms,
            terms_accepted_at: acceptedAt,
            privacy_notice_acknowledged: true,
            privacy_notice_version: LEGAL_VERSIONS.privacy,
            privacy_notice_acknowledged_at: acceptedAt,
            marketing_consent: marketingConsent,
            marketing_consent_at: marketingConsent ? acceptedAt : null
          };
          if (companyName) metadata.company_name = companyName;
          const { data, error } = await cloudClient.auth.signUp({ email, password, options: { data: metadata, emailRedirectTo: authRedirectUrl() } });
          setAuthBusy(false);
          if (error) return setAuthMessage(authErrorMessage(error), true);
          if (data.session) return activateSession(data.session);
          showVerification(email);
        });
        root.querySelector(&#x27;#d360-resend-code&#x27;).addEventListener(&#x27;click&#x27;, async () =&gt; {
          if (!cloudClient || !authState.pendingEmail) return;
          setAuthBusy(true, &#x27;Yeni bağlantı gönderiliyor…&#x27;);
          const { error } = await cloudClient.auth.resend({ type: &#x27;signup&#x27;, email: authState.pendingEmail, options: { emailRedirectTo: authRedirectUrl() } });
          setAuthBusy(false);
          setAuthMessage(error ? authErrorMessage(error) : &#x27;Yeni bağlantı gönderildi.&#x27;, Boolean(error));
        });
        root.querySelector(&#x27;#d360-forgot-password&#x27;).addEventListener(&#x27;click&#x27;, async () =&gt; {
          if (!cloudClient) return setAuthMessage(&#x27;Bulut hesabı henüz yapılandırılmadı.&#x27;, true);
          const email = root.querySelector(&#x27;#d360-signin-email&#x27;).value.trim();
          if (!email) return setAuthMessage(&#x27;Önce e-posta adresinizi yazın.&#x27;, true);
          setAuthBusy(true, &#x27;Şifre yenileme e-postası gönderiliyor…&#x27;);
          const { error } = await cloudClient.auth.resetPasswordForEmail(email, { redirectTo: location.href.split(&#x27;#&#x27;)[0] });
          setAuthBusy(false);
          setAuthMessage(error ? authErrorMessage(error) : &#x27;Şifre yenileme e-postası gönderildi.&#x27;, Boolean(error));
        });
        root.querySelector(&#x27;#d360-logout&#x27;).addEventListener(&#x27;click&#x27;, async () =&gt; {
          clearTimeout(cloudSaveTimer);
          if (cloudClient &amp;&amp; authState.user) await cloudClient.auth.signOut();
          showSignedOut();
        });
        if (!cloudClient) {
          root.querySelector(&#x27;#d360-auth-config&#x27;).hidden = false;
          setAuthMessage(&#x27;Bulut bağlantısı kurulumu bekleniyor.&#x27;);
          return;
        }
        root.querySelector(&#x27;#d360-auth-config&#x27;).hidden = true;
        cloudClient.auth.onAuthStateChange((event, session) =&gt; {
          if (event === &#x27;SIGNED_OUT&#x27; || !session) showSignedOut();
          else setTimeout(() =&gt; { activateSession(session); }, 0);
        });
        cloudClient.auth.getSession().then(({ data, error }) =&gt; {
          if (error || !data.session) showSignedOut();
          else activateSession(data.session);
        });
      }

      function clamp(value, min, max) {
        const numberValue = Number(value);
        if (!Number.isFinite(numberValue)) return min;
        return Math.min(max, Math.max(min, numberValue));
      }

      function ensureIcons() {
        if (globalThis.lucide &amp;&amp; typeof globalThis.lucide.createIcons === &#x27;function&#x27;) {
          globalThis.lucide.createIcons({ attrs: { width: 16, height: 16 } });
        }
      }

      function productIcon(product) {
        if (product.category === &#x27;legacy&#x27;) return &#x27;archive&#x27;;
        if (product.category === &#x27;door&#x27;) return &#x27;door-open&#x27;;
        if (product.category === &#x27;shading&#x27;) return &#x27;blinds&#x27;;
        if (product.category === &#x27;facade&#x27;) return &#x27;building-2&#x27;;
        if (product.category === &#x27;auxiliary&#x27;) return &#x27;puzzle&#x27;;
        if (product.category === &#x27;sliding&#x27;) return &#x27;panel-top&#x27;;
        return &#x27;panels-top-left&#x27;;

      function renderCategories() {
        root.querySelector(&#x27;#d360-categories&#x27;).innerHTML = categories.map(category =&gt; {
          const count = products.filter(product =&gt; product.materials.includes(state.material) &amp;&amp; (category.id === &#x27;all&#x27; || product.category === category.id)).length;

          return categoryMatch &amp;&amp; materialMatch &amp;&amp; searchMatch;

          materialSelect.innerHTML = Object.entries(materialTypes).map(([id, material]) =&gt; `&lt;option value=&quot;${id}&quot;&gt;${escapeHtml(material.label)}${id === activeProjectMaterial() ? &#x27; · proje ana malzemesi&#x27; : &#x27;&#x27;}&lt;/option&gt;`).join(&#x27;&#x27;);

          const active = product.id === state.selected;

        }).join(&#x27;&#x27;) : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Aramanıza uygun ürün bulunamadı.&lt;/div&gt;&#x27;;

      function renderMaterialOptions() {
        const product = selectedProduct();
        if (!product.materials.includes(state.material)) state.material = product.materials[0];
        const select = root.querySelector(&#x27;#d360-material&#x27;);
        select.innerHTML = product.materials.map(id =&gt; `&lt;option value=&quot;${id}&quot;&gt;${materialTypes[id].label}&lt;/option&gt;`).join(&#x27;&#x27;);
        select.value = state.material;

        const scope = root.querySelector(&#x27;#d360-material-scope-status&#x27;);
        if (scope) scope.textContent = state.material === projectMaterial
          ? `Projenin ana malzemesi kullanılıyor: ${materialTypes[projectMaterial].label}.`
          : `Bu ürün için özel malzeme seçildi: ${materialTypes[state.material].label}. Proje varsayılanı ${materialTypes[projectMaterial].label} olarak kalır.`;
        const reset = root.querySelector(&#x27;#d360-reset-product-material&#x27;);
        if (reset) reset.disabled = state.material === projectMaterial || !product.materials.includes(projectMaterial);
        renderSystemOptions();
      }

      function renderSystemOptions() {
        const product = selectedProduct();
        const preferredId = preferredSystemIdForProduct(product);
        const list = systems.filter(system =&gt; systemMatchesMaterial(system) &amp;&amp; systemMatchesProduct(system));
        if (preferredId &amp;&amp; list.some(system =&gt; system.id === preferredId) &amp;&amp; product.legacy) state.systemId = preferredId;
        else if (!list.some(system =&gt; system.id === state.systemId)) {
          const preferred = list.find(system =&gt; system.id === preferredId);
          const ready = list.find(system =&gt; system.technicalReady &amp;&amp; !systemMaterials(system).includes(&#x27;all&#x27;));
          state.systemId = (preferred || ready || list[0] || systems[0]).id;
        }
        const select = root.querySelector(&#x27;#d360-profile-system&#x27;);
        const grouped = list.reduce((groups, system) =&gt; {
          const brand = system.brand || &#x27;Özel sistem&#x27;;
          if (!groups[brand]) groups[brand] = [];
          groups[brand].push(system);
          return groups;
        }, {});
        select.innerHTML = Object.keys(grouped).sort((a, b) =&gt; a.localeCompare(b, &#x27;tr&#x27;)).map(brand =&gt; `&lt;optgroup label=&quot;${escapeHtml(brand)}&quot;&gt;${grouped[brand].map(system =&gt; `&lt;option value=&quot;${system.id}&quot;&gt;${escapeHtml(system.name)}&lt;/option&gt;`).join(&#x27;&#x27;)}&lt;/optgroup&gt;`).join(&#x27;&#x27;);
        select.value = state.systemId;
        renderSystemFitStatus();
      }

      function renderSystemFitStatus() {
        const system = selectedSystem();
        const status = root.querySelector(&#x27;#d360-system-fit-status&#x27;);
        const maxWidth = systemRule(&#x27;maxWidth&#x27;, 12000);
        const maxHeight = systemRule(&#x27;maxHeight&#x27;, 6000);
        const fits = state.width &lt;= maxWidth &amp;&amp; state.height &lt;= maxHeight;
        status.textContent = fits
          ? `${system.brand || &#x27;Sistem&#x27;} · ${system.name}: profil ve başlangıç teknik kuralları otomatik eklendi; ölçüler sistem sınırları içinde.`
          : `${system.name} için ölçü sınırı aşılıyor (${num.format(maxWidth)} × ${num.format(maxHeight)} mm). Başka sistem seçin veya kuralları düzenleyin.`;
        status.classList.toggle(&#x27;text-destructive&#x27;, !fits);
      }

      function renderSelected() {
        const product = selectedProduct();
        root.querySelector(&#x27;#d360-selected-name&#x27;).textContent = product.name;
        const materialList = product.materials.map(id =&gt; materialTypes[id].label).join(&#x27; · &#x27;);
        const archiveNote = product.legacy ? &#x27; · Atölye arşivi · Eski fiyatlar kullanılmıyor&#x27; : &#x27;&#x27;;
        root.querySelector(&#x27;#d360-selected-meta&#x27;).textContent = `${categoryLabels[product.category]} · ${materialList}${archiveNote}`;
        root.querySelectorAll(&#x27;[data-selected-name]&#x27;).forEach(element =&gt; { element.textContent = product.name; });
        root.querySelectorAll(&#x27;[data-selected-meta]&#x27;).forEach(element =&gt; { element.textContent = `${categoryLabels[product.category]} · ${materialList}${archiveNote}`; });
        renderMaterialOptions();

      function renderChoiceSummary() {
        const material = materialTypes[state.material] || materialTypes[selectedProduct().materials[0]];
        root.querySelector(&#x27;#d360-width-summary&#x27;).textContent = `${num.format(state.width)} mm`;
        root.querySelector(&#x27;#d360-height-summary&#x27;).textContent = `${num.format(state.height)} mm`;
        root.querySelector(&#x27;#d360-qty-summary&#x27;).textContent = num.format(state.qty);
        root.querySelector(&#x27;#d360-dimension-summary&#x27;).textContent = `${num.format(state.width)} × ${num.format(state.height)} mm · ${num.format(state.qty)} adet`;
        root.querySelector(&#x27;#d360-material-summary&#x27;).textContent = `${selectedSystem().name} · ${material.label} · ${glassLabels[state.glass]} · ${finishLabels[state.finish]}`;
        renderSystemFitStatus();
      }

      function profileMetrics(product, width = state.width, height = state.height) {
        const w = width;
        const h = height;
        const area = w * h / 1000000;
        const perimeter = 2 * (w + h) / 1000;
        let frameM = perimeter;
        let panelM = 0;
        let glassArea = area * .72;
        let slatArea = 0;
        let specialM = 0;
        let hardware = 1;

        if (/casement|tiltturn|door|pivot|glassDoor|panelDoor|blindDoor/.test(product.kind)) {
          panelM = product.panels * 2 * (w / product.panels + h) / 1000;
          glassArea = product.kind === &#x27;panelDoor&#x27; || product.kind === &#x27;blindDoor&#x27; ? 0 : area * .66;
          hardware = product.panels;
        }
        if (/slide|panorama|autoSlide|cornerSlide/.test(product.kind)) {
          panelM = product.panels * 2 * (w / product.panels + h) / 1000;
          specialM = w / 1000 * Math.min(product.panels, 3);
          glassArea = area * .76;
          hardware = product.panels;
        }
        if (/fold/.test(product.kind)) {
          panelM = product.panels * 2 * (w / product.panels + h) / 1000;
          specialM = 2 * w / 1000;
          glassArea = area * .7;
          hardware = product.panels;
        }
        if (/shutter/.test(product.kind)) {
          frameM = 2 * h / 1000;
          panelM = 0;
          glassArea = 0;
          slatArea = area;
          specialM = w / 1000;
          hardware = 1;
        }
        if (/screen|blind/.test(product.kind) &amp;&amp; !/Door/.test(product.kind)) {
          panelM = 0;
          glassArea = 0;
          slatArea = area;
          hardware = 1;
        }
        if (/facade|spider/.test(product.kind)) {
          frameM = perimeter + 3 * h / 1000 + 2 * w / 1000;
          panelM = 0;
          glassArea = area * .9;
          specialM = frameM * .7;
          hardware = Math.max(4, product.panels);
        }
        if (/railing/.test(product.kind)) {
          frameM = 2 * w / 1000 + 3 * h / 1000;
          panelM = 0;
          glassArea = area * .68;
          hardware = 4;
        }
        if (/garage/.test(product.kind)) {
          frameM = 2 * h / 1000 + w / 1000;
          panelM = 0;
          glassArea = 0;
          slatArea = area;
          hardware = 2;
        }
        if (/pergola|winterGarden|skylight/.test(product.kind)) {
          frameM = perimeter + product.panels * h / 1000;
          panelM = product.panels * w / 1000;
          glassArea = area * .78;
          hardware = product.panels;
        }
        if (/awning|canopy|sill/.test(product.kind)) {
          frameM = perimeter * .6;
          panelM = 0;
          glassArea = product.kind === &#x27;canopy&#x27; ? area * .85 : 0;
          slatArea = product.kind === &#x27;awning&#x27; ? area : 0;
          hardware = 2;
        }
        return { area, perimeter, frameM, panelM, glassArea, slatArea, specialM, hardware };
      }

      function calculate() {
        const product = selectedProduct();
        const metrics = profileMetrics(product);
        const material = materialTypes[state.material];
        const finishFactor = finishRates[state.finish];
        const wastePercent = systemRule(&#x27;wastePercent&#x27;, 8);
        const priceFactor = systemRule(&#x27;priceFactor&#x27;, 1);
        const operationCost = state.operation === &#x27;smart&#x27; ? priceValue(&#x27;MOTOR-AKIL&#x27;, 5900) : state.operation === &#x27;motor&#x27; ? priceValue(&#x27;MOTOR-TUP&#x27;, 3900) : 0;
        const codes = profileCodes(product, state.material);
        const fallbackProfileRate = profileRate(state.material);
        const frameRate = priceValue(codes.frame, fallbackProfileRate);
        const panelRate = priceValue(codes.panel, fallbackProfileRate);
        const specialRate = priceValue(codes.special || codes.frame, fallbackProfileRate);
        const profileCost = (metrics.frameM * frameRate + metrics.panelM * panelRate + metrics.specialM * specialRate) * (1 + wastePercent / 100) * finishFactor * priceFactor;
        const glassCost = metrics.glassArea * glassRate(state.glass);
        const shutterRate = state.material === &#x27;pvc&#x27; ? priceValue(&#x27;PAN-PVC&#x27;, 680) : priceValue(&#x27;PAN-ALU&#x27;, 980);
        const fillCost = metrics.slatArea * shutterRate;
        let hardwareRate = 620;
        if (product.category === &#x27;sliding&#x27;) hardwareRate = product.premium ? priceValue(&#x27;AKS-HS&#x27;, 7800) : priceValue(&#x27;AKS-SURME&#x27;, 1450);
        if (product.category === &#x27;door&#x27;) hardwareRate = /fire|security|panic/.test(product.id) ? 3100 : priceValue(&#x27;KILIT-MP&#x27;, 2100);
        if (product.category === &#x27;facade&#x27;) hardwareRate = 850;
        if (product.category === &#x27;shading&#x27;) hardwareRate = 420;
        const hardwareCost = metrics.hardware * hardwareRate;
        const consumables = Math.max(480, metrics.perimeter * 95);
        const materialCostEach = profileCost + glassCost + fillCost + hardwareCost + operationCost + consumables;
        const laborEach = Math.max(1250, metrics.area * (product.premium ? 1550 : 780));
        const directEach = materialCostEach + laborEach;
        const beforeVatEach = directEach * (1 + state.profitRate / 100);
        const totalEach = beforeVatEach * (1 + state.vatRate / 100);
        return {
          product,
          metrics,
          profileCost,
          glassCost,
          fillCost,
          hardwareCost,
          operationCost,
          consumables,
          wastePercent,
          priceFactor,
          materialCostEach,
          laborEach,
          directEach,
          beforeVatEach,
          totalEach,
          grandTotal: totalEach * state.qty
        };
      }

      function svgBaseGeometry() {
        const maxW = 360;
        const maxH = 235;
        const scale = Math.min(maxW / state.width, maxH / state.height);
        const width = state.width * scale;
        const height = state.height * scale;
        const x = 105 + (maxW - width) / 2;
        const y = 48 + (maxH - height) / 2;
        const profile = Math.max(10, Math.min(20, 65 * scale));
        return { x, y, width, height, profile, ix: x + profile, iy: y + profile, iw: Math.max(30, width - 2 * profile), ih: Math.max(30, height - 2 * profile) };
      }

      function panelRect(x, y, width, height) {
        return `&lt;rect class=&quot;d360-glass&quot; x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${width}&quot; height=&quot;${height}&quot;&gt;&lt;/rect&gt;&lt;rect class=&quot;d360-panel&quot; x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${width}&quot; height=&quot;${height}&quot; rx=&quot;2&quot;&gt;&lt;/rect&gt;`;
      }

      function renderProductSvg() {
        const product = selectedProduct();
        const svg = root.querySelector(&#x27;#d360-product-svg&#x27;);
        const g = svgBaseGeometry();
        const p = [];
        const arrow = &#x27;&lt;defs&gt;&lt;linearGradient id=&quot;d360-profile-gradient&quot; x1=&quot;0&quot; y1=&quot;0&quot; x2=&quot;1&quot; y2=&quot;1&quot;&gt;&lt;stop offset=&quot;0&quot; stop-color=&quot;var(--viz-series-1)&quot; stop-opacity=&quot;.34&quot;&gt;&lt;/stop&gt;&lt;stop offset=&quot;1&quot; stop-color=&quot;var(--viz-series-3)&quot; stop-opacity=&quot;.2&quot;&gt;&lt;/stop&gt;&lt;/linearGradient&gt;&lt;linearGradient id=&quot;d360-glass-gradient&quot; x1=&quot;0&quot; y1=&quot;0&quot; x2=&quot;0&quot; y2=&quot;1&quot;&gt;&lt;stop offset=&quot;0&quot; stop-color=&quot;var(--viz-series-2)&quot; stop-opacity=&quot;.22&quot;&gt;&lt;/stop&gt;&lt;stop offset=&quot;1&quot; stop-color=&quot;var(--viz-series-5)&quot; stop-opacity=&quot;.1&quot;&gt;&lt;/stop&gt;&lt;/linearGradient&gt;&lt;marker id=&quot;d360-arrow&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;5&quot; refY=&quot;5&quot; markerWidth=&quot;6&quot; markerHeight=&quot;6&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M0 0 L10 5 L0 10z&quot; fill=&quot;var(--muted-foreground)&quot;&gt;&lt;/path&gt;&lt;/marker&gt;&lt;pattern id=&quot;d360-mesh&quot; width=&quot;8&quot; height=&quot;8&quot; patternUnits=&quot;userSpaceOnUse&quot;&gt;&lt;path d=&quot;M0 0L8 8M8 0L0 8&quot; stroke=&quot;var(--viz-series-6)&quot; stroke-width=&quot;.7&quot;&gt;&lt;/path&gt;&lt;/pattern&gt;&lt;/defs&gt;&#x27;;
        p.push(arrow);
        p.push(&#x27;&lt;rect x=&quot;0&quot; y=&quot;0&quot; width=&quot;560&quot; height=&quot;330&quot; rx=&quot;18&quot; fill=&quot;color-mix(in srgb, var(--viz-series-5) 7%, transparent)&quot;&gt;&lt;/rect&gt;&#x27;);

        const standardFrame = () =&gt; {
          p.push(`&lt;rect class=&quot;d360-glass&quot; x=&quot;${g.ix}&quot; y=&quot;${g.iy}&quot; width=&quot;${g.iw}&quot; height=&quot;${g.ih}&quot;&gt;&lt;/rect&gt;`);
          p.push(`&lt;path class=&quot;d360-frame&quot; fill-rule=&quot;evenodd&quot; d=&quot;M${g.x} ${g.y}H${g.x + g.width}V${g.y + g.height}H${g.x}ZM${g.ix} ${g.iy}V${g.iy + g.ih}H${g.ix + g.iw}V${g.iy}Z&quot;&gt;&lt;/path&gt;`);
        };

        if (/shutter/.test(product.kind)) {
          p.push(`&lt;rect class=&quot;d360-frame&quot; x=&quot;${g.x}&quot; y=&quot;${g.y}&quot; width=&quot;${g.width}&quot; height=&quot;${g.height}&quot;&gt;&lt;/rect&gt;`);
          const boxH = Math.min(38, g.height * .18);
          p.push(`&lt;rect class=&quot;d360-solid&quot; x=&quot;${g.x}&quot; y=&quot;${g.y}&quot; width=&quot;${g.width}&quot; height=&quot;${boxH}&quot;&gt;&lt;/rect&gt;`);
          for (let yy = g.y + boxH + 7; yy &lt; g.y + g.height - 3; yy += 10) p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${g.x + 7} ${yy}H${g.x + g.width - 7}&quot;&gt;&lt;/path&gt;`);
        } else if (/screen/.test(product.kind)) {
          standardFrame();
          p.push(`&lt;rect x=&quot;${g.ix}&quot; y=&quot;${g.iy}&quot; width=&quot;${g.iw}&quot; height=&quot;${g.ih}&quot; fill=&quot;url(#d360-mesh)&quot;&gt;&lt;/rect&gt;`);
          if (product.kind === &#x27;screenPlisse&#x27;) for (let xx = g.ix + 6; xx &lt; g.ix + g.iw; xx += 8) p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${xx} ${g.iy}V${g.iy + g.ih}&quot;&gt;&lt;/path&gt;`);
        } else if (/facade|spider/.test(product.kind)) {
          standardFrame();
          for (let i = 1; i &lt; 4; i += 1) p.push(`&lt;path class=&quot;d360-solid&quot; d=&quot;M${g.x + g.width * i / 4 - 3} ${g.y}h6v${g.height}h-6z&quot;&gt;&lt;/path&gt;`);
          for (let i = 1; i &lt; 3; i += 1) p.push(`&lt;path class=&quot;d360-solid&quot; d=&quot;M${g.x} ${g.y + g.height * i / 3 - 3}h${g.width}v6h-${g.width}z&quot;&gt;&lt;/path&gt;`);
          if (product.kind === &#x27;spider&#x27;) {

        } else if (/casement1|tiltturn1|door1|pivotDoor|glassDoor|panelDoor|topHung|bottomHung|pivotH|pivotV/.test(product.kind)) {

      function catalogMaterial(code) {
        return priceMaterials.find(material =&gt; material.code === code);
      }

      function orderRow(code, fallbackName, qty, unit, fallbackPrice = 0) {
        const catalog = catalogMaterial(code);
        return {
          code,
          name: catalog ? catalog.name : fallbackName,
          qty: Math.max(0, Number(qty) || 0),
          unit: catalog ? catalog.unit : unit,
          fallbackPrice: catalog ? Number(catalog.price) : Number(fallbackPrice) || 0

      function profileCodes(product, materialId) {
        if (product.legacyRule === &#x27;aldoks&#x27;) {
          if (product.id === &#x27;legacy-aldoks-wide-door&#x27;) return { frame: &#x27;ALDOKS-GENIS-ZET&#x27;, panel: &#x27;ALDOKS-GENIS-TAF&#x27; };

        const map = {
          pvc: { frame: &#x27;PVC-KASA70&#x27;, panel: &#x27;PVC-KANAT70&#x27; },
          aluCold: { frame: &#x27;ALU-50&#x27;, panel: &#x27;ALU-50&#x27; },
          aluThermal: { frame: &#x27;ALU-TB75&#x27;, panel: &#x27;ALU-TB75&#x27; },
          wood: { frame: &#x27;AHSP-LAM&#x27;, panel: &#x27;AHSP-LAM&#x27; },
          woodAlu: { frame: &#x27;AHSP-ALU&#x27;, panel: &#x27;AHSP-ALU&#x27; },
          steel: { frame: &#x27;CELIK-60&#x27;, panel: &#x27;CELIK-60&#x27; },
          steelThermal: { frame: &#x27;ST-TB-FRAME&#x27;, panel: &#x27;ST-TB-SASH&#x27; },
          stainless: { frame: &#x27;PASLANMAZ&#x27;, panel: &#x27;PASLANMAZ&#x27; },
          fiberglass: { frame: &#x27;FRP-FRAME&#x27;, panel: &#x27;FRP-SASH&#x27; },
          grpDoor: { frame: &#x27;GRP-FRAME&#x27;, panel: &#x27;GRP-STILE&#x27; },
          composite: { frame: &#x27;COMP-RAIL&#x27;, panel: &#x27;ACP-4&#x27; },
          glass: { frame: &#x27;PATCH-SET&#x27;, panel: &#x27;CAM-TEMP&#x27; }
        };
        return map[materialId] || map.pvc;
      }

      function glassCode(glassId) {
        return ({ double: &#x27;CAM-ISI&#x27;, lowe: &#x27;CAM-LOWE&#x27;, triple: &#x27;CAM-3LU&#x27;, tempered: &#x27;CAM-TEMP&#x27;, laminated: &#x27;CAM-LAM&#x27;, acoustic: &#x27;CAM-AKUS&#x27;, fire: &#x27;CAM-FIRE&#x27;, panel: &#x27;PANEL-40&#x27; })[glassId] || &#x27;CAM-ISI&#x27;;
      }

      function materialRowsForConfiguration({ product, metrics, materialId, glassId, operationId, qty, wastePercent, width = state.width }) {
        const rows = [];
        const codes = profileCodes(product, materialId);
        const wasteFactor = 1 + Math.max(0, Number(wastePercent) || 0) / 100;
        const profileFallback = profileRate(materialId);
        const add = row =&gt; { if (row.qty &gt; .001) rows.push(row); };

        add(orderRow(codes.frame, frameName, metrics.frameM * wasteFactor * qty, &#x27;m&#x27;, profileFallback));

        if (materialId === &#x27;grpDoor&#x27;) { add(orderRow(&#x27;GRP-SKIN&#x27;, &#x27;GRP dış yüzey&#x27;, metrics.area * 2 * qty, &#x27;m²&#x27;, 980)); add(orderRow(&#x27;GRP-CORE&#x27;, &#x27;Yalıtımlı kapı çekirdeği&#x27;, metrics.area * qty, &#x27;m²&#x27;, 620)); add(orderRow(&#x27;GRP-THRESH&#x27;, &#x27;Isı bariyerli eşik&#x27;, width / 1000 * qty, &#x27;m&#x27;, 420)); add(orderRow(&#x27;GRP-SEAL&#x27;, &#x27;Kapı hava contası&#x27;, metrics.perimeter * qty, &#x27;m&#x27;, 28)); }
        if (materialId === &#x27;composite&#x27;) { add(orderRow(&#x27;ACP-4&#x27;, &#x27;Kompozit panel / dolgu&#x27;, metrics.area * wasteFactor * qty, &#x27;m²&#x27;, 780)); add(orderRow(&#x27;COMP-BRACKET&#x27;, &#x27;Ayarlı cephe konsolu&#x27;, Math.ceil(metrics.area * 3 * qty), &#x27;adet&#x27;, 155)); add(orderRow(&#x27;VHB-BANT&#x27;, &#x27;Cephe montaj bandı&#x27;, metrics.perimeter * qty, &#x27;m&#x27;, 42)); }
        if (materialId === &#x27;glass&#x27;) { add(orderRow(&#x27;CAM-TAKOZ&#x27;, &#x27;Cam taşıma ve ayar takozu&#x27;, Math.max(4, metrics.hardware * 4) * qty, &#x27;adet&#x27;, 9)); add(orderRow(/spider/.test(product.kind) ? &#x27;SPIDER-ARM&#x27; : &#x27;PATCH-SET&#x27;, /spider/.test(product.kind) ? &#x27;Spider bağlantı kolu&#x27; : &#x27;Patch bağlantı seti&#x27;, Math.max(1, metrics.hardware) * qty, /spider/.test(product.kind) ? &#x27;adet&#x27; : &#x27;set&#x27;, 1850)); }
        if (metrics.glassArea &gt; 0) add(orderRow(glassCode(glassId), glassLabels[glassId], metrics.glassArea * qty, &#x27;m²&#x27;, glassRate(glassId)));

        if (metrics.slatArea &gt; 0) {
          const fillCode = /screen/.test(product.kind) ? &#x27;SINEK-FILE&#x27; : /awning/.test(product.kind) ? &#x27;ZIP-KUMAS&#x27; : materialId === &#x27;pvc&#x27; ? &#x27;PAN-PVC&#x27; : &#x27;PAN-ALU&#x27;;
