        const customer = customers.find(item =&gt; item.id === project.customerId);
        detail.hidden = false;
        root.querySelector(&#x27;#d360-project-detail-name&#x27;).textContent = `${project.no} · ${project.name}`;
        root.querySelector(&#x27;#d360-project-detail-meta&#x27;).textContent = `${customer ? customer.name : &#x27;Müşteri bulunamadı&#x27;} · ${project.location || &#x27;Konum belirtilmedi&#x27;} · ${project.products} ürün`;
        const items = project.items || [];
        root.querySelector(&#x27;#d360-project-items&#x27;).innerHTML = items.length
          ? `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Ürün, poz ve ölçü&lt;/th&gt;&lt;th&gt;Sistem / saha kaydı&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Adet&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Tutar&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${items.map(item =&gt; `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(item.productName)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(item.reference || &#x27;Poz belirtilmedi&#x27;)} · ${num.format(item.width)} × ${num.format(item.height)} mm · ${escapeHtml(item.addedAt)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(item.system)}&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(item.material)} · ${escapeHtml(item.glass)}&lt;/div&gt;${item.note ? `&lt;div class=&quot;text-small&quot;&gt;Not: ${escapeHtml(item.note)}&lt;/div&gt;` : &#x27;&#x27;}${item.photoName ? `&lt;div class=&quot;text-small&quot;&gt;Fotoğraf: ${escapeHtml(item.photoName)}&lt;/div&gt;` : &#x27;&#x27;}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${num.format(item.qty)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(item.total)}&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`
          : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Bu projede henüz ölçü yok. “Bu projeye ölçü ekle” ile ustanın ölçü girişine geçin.&lt;/div&gt;&#x27;;
        const orderRows = projectOrderRows(project);
        root.querySelector(&#x27;#d360-order-count&#x27;).textContent = `${orderRows.length} kalem`;
        root.querySelector(&#x27;#d360-project-order-list&#x27;).innerHTML = orderRows.length
          ? `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Kod&lt;/th&gt;&lt;th&gt;Sipariş edilecek malzeme / aksesuar&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Toplam miktar&lt;/th&gt;&lt;th&gt;Birim&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Alış tutarı&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${orderRows.map(row =&gt; `&lt;tr&gt;&lt;td&gt;&lt;code&gt;${escapeHtml(row.code)}&lt;/code&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(row.name)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;strong&gt;${num.format(row.qty)}&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(row.unit)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(rowPurchaseTotal(row))}&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;tfoot&gt;&lt;tr&gt;&lt;th colspan=&quot;4&quot;&gt;Tahmini malzeme sipariş toplamı&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;${money.format(orderRows.reduce((sum, row) =&gt; sum + rowPurchaseTotal(row), 0))}&lt;/th&gt;&lt;/tr&gt;&lt;/tfoot&gt;&lt;/table&gt;&lt;/div&gt;`
          : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Projeye ilk ölçü kaydedildiğinde sipariş listesi burada otomatik oluşacak.&lt;/div&gt;&#x27;;
      }

      function renderProjectCustomerOptions() {
        const select = root.querySelector(&#x27;#d360-standalone-project-customer&#x27;);
        select.innerHTML = customers.length
          ? `&lt;option value=&quot;&quot;&gt;Müşteri seçin&lt;/option&gt;${customers.map(customer =&gt; `&lt;option value=&quot;${customer.id}&quot;&gt;${escapeHtml(customer.name)} · ${escapeHtml(customer.status || &#x27;Aktif&#x27;)} · ${escapeHtml(customer.phone)}&lt;/option&gt;`).join(&#x27;&#x27;)}`
          : &#x27;&lt;option value=&quot;&quot;&gt;Önce müşteri ekleyin&lt;/option&gt;&#x27;;
        select.disabled = !customers.length;
      }

      function renderAssignmentOptions() {
        const customerSelect = root.querySelector(&#x27;#d360-measure-customer&#x27;);
        const projectSelect = root.querySelector(&#x27;#d360-measure-project&#x27;);
        const newProjectFields = root.querySelector(&#x27;#d360-new-measure-project&#x27;);
        const help = root.querySelector(&#x27;#d360-measure-assignment-help&#x27;);
        customerSelect.innerHTML = customers.length
          ? `&lt;option value=&quot;&quot;&gt;Müşteri seçin&lt;/option&gt;${customers.map(customer =&gt; `&lt;option value=&quot;${customer.id}&quot;&gt;${escapeHtml(customer.name)} · ${escapeHtml(customer.status || &#x27;Aktif&#x27;)} · ${escapeHtml(customer.phone)}&lt;/option&gt;`).join(&#x27;&#x27;)}`
          : &#x27;&lt;option value=&quot;&quot;&gt;Önce müşteri ekleyin&lt;/option&gt;&#x27;;
        customerSelect.disabled = !customers.length;
        if (!customers.some(customer =&gt; customer.id === state.measureCustomerId)) state.measureCustomerId = &#x27;&#x27;;
        customerSelect.value = state.measureCustomerId;

        if (!state.measureCustomerId) {
          state.measureProjectId = &#x27;&#x27;;
          projectSelect.innerHTML = &#x27;&lt;option value=&quot;&quot;&gt;Önce müşteri seçin&lt;/option&gt;&#x27;;
          projectSelect.disabled = true;
          newProjectFields.hidden = true;
          help.textContent = customers.length ? &#x27;Ölçünün kimin hesabına kaydedileceğini seçin.&#x27; : &#x27;Önce Müşteriler bölümünden müşteri ekleyin; sonra bu ekrana dönün.&#x27;;
          renderProjectCustomerOptions();
          return;
        }

        const customer = customers.find(item =&gt; item.id === state.measureCustomerId);
        const list = projects.filter(project =&gt; project.customerId === state.measureCustomerId);
        projectSelect.disabled = false;
        projectSelect.innerHTML = `&lt;option value=&quot;new&quot;&gt;+ Yeni proje oluştur&lt;/option&gt;${list.map(project =&gt; `&lt;option value=&quot;${project.id}&quot;&gt;${escapeHtml(project.name)} · ${escapeHtml(project.location || &#x27;Konum yok&#x27;)}&lt;/option&gt;`).join(&#x27;&#x27;)}`;
        if (state.measureProjectId !== &#x27;new&#x27; &amp;&amp; !list.some(project =&gt; project.id === state.measureProjectId)) state.measureProjectId = &#x27;new&#x27;;
        if (!state.measureProjectId) state.measureProjectId = &#x27;new&#x27;;
        projectSelect.value = state.measureProjectId;
        newProjectFields.hidden = state.measureProjectId !== &#x27;new&#x27;;
        const project = list.find(item =&gt; item.id === state.measureProjectId);
        help.textContent = project
          ? `Bu ölçü ${customer.name} / ${project.name} projesine eklenecek.`
          : `${customer.name} için yeni bir proje oluşturulacak; proje adı ve konumu zorunludur.`;
        renderProjectCustomerOptions();
      }

      function renderProjects() {
        projects.forEach(project =&gt; {
          if (!project.id) project.id = makeId(&#x27;prj&#x27;);
          const customer = customers.find(item =&gt; item.id === project.customerId);
          if (customer) project.customer = customer.name;
          refreshProjectTotals(project);
        });
        const rows = projects.length
          ? projects.map(project =&gt; `&lt;tr&gt;&lt;td&gt;&lt;code&gt;${escapeHtml(project.no)}&lt;/code&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(project.name)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(project.customer || &#x27;—&#x27;)}&lt;/td&gt;&lt;td&gt;${escapeHtml(project.location || &#x27;—&#x27;)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${project.products}&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(project.status)}&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(project.total)}&lt;/td&gt;&lt;td&gt;&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-project-view=&quot;${project.id}&quot;&gt;Aç&lt;/button&gt;&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)
          : &#x27;&lt;tr&gt;&lt;td colspan=&quot;7&quot; class=&quot;d360-empty&quot;&gt;Henüz proje yok. “Yeni proje” ile müşteri ve konum bilgilerini girerek başlayın.&lt;/td&gt;&lt;/tr&gt;&#x27;;
        root.querySelector(&#x27;#d360-project-table&#x27;).innerHTML = rows;
        renderProjectDetail();
        renderAssignmentOptions();
        renderRoleWorkspace();
        ensureIcons();
      }

      function customerProjects(customerId) {
        return projects.filter(project =&gt; project.customerId === customerId);
      }

      function deleteCustomer(customerId) {
        const customer = customers.find(item =&gt; item.id === customerId);
        if (!customer) return;
        const linkedProjects = customerProjects(customerId);
        const detail = linkedProjects.length
          ? ` Bu müşteriye bağlı ${linkedProjects.length} proje ve içlerindeki bütün ölçüler de silinecek.`
          : &#x27;&#x27;;
        if (!globalThis.confirm(`${customer.name} müşterisini silmek istediğinize emin misiniz?${detail}`)) return;
        const deletedProjectIds = new Set(linkedProjects.map(project =&gt; project.id));
        for (let index = projects.length - 1; index &gt;= 0; index -= 1) if (projects[index].customerId === customerId) projects.splice(index, 1);
        customers.splice(customers.findIndex(item =&gt; item.id === customerId), 1);
        if (state.selectedCustomerId === customerId) state.selectedCustomerId = null;
        if (state.editingCustomerId === customerId) state.editingCustomerId = null;
        if (state.projectCustomerId === customerId) state.projectCustomerId = null;
        if (state.measureCustomerId === customerId) {
          state.measureCustomerId = &#x27;&#x27;;
          state.measureProjectId = &#x27;&#x27;;
        }
        if (deletedProjectIds.has(state.selectedProjectId)) state.selectedProjectId = null;
        toggleForm(&#x27;#d360-customer-form&#x27;, false);
        toggleForm(&#x27;#d360-customer-project-form&#x27;, false);
        renderCustomers();
        renderProjects();
        persistData();
      }

      function renderCustomers() {
        const customerQuery = state.customerSearch.trim().toLocaleLowerCase(&#x27;tr-TR&#x27;);
        const visibleCustomers = customers.filter(customer =&gt; `${customer.name} ${customer.phone} ${customer.email || &#x27;&#x27;}`.toLocaleLowerCase(&#x27;tr-TR&#x27;).includes(customerQuery));
        root.querySelector(&#x27;#d360-customer-result-count&#x27;).textContent = `${visibleCustomers.length} müşteri`;
        root.querySelector(&#x27;#d360-customer-table&#x27;).innerHTML = visibleCustomers.length ? visibleCustomers.map(customer =&gt; {
          if (!customer.status) customer.status = &#x27;Aktif&#x27;;
          return `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(customer.name)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(customer.email || &#x27;E-posta yok&#x27;)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(customer.phone)}&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(customer.status)}&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;div class=&quot;d360-action-cell&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-customer-measure=&quot;${customer.id}&quot;&gt;&lt;i data-lucide=&quot;ruler&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;Ölçü ekle&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-customer-view=&quot;${customer.id}&quot;&gt;Müşteriyi aç&lt;/button&gt;&lt;/div&gt;&lt;/td&gt;&lt;/tr&gt;`;
        }).join(&#x27;&#x27;) : `&lt;tr&gt;&lt;td colspan=&quot;4&quot; class=&quot;d360-empty&quot;&gt;${customers.length ? &#x27;Aradığınız müşteri bulunamadı. Yazımı kontrol edin veya yeni müşteri kaydedin.&#x27; : &#x27;Henüz müşteri yok. “Müşteri listede yok” düğmesiyle ilk kaydı oluşturun.&#x27;}&lt;/td&gt;&lt;/tr&gt;`;
        renderCustomerDetail();
        renderAssignmentOptions();
        ensureIcons();
      }

      function renderCustomerDetail() {
        const detail = root.querySelector(&#x27;#d360-customer-detail&#x27;);
        const customer = customers.find(item =&gt; item.id === state.selectedCustomerId);
        const editButton = root.querySelector(&#x27;#d360-detail-edit-customer&#x27;);
        const projectButton = root.querySelector(&#x27;#d360-detail-add-project&#x27;);
        const deleteButton = root.querySelector(&#x27;#d360-detail-delete-customer&#x27;);
        editButton.disabled = !customer;
        projectButton.disabled = !customer;
        deleteButton.disabled = !customer;
        detail.hidden = !customer;
        if (!customer) return;
        root.querySelector(&#x27;#d360-customer-detail-name&#x27;).textContent = customer.name;
        root.querySelector(&#x27;#d360-customer-detail-contact&#x27;).textContent = `${customer.phone} · ${customer.email || &#x27;E-posta yok&#x27;} · ${customer.status || &#x27;Aktif&#x27;}`;
        const list = customerProjects(customer.id);
        root.querySelector(&#x27;#d360-customer-projects&#x27;).innerHTML = list.length
          ? `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Proje&lt;/th&gt;&lt;th&gt;Durum&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Tutar&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;İşlem&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${list.map(project =&gt; `&lt;tr&gt;&lt;td&gt;${escapeHtml(project.name)}&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(project.location || &#x27;&#x27;)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(project.status)}&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(project.total)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-project-measure=&quot;${project.id}&quot;&gt;Ölçü ekle&lt;/button&gt;&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`
          : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Bu müşteriye bağlı proje yok. “Proje ekle” ile başlayın.&lt;/div&gt;&#x27;;
      }

      function openCustomerForm(customerId) {
        const customer = customers.find(item =&gt; item.id === customerId);
        state.editingCustomerId = customer ? customer.id : null;
        root.querySelector(&#x27;#d360-customer-form-title&#x27;).textContent = customer ? &#x27;Müşteri bilgilerini düzenle&#x27; : &#x27;Yeni müşteri ekle&#x27;;
        root.querySelector(&#x27;#d360-customer-name&#x27;).value = customer ? customer.name : &#x27;&#x27;;
        root.querySelector(&#x27;#d360-customer-phone&#x27;).value = customer ? customer.phone : &#x27;&#x27;;
        root.querySelector(&#x27;#d360-customer-email&#x27;).value = customer ? customer.email : &#x27;&#x27;;
        root.querySelector(&#x27;#d360-customer-status&#x27;).value = customer ? (customer.status || &#x27;Aktif&#x27;) : &#x27;Aktif&#x27;;
        root.querySelector(&#x27;#d360-save-customer&#x27;).textContent = customer ? &#x27;Değişiklikleri kaydet&#x27; : &#x27;Müşteriyi kaydet&#x27;;
        toggleForm(&#x27;#d360-customer-project-form&#x27;, false);
        toggleForm(&#x27;#d360-customer-form&#x27;, true, &#x27;#d360-customer-name&#x27;);
      }

      function openCustomerProjectForm(customerId) {
        const customer = customers.find(item =&gt; item.id === customerId);
        if (!customer) return;
        state.projectCustomerId = customer.id;
        state.selectedCustomerId = customer.id;
        root.querySelector(&#x27;#d360-project-form-title&#x27;).textContent = `${customer.name} için proje ekle`;
        root.querySelector(&#x27;#d360-project-name&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-project-location&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-project-status&#x27;).value = &#x27;Teklif hazırlanıyor&#x27;;
        root.querySelector(&#x27;#d360-project-total&#x27;).value = &#x27;0&#x27;;
        toggleForm(&#x27;#d360-customer-form&#x27;, false);
        toggleForm(&#x27;#d360-customer-project-form&#x27;, true, &#x27;#d360-project-name&#x27;);
        renderCustomerDetail();
      }

      function openStandaloneProjectForm() {
        renderProjectCustomerOptions();
        root.querySelector(&#x27;#d360-standalone-project-customer&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-standalone-project-name&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-standalone-project-location&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-standalone-project-status&#x27;).value = &#x27;Ölçü bekliyor&#x27;;
        root.querySelector(&#x27;#d360-standalone-project-error&#x27;).textContent = customers.length ? &#x27;&#x27; : &#x27;Önce Müşteriler bölümünden müşteri ekleyin.&#x27;;
        toggleForm(&#x27;#d360-standalone-project-form&#x27;, true, customers.length ? &#x27;#d360-standalone-project-customer&#x27; : null);
      }

      function openMeasurementEntry(customerId, projectId = &#x27;new&#x27;) {
        if (!customers.some(customer =&gt; customer.id === customerId)) return;
        state.measureCustomerId = customerId;
        state.measureProjectId = projectId;
        root.querySelector(&#x27;#d360-measure-reference&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-note&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-photo&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-field-status&#x27;).textContent = &#x27;Fotoğraf isteğe bağlıdır; poz ve not proje ekibinin tamamı tarafından görülebilir.&#x27;;
        state.step = 2;
        state.maxStep = Math.max(state.maxStep, 2);
        root.querySelector(&#x27;#d360-measure-error&#x27;).textContent = &#x27;&#x27;;
        renderAssignmentOptions();
        showPage(&#x27;catalog&#x27;);
        showWizardStep(2);
      }

      function startNewMeasurement() {
        state.measureCustomerId = &#x27;&#x27;;
        state.measureProjectId = &#x27;&#x27;;
        state.step = 1;
        state.maxStep = 1;
        root.querySelector(&#x27;#d360-project-badge&#x27;).textContent = &#x27;Proje seçilmedi&#x27;;
        root.querySelector(&#x27;#d360-action-status&#x27;).textContent = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-reference&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-note&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-photo&#x27;).value = &#x27;&#x27;;
        renderAssignmentOptions();
        showPage(&#x27;catalog&#x27;);
        showWizardStep(1);
      }

      function renderTeam() {
        root.querySelector(&#x27;#d360-team-count&#x27;).textContent = `${teamMembers.length} kullanıcı`;
        root.querySelector(&#x27;#d360-team-table&#x27;).innerHTML = teamMembers.length
          ? teamMembers.map(member =&gt; {
            const role = roleDefinitions.find(item =&gt; item.id === member.roleId) || roleDefinitions[0];
            return `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(member.name)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(member.email)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(role.label)}&lt;/span&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(member.status)}&lt;/td&gt;&lt;td&gt;&lt;div class=&quot;d360-action-cell&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-team-edit=&quot;${member.id}&quot;&gt;Düzenle&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn text-destructive&quot; data-team-delete=&quot;${member.id}&quot;&gt;Kaldır&lt;/button&gt;&lt;/div&gt;&lt;/td&gt;&lt;/tr&gt;`;
          }).join(&#x27;&#x27;)
          : &#x27;&lt;tr&gt;&lt;td colspan=&quot;4&quot; class=&quot;d360-empty&quot;&gt;Henüz kullanıcı hesabı yok. İlk çalışanı ekleyip rolünü seçin.&lt;/td&gt;&lt;/tr&gt;&#x27;;
        root.querySelector(&#x27;#d360-role-permission-table&#x27;).innerHTML = roleDefinitions.map(role =&gt; `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(role.label)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(role.description)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${role.permissions.map(permission =&gt; `&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(permission)}&lt;/span&gt;`).join(&#x27; &#x27;)}&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;);
        root.querySelector(&#x27;#d360-team-role&#x27;).innerHTML = roleDefinitions.map(role =&gt; `&lt;option value=&quot;${role.id}&quot;&gt;${escapeHtml(role.label)}&lt;/option&gt;`).join(&#x27;&#x27;);
        ensureIcons();
      }

      function openTeamMemberForm(memberId) {
        const member = teamMembers.find(item =&gt; item.id === memberId);
        state.editingTeamMemberId = member ? member.id : null;
        renderTeam();
        root.querySelector(&#x27;#d360-team-form-title&#x27;).textContent = member ? &#x27;Kullanıcı hesabını düzenle&#x27; : &#x27;Yeni kullanıcı ekle&#x27;;
        root.querySelector(&#x27;#d360-team-name&#x27;).value = member ? member.name : &#x27;&#x27;;
        root.querySelector(&#x27;#d360-team-email&#x27;).value = member ? member.email : &#x27;&#x27;;
        root.querySelector(&#x27;#d360-team-role&#x27;).value = member ? member.roleId : &#x27;survey&#x27;;
        root.querySelector(&#x27;#d360-team-status&#x27;).value = member ? member.status : &#x27;Davet gönderildi&#x27;;
        root.querySelector(&#x27;#d360-save-team-member&#x27;).textContent = member ? &#x27;Değişiklikleri kaydet&#x27; : &#x27;Kullanıcıyı kaydet&#x27;;
        root.querySelector(&#x27;#d360-team-error&#x27;).textContent = &#x27;&#x27;;
        toggleForm(&#x27;#d360-team-member-form&#x27;, true, &#x27;#d360-team-name&#x27;);
      }

      function deleteTeamMember(memberId) {
        const member = teamMembers.find(item =&gt; item.id === memberId);
        if (!member || !globalThis.confirm(`${member.name} kullanıcısını ekipten kaldırmak istediğinize emin misiniz?`)) return;
        teamMembers.splice(teamMembers.findIndex(item =&gt; item.id === memberId), 1);
        if (state.editingTeamMemberId === memberId) state.editingTeamMemberId = null;
        toggleForm(&#x27;#d360-team-member-form&#x27;, false);
        renderTeam();
        persistData();
      }

      function renderSystems() {
        root.querySelector(&#x27;#d360-system-table&#x27;).innerHTML = systems.map(system =&gt; `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(system.name)}&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(system.material === &#x27;all&#x27; ? &#x27;Tüm malzemeler&#x27; : materialTypes[system.material].label)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${system.rules.length}&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(system.status)}&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;div class=&quot;d360-action-cell&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-system-edit=&quot;${system.id}&quot;&gt;Düzenle ve kural ekle&lt;/button&gt;&lt;/div&gt;&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;);
        renderSystemOptions();
        ensureIcons();
      }

      function renderSystemRules() {
        root.querySelector(&#x27;#d360-rule-table&#x27;).innerHTML = state.systemDraftRules.length
          ? state.systemDraftRules.map((rule, index) =&gt; `&lt;tr&gt;&lt;td&gt;${escapeHtml(ruleLabels[rule.type] || rule.type)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${num.format(rule.value)}&lt;/td&gt;&lt;td&gt;${escapeHtml(rule.unit)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-rule-remove=&quot;${index}&quot;&gt;Kaldır&lt;/button&gt;&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)
          : &#x27;&lt;tr&gt;&lt;td colspan=&quot;4&quot; class=&quot;d360-empty&quot;&gt;Henüz kural yok. Yukarıdan ilk kuralı ekleyin.&lt;/td&gt;&lt;/tr&gt;&#x27;;
      }

      function openSystemForm(systemId) {
        const system = systems.find(item =&gt; item.id === systemId);
        state.editingSystemId = system ? system.id : null;
        state.systemDraftRules = system ? system.rules.map(rule =&gt; ({ ...rule })) : [];
        root.querySelector(&#x27;#d360-system-form-title&#x27;).textContent = system ? `${system.name} sistemini düzenle` : &#x27;Yeni profil sistemi ekle&#x27;;
        root.querySelector(&#x27;#d360-system-name&#x27;).value = system ? system.name : &#x27;&#x27;;
        root.querySelector(&#x27;#d360-system-material&#x27;).value = system ? system.material : &#x27;pvc&#x27;;
        root.querySelector(&#x27;#d360-save-system&#x27;).textContent = system ? &#x27;Sistem ve kuralları kaydet&#x27; : &#x27;Sistemi kaydet&#x27;;
        root.querySelector(&#x27;#d360-system-error&#x27;).textContent = &#x27;&#x27;;
        renderSystemRules();
        toggleForm(&#x27;#d360-system-form&#x27;, true, &#x27;#d360-system-name&#x27;);
      }

      const pageTitles = { dashboard: &#x27;Başlangıç&#x27;, catalog: &#x27;Ürün oluştur&#x27;, projects: &#x27;Projeler&#x27;, materials: &#x27;Fiyat ve stok yönetimi&#x27;, customers: &#x27;Müşteriler&#x27;, team: &#x27;Ekip ve yetki yönetimi&#x27;, settings: &#x27;Profil sistemleri&#x27; };
      const wizardCopy = {
        1: { title: &#x27;Önce ürün tipini seçin&#x27;, help: &#x27;Pencere, kapı, sürme, panjur veya arşiv sistemlerinden bir şablon seçin.&#x27; },
        2: { title: &#x27;Müşteriyi ve projeyi seçip ölçüyü girin&#x27;, help: &#x27;Önce ölçünün kime ait olduğunu seçin; ardından dış kasa ölçülerini ve adedi yazın.&#x27; },
        3: { title: &#x27;Teknik seçimleri tamamlayın&#x27;, help: &#x27;Malzeme, cam/dolgu, renk ve kumanda biçimini seçin.&#x27; },
        4: { title: &#x27;Üretim çıktısını kontrol edin&#x27;, help: &#x27;Çizim, malzeme listesi ve kesim ölçülerini tek tek doğrulayın.&#x27; },
        5: { title: &#x27;Fiyat ve ölçü kaydı hazır&#x27;, help: &#x27;Toplamı kontrol edin; kayıt seçtiğiniz müşterinin proje hesabına eklenecek.&#x27; }
      };

      function validateMeasurements() {
        const customer = customers.find(item =&gt; item.id === state.measureCustomerId);
        const project = projects.find(item =&gt; item.id === state.measureProjectId &amp;&amp; item.customerId === state.measureCustomerId);
        const newName = root.querySelector(&#x27;#d360-measure-project-name&#x27;).value.trim();
        const newLocation = root.querySelector(&#x27;#d360-measure-project-location&#x27;).value.trim();
        const fields = [root.querySelector(&#x27;#d360-width&#x27;), root.querySelector(&#x27;#d360-height&#x27;), root.querySelector(&#x27;#d360-qty&#x27;)];
        const dimensionsValid = fields.every(field =&gt; field.checkValidity() &amp;&amp; field.value !== &#x27;&#x27;);
        let message = &#x27;&#x27;;
        if (!customer) message = &#x27;Önce bu ölçünün ait olduğu müşteriyi seçin.&#x27;;
        else if (state.measureProjectId === &#x27;new&#x27; &amp;&amp; (!newName || !newLocation)) message = &#x27;Yeni proje için proje adı ve konum / şantiye bilgisi girin.&#x27;;
        else if (state.measureProjectId !== &#x27;new&#x27; &amp;&amp; !project) message = &#x27;Mevcut bir proje seçin veya yeni proje oluşturun.&#x27;;
        else if (!dimensionsValid) message = &#x27;Ölçüleri kontrol edin: genişlik 300–12.000 mm, yükseklik 300–6.000 mm ve adet en az 1 olmalıdır.&#x27;;
        root.querySelector(&#x27;#d360-measure-error&#x27;).textContent = message;
        return !message;
      }

      function showWizardStep(step) {
        const target = clamp(step, 1, 5);
        if (target &gt; state.maxStep) return;
        state.step = target;
        root.querySelectorAll(&#x27;[data-step-panel]&#x27;).forEach(panel =&gt; { panel.hidden = Number(panel.dataset.stepPanel) !== target; });
        root.querySelectorAll(&#x27;[data-wizard-step]&#x27;).forEach(button =&gt; {
          const buttonStep = Number(button.dataset.wizardStep);
          const active = buttonStep === target;
          button.disabled = buttonStep &gt; state.maxStep;
          button.classList.toggle(&#x27;btn-primary&#x27;, active);
          button.classList.toggle(&#x27;btn-ghost&#x27;, !active);
          if (active) button.setAttribute(&#x27;aria-current&#x27;, &#x27;step&#x27;);
          else button.removeAttribute(&#x27;aria-current&#x27;);
        });
        root.querySelector(&#x27;#d360-wizard-counter&#x27;).textContent = `Adım ${target} / 5`;
        root.querySelector(&#x27;#d360-wizard-title&#x27;).textContent = wizardCopy[target].title;
        root.querySelector(&#x27;#d360-wizard-help&#x27;).textContent = wizardCopy[target].help;
        renderChoiceSummary();
        if (target &gt;= 4) renderConfigurator();
        ensureIcons();
      }

      function advanceWizard(target) {
        if (target === 3 &amp;&amp; !validateMeasurements()) return;
        if (target === 4) {
          const fits = state.width &lt;= systemRule(&#x27;maxWidth&#x27;, 12000) &amp;&amp; state.height &lt;= systemRule(&#x27;maxHeight&#x27;, 6000);
          renderSystemFitStatus();
          if (!fits) return;
        }
        state.maxStep = Math.max(state.maxStep, target);
        showWizardStep(target);
      }

      function showPage(page) {
        state.page = page;
        root.querySelectorAll(&#x27;[data-page-view]&#x27;).forEach(section =&gt; { section.hidden = section.dataset.pageView !== page; });
        root.querySelectorAll(&#x27;[data-page]&#x27;).forEach(button =&gt; {
          const active = button.dataset.page === page;
          button.setAttribute(&#x27;aria-selected&#x27;, String(active));
          button.classList.toggle(&#x27;btn-ghost&#x27;, !active);
        });
        root.querySelector(&#x27;#d360-page-title&#x27;).textContent = pageTitles[page];
        if (page === &#x27;materials&#x27;) renderMaterialTable();
        if (page === &#x27;customers&#x27;) renderCustomers();
        if (page === &#x27;team&#x27;) renderTeam();
        if (page === &#x27;settings&#x27;) renderSystems();
        if (page === &#x27;projects&#x27; || page === &#x27;dashboard&#x27;) renderProjects();
        if (page === &#x27;catalog&#x27;) {
          renderAssignmentOptions();
          renderConfigurator();
          showWizardStep(state.step);
        }
        ensureIcons();
      }

      function updateNumber(selector, key, min, max) {
        const input = root.querySelector(selector);
        input.addEventListener(&#x27;input&#x27;, () =&gt; {
          state[key] = clamp(input.value, min, max);
          renderProductSvg();
          renderCalculation();
          renderChoiceSummary();
        });
        input.addEventListener(&#x27;blur&#x27;, () =&gt; { input.value = state[key]; });
      }

      function toggleForm(formSelector, show, focusSelector) {
        const form = root.querySelector(formSelector);
        form.hidden = !show;
        if (show &amp;&amp; focusSelector) root.querySelector(focusSelector).focus();
      }

      root.addEventListener(&#x27;click&#x27;, event =&gt; {
        const roleTabButton = event.target.closest(&#x27;[data-role-tab]&#x27;);
        if (roleTabButton &amp;&amp; root.contains(roleTabButton)) {
          state.activeRole = roleTabButton.dataset.roleTab;
          renderRoleWorkspace();
          persistData();
        }

        const roleActionButton = event.target.closest(&#x27;[data-role-action]&#x27;);
        if (roleActionButton &amp;&amp; root.contains(roleActionButton)) {
          const action = roleActionButton.dataset.roleAction;
          if (action === &#x27;find-customer&#x27;) {
            showPage(&#x27;customers&#x27;);
            root.querySelector(&#x27;#d360-customer-search&#x27;).focus();
          }
          if (action === &#x27;new-customer&#x27;) { showPage(&#x27;customers&#x27;); openCustomerForm(null); }
          if (action === &#x27;new-project&#x27;) { showPage(&#x27;projects&#x27;); openStandaloneProjectForm(); }
          if (action === &#x27;new-measure&#x27;) startNewMeasurement();
          if (action === &#x27;team&#x27;) showPage(&#x27;team&#x27;);
          if (action === &#x27;projects&#x27;) showPage(&#x27;projects&#x27;);
          if (action === &#x27;pricing&#x27; || action === &#x27;materials&#x27;) showPage(&#x27;materials&#x27;);
        }

        const roleProjectButton = event.target.closest(&#x27;[data-role-project]&#x27;);
        if (roleProjectButton &amp;&amp; root.contains(roleProjectButton)) {
          state.selectedProjectId = roleProjectButton.dataset.roleProject;
          showPage(&#x27;projects&#x27;);
          renderProjectDetail();
        }

        const paymentButton = event.target.closest(&#x27;[data-payment-toggle]&#x27;);
        if (paymentButton &amp;&amp; root.contains(paymentButton)) {
          const project = projects.find(item =&gt; item.id === paymentButton.dataset.paymentToggle);
          if (project) {
            project.paymentStatus = project.paymentStatus === &#x27;Ödeme alındı&#x27; ? &#x27;Bekliyor&#x27; : &#x27;Ödeme alındı&#x27;;
            renderRoleWorkspace();
            persistData();
          }
        }

        const stageButton = event.target.closest(&#x27;[data-project-stage]&#x27;);
        if (stageButton &amp;&amp; root.contains(stageButton)) {
          const project = projects.find(item =&gt; item.id === stageButton.dataset.projectStage);
          if (project) {
            project.status = stageButton.dataset.nextStatus;
            renderProjects();
            renderCustomers();
            persistData();
          }
        }

        const teamEditButton = event.target.closest(&#x27;[data-team-edit]&#x27;);
        if (teamEditButton &amp;&amp; root.contains(teamEditButton)) openTeamMemberForm(teamEditButton.dataset.teamEdit);

        const teamDeleteButton = event.target.closest(&#x27;[data-team-delete]&#x27;);
        if (teamDeleteButton &amp;&amp; root.contains(teamDeleteButton)) deleteTeamMember(teamDeleteButton.dataset.teamDelete);

        const customerViewButton = event.target.closest(&#x27;[data-customer-view]&#x27;);
        if (customerViewButton &amp;&amp; root.contains(customerViewButton)) {
          state.selectedCustomerId = customerViewButton.dataset.customerView;
          renderCustomerDetail();
        }

        const customerEditButton = event.target.closest(&#x27;[data-customer-edit]&#x27;);
        if (customerEditButton &amp;&amp; root.contains(customerEditButton)) openCustomerForm(customerEditButton.dataset.customerEdit);

        const customerDeleteButton = event.target.closest(&#x27;[data-customer-delete]&#x27;);
        if (customerDeleteButton &amp;&amp; root.contains(customerDeleteButton)) deleteCustomer(customerDeleteButton.dataset.customerDelete);

        const customerProjectButton = event.target.closest(&#x27;[data-customer-project]&#x27;);
        if (customerProjectButton &amp;&amp; root.contains(customerProjectButton)) {
          showPage(&#x27;customers&#x27;);
          openCustomerProjectForm(customerProjectButton.dataset.customerProject);
        }

        const customerMeasureButton = event.target.closest(&#x27;[data-customer-measure]&#x27;);
        if (customerMeasureButton &amp;&amp; root.contains(customerMeasureButton)) openMeasurementEntry(customerMeasureButton.dataset.customerMeasure, &#x27;new&#x27;);

        const projectMeasureButton = event.target.closest(&#x27;[data-project-measure]&#x27;);
        if (projectMeasureButton &amp;&amp; root.contains(projectMeasureButton)) {
          const project = projects.find(item =&gt; item.id === projectMeasureButton.dataset.projectMeasure);
          if (project) openMeasurementEntry(project.customerId, project.id);
        }

        const projectViewButton = event.target.closest(&#x27;[data-project-view]&#x27;);
        if (projectViewButton &amp;&amp; root.contains(projectViewButton)) {
          state.selectedProjectId = projectViewButton.dataset.projectView;
          renderProjectDetail();
        }

        const systemEditButton = event.target.closest(&#x27;[data-system-edit]&#x27;);
        if (systemEditButton &amp;&amp; root.contains(systemEditButton)) openSystemForm(systemEditButton.dataset.systemEdit);

        const removeRuleButton = event.target.closest(&#x27;[data-rule-remove]&#x27;);
        if (removeRuleButton &amp;&amp; root.contains(removeRuleButton)) {
          state.systemDraftRules.splice(Number(removeRuleButton.dataset.ruleRemove), 1);
          renderSystemRules();
        }

        const nextButton = event.target.closest(&#x27;[data-step-next]&#x27;);
        if (nextButton &amp;&amp; root.contains(nextButton)) advanceWizard(Number(nextButton.dataset.stepNext));

        const backButton = event.target.closest(&#x27;[data-step-back]&#x27;);
        if (backButton &amp;&amp; root.contains(backButton)) showWizardStep(Number(backButton.dataset.stepBack));

        const wizardButton = event.target.closest(&#x27;[data-wizard-step]&#x27;);
        if (wizardButton &amp;&amp; root.contains(wizardButton) &amp;&amp; !wizardButton.disabled) showWizardStep(Number(wizardButton.dataset.wizardStep));

        const pageButton = event.target.closest(&#x27;[data-page]&#x27;);
        if (pageButton &amp;&amp; root.contains(pageButton)) {
          if (pageButton.dataset.pricingReturn === &#x27;product&#x27;) state.returnToProductAfterPricing = true;
          else if (pageButton.dataset.page === &#x27;materials&#x27;) state.returnToProductAfterPricing = false;
          showPage(pageButton.dataset.page);
        }

        const categoryButton = event.target.closest(&#x27;[data-category]&#x27;);
        if (categoryButton &amp;&amp; root.contains(categoryButton)) {
          state.category = categoryButton.dataset.category;
          renderCategories();
          renderProductGrid();
        }

        const productButton = event.target.closest(&#x27;[data-product-id]&#x27;);
        if (productButton &amp;&amp; root.contains(productButton)) {
          state.selected = productButton.dataset.productId;
          const product = selectedProduct();
          if (product.category === &#x27;shading&#x27; &amp;&amp; state.operation === &#x27;manual&#x27;) state.operation = &#x27;motor&#x27;;
          const legacySystems = { slide3200: &#x27;sys-3200&#x27;, slide4661: &#x27;sys-4661&#x27;, shutterSingle: &#x27;sys-pan42&#x27;, shutterWindowMulti: &#x27;sys-pan42&#x27;, shutterDoorMulti: &#x27;sys-pan42&#x27; };
          if (legacySystems[product.legacyRule]) state.systemId = legacySystems[product.legacyRule];
          root.querySelector(&#x27;#d360-operation&#x27;).value = state.operation;
          renderProductGrid();
          renderConfigurator();
          renderChoiceSummary();
        }

        const outputButton = event.target.closest(&#x27;[data-output]&#x27;);
        if (outputButton &amp;&amp; root.contains(outputButton)) {
          state.output = outputButton.dataset.output;
          root.querySelectorAll(&#x27;[data-output]&#x27;).forEach(button =&gt; {
            const active = button === outputButton;
            button.setAttribute(&#x27;aria-pressed&#x27;, String(active));
            button.classList.toggle(&#x27;btn-ghost&#x27;, !active);
          });
          renderConfigOutput();
        }
      });

      root.querySelector(&#x27;#d360-product-search&#x27;).addEventListener(&#x27;input&#x27;, event =&gt; {
        state.search = event.target.value;
        renderProductGrid();
      });
      root.querySelector(&#x27;#d360-clear-search&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        state.search = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-product-search&#x27;).value = &#x27;&#x27;;
        renderProductGrid();
      });
      root.querySelector(&#x27;#d360-material&#x27;).addEventListener(&#x27;change&#x27;, event =&gt; { state.material = event.target.value; renderSystemOptions(); renderProductSvg(); renderCalculation(); });
      root.querySelector(&#x27;#d360-profile-system&#x27;).addEventListener(&#x27;change&#x27;, event =&gt; { state.systemId = event.target.value; renderSystemFitStatus(); renderCalculation(); });
      root.querySelector(&#x27;#d360-glass&#x27;).addEventListener(&#x27;change&#x27;, event =&gt; { state.glass = event.target.value; renderCalculation(); });
      root.querySelector(&#x27;#d360-finish&#x27;).addEventListener(&#x27;change&#x27;, event =&gt; { state.finish = event.target.value; renderProductSvg(); renderCalculation(); });
      root.querySelector(&#x27;#d360-operation&#x27;).addEventListener(&#x27;change&#x27;, event =&gt; { state.operation = event.target.value; renderCalculation(); });
      root.querySelector(&#x27;#d360-material-filter&#x27;).addEventListener(&#x27;change&#x27;, event =&gt; { state.materialFilter = event.target.value; renderMaterialTable(); });
      root.querySelector(&#x27;#d360-measure-customer&#x27;).addEventListener(&#x27;change&#x27;, event =&gt; {
        state.measureCustomerId = event.target.value;
        state.measureProjectId = state.measureCustomerId ? &#x27;new&#x27; : &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-error&#x27;).textContent = &#x27;&#x27;;
        renderAssignmentOptions();
      });
      root.querySelector(&#x27;#d360-measure-project&#x27;).addEventListener(&#x27;change&#x27;, event =&gt; {
        state.measureProjectId = event.target.value;
        root.querySelector(&#x27;#d360-measure-error&#x27;).textContent = &#x27;&#x27;;
        renderAssignmentOptions();
      });
      root.querySelector(&#x27;#d360-measure-photo&#x27;).addEventListener(&#x27;change&#x27;, event =&gt; {
        const file = event.target.files &amp;&amp; event.target.files[0];
        root.querySelector(&#x27;#d360-measure-field-status&#x27;).textContent = file ? `${file.name} ölçü kaydına eklenecek.` : &#x27;Fotoğraf isteğe bağlıdır; poz ve not proje ekibinin tamamı tarafından görülebilir.&#x27;;
      });
      root.querySelector(&#x27;#d360-currency&#x27;).addEventListener(&#x27;change&#x27;, updateCurrencyHelp);
      root.querySelector(&#x27;#d360-save-pricing&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        if (!applyPricingSettings()) return;
        returnToProductAfterPricing();
      });
      root.querySelector(&#x27;#d360-save-prices&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        if (!applyPricingSettings()) return;
        let changed = 0;
        root.querySelectorAll(&#x27;[data-price-code]&#x27;).forEach(input =&gt; {
          const item = priceMaterials.find(entry =&gt; entry.code === input.dataset.priceCode);
          const value = Number(input.value);
          if (item &amp;&amp; Number.isFinite(value) &amp;&amp; value &gt;= 0 &amp;&amp; item.price !== value) { item.price = value; changed += 1; }
        });
        root.querySelector(&#x27;#d360-price-status&#x27;).textContent = changed ? `${changed} fiyat güncellendi ve bu oturum için kaydedildi.` : &#x27;Fiyat listesi kontrol edildi; yeni değişiklik yok.&#x27;;
        renderCalculation();
        renderProjects();
        persistData();
        returnToProductAfterPricing();
      });
      root.querySelector(&#x27;#d360-add-project&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        if (!validateMeasurements()) {
          state.maxStep = Math.max(state.maxStep, 2);
          showWizardStep(2);
          return;
        }
        const customer = customers.find(item =&gt; item.id === state.measureCustomerId);
        let project = projects.find(item =&gt; item.id === state.measureProjectId &amp;&amp; item.customerId === state.measureCustomerId);
        if (state.measureProjectId === &#x27;new&#x27;) {
          project = createProject({
            customerId: customer.id,
            name: root.querySelector(&#x27;#d360-measure-project-name&#x27;).value.trim(),
            location: root.querySelector(&#x27;#d360-measure-project-location&#x27;).value.trim(),
            status: &#x27;Ölçü alındı&#x27;
          });
          state.measureProjectId = project.id;
        }
        if (!project) {
          root.querySelector(&#x27;#d360-action-status&#x27;).textContent = &#x27;Proje kaydı oluşturulamadı. Müşteri ve proje seçimini kontrol edin.&#x27;;
          return;
        }
        const calc = calculate();
        const fieldPhoto = root.querySelector(&#x27;#d360-measure-photo&#x27;).files &amp;&amp; root.querySelector(&#x27;#d360-measure-photo&#x27;).files[0];
        project.items = Array.isArray(project.items) ? project.items : [];
        project.items.push({
          id: makeId(&#x27;itm&#x27;),
          productId: state.selected,
          productName: selectedProduct().name,
          width: state.width,
          height: state.height,
          qty: state.qty,
          material: materialTypes[state.material].label,
          materialId: state.material,
          system: selectedSystem().name,
          systemId: state.systemId,
          glass: glassLabels[state.glass],
          glassId: state.glass,
          finish: finishLabels[state.finish],
          finishId: state.finish,
          operation: operationLabels[state.operation],
