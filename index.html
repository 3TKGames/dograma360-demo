        &lt;div class=&quot;d360-print-summary&quot;&gt;
          &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Toplam ürün&lt;/span&gt;&lt;strong&gt;${num.format(items.reduce((sum, item) =&gt; sum + Number(item.qty || 0), 0))} adet&lt;/strong&gt;&lt;/div&gt;
          &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Genel toplam · KDV dahil&lt;/span&gt;&lt;strong&gt;${escapeHtml(totalLabel)}&lt;/strong&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;text-small&quot;&gt;Bu belge müşteriye sunulacak ürün görünümü ve teklif özetidir. Üretimden önce kesin ölçüler ve teknik detaylar firma tarafından tekrar kontrol edilir.&lt;/div&gt;
        &lt;div class=&quot;d360-print-signatures&quot;&gt;&lt;div class=&quot;d360-print-signature&quot;&gt;&lt;strong&gt;Firma yetkilisi&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;d360-print-signature&quot;&gt;&lt;strong&gt;Müşteri onayı&lt;/strong&gt;&lt;/div&gt;&lt;/div&gt;`;
      }

      function showCurrentCustomerPrint() {
        const calc = calculate();
        const customer = customers.find(item =&gt; item.id === state.measureCustomerId) || null;
        const project = projects.find(item =&gt; item.id === state.measureProjectId) || {
          name: root.querySelector(&#x27;#d360-measure-project-name&#x27;).value.trim() || &#x27;Yeni teklif&#x27;,
          location: root.querySelector(&#x27;#d360-measure-project-location&#x27;).value.trim()
        };
        const currentItem = {
          productId: state.selected,
          productName: selectedProduct().name,
          width: state.width,
          height: state.height,
          qty: state.qty,
          material: materialTypes[state.material].label,
          materialId: state.material,
          system: selectedSystem().name,
          systemId: state.systemId,
          glass: glassLabels[state.glass],
          glassId: state.glass,
          finish: finishLabels[state.finish],
          finishId: state.finish,
          operation: operationLabels[state.operation],
          operationId: state.operation,
          reference: root.querySelector(&#x27;#d360-measure-reference&#x27;).value.trim(),
          note: root.querySelector(&#x27;#d360-measure-note&#x27;).value.trim(),
          total: calc.grandTotal
        };
        const now = new Date();
        const dateCode = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, &#x27;0&#x27;)}${String(now.getDate()).padStart(2, &#x27;0&#x27;)}`;
        root.querySelector(&#x27;#d360-print-document&#x27;).innerHTML = buildCustomerPrint({ customer, project, items: [currentItem], total: calc.grandTotal, documentNo: `TKL-${dateCode}` });
        state.printReturnPage = &#x27;catalog&#x27;;
        showPage(&#x27;print&#x27;);
      }

      function showProjectCustomerPrint(project) {
        if (!project) return;
        const customer = customers.find(item =&gt; item.id === project.customerId) || null;
        const items = Array.isArray(project.items) ? project.items : [];
        root.querySelector(&#x27;#d360-print-document&#x27;).innerHTML = buildCustomerPrint({ customer, project, items, total: project.total, documentNo: project.no || &#x27;PROJE&#x27; });
        state.printReturnPage = &#x27;projects&#x27;;
        showPage(&#x27;print&#x27;);
      }

      function renderConfigOutput() {
        const calc = calculate();
        const target = root.querySelector(&#x27;#d360-config-output&#x27;);
        if (state.output === &#x27;cuts&#x27;) target.innerHTML = cutOutput(calc);
        else if (state.output === &#x27;offer&#x27;) target.innerHTML = offerOutput(calc);
        else target.innerHTML = materialOutput(calc);
      }

      function renderCalculation() {
        const calc = calculate();
        root.querySelector(&#x27;#d360-unit-total&#x27;).textContent = money.format(calc.totalEach);
        root.querySelector(&#x27;#d360-grand-total&#x27;).textContent = money.format(calc.grandTotal);
        root.querySelector(&#x27;#d360-material-cost&#x27;).textContent = money.format(calc.materialCostEach * state.qty);
        root.querySelector(&#x27;#d360-qty-label&#x27;).textContent = `${num.format(state.qty)} adet`;
        root.querySelector(&#x27;#d360-waste-label&#x27;).textContent = `%${num.format(calc.wastePercent)} fire · ${selectedSystem().name}`;
        root.querySelector(&#x27;#d360-offer-output&#x27;).innerHTML = offerOutput(calc);
        renderChoiceSummary();
        renderConfigOutput();
      }

      function renderConfigurator() {
        renderMeasurementModelOptions();
        renderSelected();
        renderProductSvg();
        renderCalculation();
      }

      function renderMaterialTable() {
        const list = priceMaterials.filter(item =&gt; state.materialFilter === &#x27;all&#x27; || item.group === state.materialFilter);
        root.querySelector(&#x27;#d360-material-table&#x27;).innerHTML = list.map(item =&gt; `&lt;tr&gt;&lt;td&gt;&lt;code&gt;${item.code}&lt;/code&gt;&lt;/td&gt;&lt;td&gt;${item.name}&lt;/td&gt;&lt;td&gt;${item.unit}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;label class=&quot;sr-only&quot; for=&quot;price-${item.code}&quot;&gt;${item.name} alış fiyatı&lt;/label&gt;&lt;input class=&quot;form-control d360-table-input&quot; id=&quot;price-${item.code}&quot; data-price-code=&quot;${item.code}&quot; type=&quot;number&quot; min=&quot;0&quot; step=&quot;0.01&quot; value=&quot;${item.price}&quot;&gt;&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${num.format(item.stock)}&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;);
      }

      function updateCurrencyHelp() {
        const currency = root.querySelector(&#x27;#d360-currency&#x27;).value;
        const rateInput = root.querySelector(&#x27;#d360-exchange-rate&#x27;);
        if (currency === &#x27;TRY&#x27;) {
          rateInput.value = &#x27;1&#x27;;
          rateInput.disabled = true;
          root.querySelector(&#x27;#d360-currency-help&#x27;).textContent = &#x27;TL seçili olduğu için kur otomatik olarak 1 kullanılır.&#x27;;
        } else {
          rateInput.disabled = false;
          if (currency !== state.currency) rateInput.value = &#x27;&#x27;;
          root.querySelector(&#x27;#d360-currency-help&#x27;).textContent = `TL tabanlı fiyatları ${currency} olarak göstermek için güncel kuru siz girin. Otomatik kur kullanılmaz.`;
        }
      }

      function applyPricingSettings() {
        const currency = root.querySelector(&#x27;#d360-currency&#x27;).value;
        const rate = currency === &#x27;TRY&#x27; ? 1 : Number(root.querySelector(&#x27;#d360-exchange-rate&#x27;).value);
        const profit = Number(root.querySelector(&#x27;#d360-profit-rate&#x27;).value);
        const vat = Number(root.querySelector(&#x27;#d360-vat-rate&#x27;).value);
        if (!Number.isFinite(rate) || rate &lt;= 0 || !Number.isFinite(profit) || profit &lt; 0 || !Number.isFinite(vat) || vat &lt; 0) {
          root.querySelector(&#x27;#d360-pricing-status&#x27;).textContent = &#x27;Kur, kâr ve KDV değerlerini kontrol edin.&#x27;;
          root.querySelector(&#x27;#d360-pricing-status&#x27;).classList.add(&#x27;text-destructive&#x27;);
          return false;
        }
        state.currency = currency;
        state.exchangeRate = rate;
        state.profitRate = profit;
        state.vatRate = vat;
        root.querySelector(&#x27;#d360-pricing-status&#x27;).classList.remove(&#x27;text-destructive&#x27;);
        root.querySelector(&#x27;#d360-pricing-status&#x27;).textContent = `${currency} · %${num.format(profit)} kâr · %${num.format(vat)} KDV tüm hesaplara uygulandı.`;
        renderCalculation();
        renderProjects();
        renderCustomers();
        persistData();
        return true;
      }

      function returnToProductAfterPricing() {
        if (!state.returnToProductAfterPricing) return;
        state.returnToProductAfterPricing = false;
        showPage(&#x27;catalog&#x27;);
        showWizardStep(state.step);
        root.querySelector(&#x27;#d360-action-status&#x27;).textContent = `Fiyat ayarları kaydedildi: ${state.currency} · %${num.format(state.profitRate)} kâr · %${num.format(state.vatRate)} KDV.`;
      }

      function projectItemCount(project) {
        return (project.items || []).reduce((sum, item) =&gt; sum + Number(item.qty || 0), 0);
      }

      function projectItemTotal(project) {
        return (project.items || []).reduce((sum, item) =&gt; sum + Number(item.total || 0), 0);
      }

      function nextProjectNumber() {
        const highest = projects.reduce((max, project) =&gt; {
          const value = Number(String(project.no || &#x27;&#x27;).replace(/\D/g, &#x27;&#x27;));
          return Number.isFinite(value) ? Math.max(max, value) : max;
        }, 0);
        return `PRJ-${String(highest + 1).padStart(4, &#x27;0&#x27;)}`;
      }

      function createProject({ customerId, name, location, status = &#x27;Ölçü alındı&#x27;, estimatedTotal = 0 }) {
        const customer = customers.find(item =&gt; item.id === customerId);
        if (!customer) return null;
        const project = {
          id: makeId(&#x27;prj&#x27;),
          no: nextProjectNumber(),
          customerId: customer.id,
          customer: customer.name,
          name,
          location,
          status,
          estimatedTotal: Number(estimatedTotal) || 0,
          products: 0,
          total: Number(estimatedTotal) || 0,
          items: []
        };
        projects.unshift(project);
        return project;
      }

      function refreshProjectTotals(project) {
        project.items = Array.isArray(project.items) ? project.items : [];
        project.products = projectItemCount(project);
        project.total = Number(project.estimatedTotal || 0) + projectItemTotal(project);
      }

      function savedItemMaterialRows(item) {
        if (item.measurementOnly) return [];
        if (Array.isArray(item.orderRows) &amp;&amp; item.orderRows.length) return item.orderRows.map(row =&gt; ({ ...row, qty: Number(row.qty) || 0 }));
        const product = products.find(entry =&gt; entry.id === item.productId);
        if (!product) return [];
        const materialId = item.materialId || Object.keys(materialTypes).find(key =&gt; materialTypes[key].label === item.material) || product.materials[0];
        const glassId = item.glassId || Object.keys(glassLabels).find(key =&gt; glassLabels[key] === item.glass) || &#x27;double&#x27;;
        const operationId = item.operationId || Object.keys(operationLabels).find(key =&gt; operationLabels[key] === item.operation) || &#x27;manual&#x27;;
        const system = systems.find(entry =&gt; entry.id === item.systemId) || systems.find(entry =&gt; entry.name === item.system);
        const wasteRule = system &amp;&amp; system.rules.find(rule =&gt; rule.type === &#x27;wastePercent&#x27;);
        return materialRowsForConfiguration({
          product,
          metrics: profileMetrics(product, Number(item.width) || 1, Number(item.height) || 1),
          materialId,
          glassId,
          operationId,
          qty: Number(item.qty) || 1,
          wastePercent: wasteRule ? Number(wasteRule.value) : 8,
          width: Number(item.width) || 1
        });
      }

      function projectOrderRows(project) {
        const grouped = new Map();
        (project.items || []).flatMap(savedItemMaterialRows).forEach(row =&gt; {
          const key = `${row.code}|${row.unit}`;
          const existing = grouped.get(key);
          if (existing) existing.qty += Number(row.qty) || 0;
          else grouped.set(key, { ...row, qty: Number(row.qty) || 0 });
        });
        return [...grouped.values()].sort((a, b) =&gt; a.code.localeCompare(b.code, &#x27;tr&#x27;));
      }

      function combinedOrderRows(projectList = projects) {
        const grouped = new Map();
        projectList.flatMap(projectOrderRows).forEach(row =&gt; {
          const key = `${row.code}|${row.unit}`;
          const existing = grouped.get(key);
          if (existing) existing.qty += Number(row.qty) || 0;
          else grouped.set(key, { ...row, qty: Number(row.qty) || 0 });
        });
        return [...grouped.values()].sort((a, b) =&gt; a.code.localeCompare(b.code, &#x27;tr&#x27;));
      }

      function setDashboardStat(index, label, value, context) {
        const names = [&#x27;one&#x27;, &#x27;two&#x27;, &#x27;three&#x27;];
        const values = [&#x27;#d360-dashboard-project-count&#x27;, &#x27;#d360-dashboard-item-count&#x27;, &#x27;#d360-dashboard-total&#x27;];
        root.querySelector(`#d360-dashboard-stat-${names[index]}-label`).textContent = label;
        root.querySelector(values[index]).textContent = value;
        root.querySelector(`#d360-dashboard-stat-${names[index]}-context`).textContent = context;
      }

      function projectTableRows(list, action = &#x27;open&#x27;) {
        if (!list.length) return &#x27;&lt;tr&gt;&lt;td colspan=&quot;5&quot; class=&quot;d360-empty&quot;&gt;Bu çalışma alanında bekleyen kayıt yok.&lt;/td&gt;&lt;/tr&gt;&#x27;;
        return list.map(project =&gt; {
          const customer = customers.find(item =&gt; item.id === project.customerId);
          const button = action === &#x27;production&#x27;
            ? `&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-project-stage=&quot;${project.id}&quot; data-next-status=&quot;Üretimde&quot;&gt;Üretime al&lt;/button&gt;`
            : action === &#x27;installation&#x27;
              ? `&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-project-stage=&quot;${project.id}&quot; data-next-status=&quot;${project.status === &#x27;Montajda&#x27; ? &#x27;Teslim edildi&#x27; : &#x27;Montajda&#x27;}&quot;&gt;${project.status === &#x27;Montajda&#x27; ? &#x27;Teslim et&#x27; : &#x27;Montaja al&#x27;}&lt;/button&gt;`
              : `&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-role-project=&quot;${project.id}&quot;&gt;Projeyi aç&lt;/button&gt;`;
          return `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(project.name)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(project.location || &#x27;Konum yok&#x27;)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(customer ? customer.name : &#x27;—&#x27;)}&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(project.status)}&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${project.products}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${button}&lt;/td&gt;&lt;/tr&gt;`;
        }).join(&#x27;&#x27;);
      }

      function renderWorkflowLane() {
        const stages = [
          { label: &#x27;Müşteri&#x27;, count: customers.length },
          { label: &#x27;Ölçü bekliyor&#x27;, count: projects.filter(project =&gt; project.status === &#x27;Ölçü bekliyor&#x27;).length },
          { label: &#x27;Teklif&#x27;, count: projects.filter(project =&gt; /Ölçü alındı|Teklif/.test(project.status)).length },
          { label: &#x27;Onay&#x27;, count: projects.filter(project =&gt; project.status === &#x27;Onay bekliyor&#x27;).length },
          { label: &#x27;Üretim&#x27;, count: projects.filter(project =&gt; project.status === &#x27;Üretimde&#x27;).length },
          { label: &#x27;Montaj&#x27;, count: projects.filter(project =&gt; project.status === &#x27;Montajda&#x27;).length },
          { label: &#x27;Teslim&#x27;, count: projects.filter(project =&gt; project.status === &#x27;Teslim edildi&#x27;).length }
        ];
        root.querySelector(&#x27;#d360-workflow-lane&#x27;).innerHTML = stages.map(stage =&gt; `&lt;div class=&quot;d360-workflow-step&quot;&gt;&lt;span class=&quot;text-small&quot;&gt;${stage.label}&lt;/span&gt;&lt;strong&gt;${num.format(stage.count)}&lt;/strong&gt;&lt;/div&gt;`).join(&#x27;&#x27;);
      }

      function renderRoleWorkspace() {

        } else if (role.id === &#x27;crm&#x27;) {

          setDashboardStat(2, &#x27;Alınan ölçü / ürün&#x27;, productTotal, &#x27;Fotoğraf ve notla birlikte&#x27;);
          actions.innerHTML = &#x27;&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-role-action=&quot;new-customer&quot;&gt;Müşteri yoksa kaydet&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-role-action=&quot;new-measure&quot;&gt;Yeni ölçü al&lt;/button&gt;&#x27;;
          content.innerHTML = customers.length ? `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Müşteri&lt;/th&gt;&lt;th&gt;Telefon&lt;/th&gt;&lt;th&gt;Proje&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Hızlı işlem&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${customers.map(customer =&gt; `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(customer.name)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(customer.status || &#x27;Aktif&#x27;)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(customer.phone)}&lt;/td&gt;&lt;td&gt;${customerProjects(customer.id).length}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-customer-measure=&quot;${customer.id}&quot;&gt;&lt;i data-lucide=&quot;ruler&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;Ölçü ekle&lt;/button&gt;&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;` : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Müşteri bulunamadı. Usta “Müşteri yoksa kaydet” ile sahada yeni kayıt açabilir.&lt;/div&gt;&#x27;;

          actions.innerHTML = &#x27;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-role-action=&quot;pricing&quot;&gt;Fiyat, KDV ve kur&lt;/button&gt;&#x27;;
          content.innerHTML = projects.length ? `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Proje&lt;/th&gt;&lt;th&gt;Müşteri&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Tutar&lt;/th&gt;&lt;th&gt;Ödeme&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;İşlem&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${projects.map(project =&gt; `&lt;tr&gt;&lt;td&gt;${escapeHtml(project.name)}&lt;/td&gt;&lt;td&gt;${escapeHtml(project.customer || &#x27;—&#x27;)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(project.total)}&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(project.paymentStatus || &#x27;Bekliyor&#x27;)}&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-payment-toggle=&quot;${project.id}&quot;&gt;${project.paymentStatus === &#x27;Ödeme alındı&#x27; ? &#x27;Bekliyor yap&#x27; : &#x27;Ödeme alındı&#x27;}&lt;/button&gt;&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;` : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Muhasebe takibi için henüz proje yok.&lt;/div&gt;&#x27;;
        } else if (role.id === &#x27;production&#x27;) {
          const ready = projects.filter(project =&gt; project.products &gt; 0 &amp;&amp; project.status !== &#x27;Teslim edildi&#x27;);
          setDashboardStat(0, &#x27;Üretime hazır proje&#x27;, ready.length, &#x27;Ölçüsü bulunan işler&#x27;);
          setDashboardStat(1, &#x27;Üretilecek ürün&#x27;, ready.reduce((sum, project) =&gt; sum + project.products, 0), &#x27;Toplam eleman&#x27;);
          setDashboardStat(2, &#x27;Üretimde&#x27;, projects.filter(project =&gt; project.status === &#x27;Üretimde&#x27;).length, &#x27;Anlık iş durumu&#x27;);
          actions.innerHTML = &#x27;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-role-action=&quot;projects&quot;&gt;Kesim ve üretim listeleri&lt;/button&gt;&#x27;;
          content.innerHTML = `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Proje&lt;/th&gt;&lt;th&gt;Müşteri&lt;/th&gt;&lt;th&gt;Durum&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Ürün&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;İşlem&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${projectTableRows(ready, &#x27;production&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`;
        } else if (role.id === &#x27;procurement&#x27;) {
          const rows = combinedOrderRows(projects.filter(project =&gt; project.status !== &#x27;Teslim edildi&#x27;));
          const purchaseTotal = rows.reduce((sum, row) =&gt; sum + rowPurchaseTotal(row), 0);
          const lowStock = rows.filter(row =&gt; { const material = catalogMaterial(row.code); return material &amp;&amp; Number(material.stock) &lt; Number(row.qty); }).length;
          setDashboardStat(0, &#x27;Sipariş kalemi&#x27;, rows.length, &#x27;Birleşik proje ihtiyacı&#x27;);
          setDashboardStat(1, &#x27;Tahmini alış toplamı&#x27;, money.format(purchaseTotal), &#x27;Güncel fiyat listesi&#x27;);
          setDashboardStat(2, &#x27;Stok açığı&#x27;, lowStock, &#x27;Mevcut stoktan fazla ihtiyaç&#x27;);
          actions.innerHTML = &#x27;&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-role-action=&quot;materials&quot;&gt;Stok ve fiyatlar&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-role-action=&quot;projects&quot;&gt;Proje sipariş listeleri&lt;/button&gt;&#x27;;
          content.innerHTML = rows.length ? `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Kod&lt;/th&gt;&lt;th&gt;Malzeme / aksesuar&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;İhtiyaç&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Stok&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Alış tutarı&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${rows.map(row =&gt; { const material = catalogMaterial(row.code); return `&lt;tr&gt;&lt;td&gt;&lt;code&gt;${escapeHtml(row.code)}&lt;/code&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(row.name)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;strong&gt;${num.format(row.qty)} ${escapeHtml(row.unit)}&lt;/strong&gt;&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${material ? num.format(material.stock) : &#x27;—&#x27;}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(rowPurchaseTotal(row))}&lt;/td&gt;&lt;/tr&gt;`; }).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;` : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Açık projelere ölçü eklendiğinde birleşik satın alma listesi burada oluşacak.&lt;/div&gt;&#x27;;
        } else {
          const install = projects.filter(project =&gt; /Üretimde|Montajda/.test(project.status));
          setDashboardStat(0, &#x27;Montaj kuyruğu&#x27;, install.length, &#x27;Üretimden çıkan işler&#x27;);
          setDashboardStat(1, &#x27;Montajda&#x27;, projects.filter(project =&gt; project.status === &#x27;Montajda&#x27;).length, &#x27;Sahadaki ekipler&#x27;);
          setDashboardStat(2, &#x27;Teslim edilen&#x27;, projects.filter(project =&gt; project.status === &#x27;Teslim edildi&#x27;).length, &#x27;Servis geçmişine hazır&#x27;);
          actions.innerHTML = &#x27;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-role-action=&quot;projects&quot;&gt;Montaj projelerini aç&lt;/button&gt;&#x27;;
          content.innerHTML = `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Proje&lt;/th&gt;&lt;th&gt;Müşteri&lt;/th&gt;&lt;th&gt;Durum&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Ürün&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;İşlem&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${projectTableRows(install, &#x27;installation&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`;
        }
        renderWorkflowLane();
        ensureIcons();
      }

      function renderProjectDetail() {
        const detail = root.querySelector(&#x27;#d360-project-detail&#x27;);
        const project = projects.find(item =&gt; item.id === state.selectedProjectId);
        if (!project) {
          detail.hidden = true;
          return;
        }
        const customer = customers.find(item =&gt; item.id === project.customerId);
        detail.hidden = false;
        root.querySelector(&#x27;#d360-project-detail-name&#x27;).textContent = `${project.no} · ${project.name}`;
        root.querySelector(&#x27;#d360-project-detail-meta&#x27;).textContent = `${customer ? customer.name : &#x27;Müşteri bulunamadı&#x27;} · ${project.location || &#x27;Konum belirtilmedi&#x27;} · ${project.products} ürün`;
        const items = project.items || [];
        root.querySelector(&#x27;#d360-project-print&#x27;).disabled = !items.length;
        root.querySelector(&#x27;#d360-project-items&#x27;).innerHTML = items.length
          ? `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Ürün, poz ve ölçü&lt;/th&gt;&lt;th&gt;Sistem / saha kaydı&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Adet&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Tutar&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${items.map(item =&gt; `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(item.productName)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(item.reference || &#x27;Poz belirtilmedi&#x27;)} · ${num.format(item.width)} × ${num.format(item.height)} mm · ${escapeHtml(item.addedAt)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${item.measurementOnly ? &#x27;&lt;span class=&quot;viz-badge&quot;&gt;Teknik seçim bekliyor&lt;/span&gt;&#x27; : escapeHtml(item.system)}&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(item.material)} · ${escapeHtml(item.glass)}&lt;/div&gt;${item.note ? `&lt;div class=&quot;text-small&quot;&gt;Not: ${escapeHtml(item.note)}&lt;/div&gt;` : &#x27;&#x27;}${item.photoName ? `&lt;div class=&quot;text-small&quot;&gt;Fotoğraf: ${escapeHtml(item.photoName)}&lt;/div&gt;` : &#x27;&#x27;}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${num.format(item.qty)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${item.measurementOnly ? &#x27;—&#x27; : money.format(item.total)}&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`
          : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Bu projede henüz ölçü yok. “Bu projeye ölçü ekle” ile ustanın ölçü girişine geçin.&lt;/div&gt;&#x27;;
        const orderRows = projectOrderRows(project);
        root.querySelector(&#x27;#d360-order-count&#x27;).textContent = `${orderRows.length} kalem`;
        root.querySelector(&#x27;#d360-project-order-list&#x27;).innerHTML = orderRows.length
          ? `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Kod&lt;/th&gt;&lt;th&gt;Sipariş edilecek malzeme / aksesuar&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Toplam miktar&lt;/th&gt;&lt;th&gt;Birim&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Alış tutarı&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${orderRows.map(row =&gt; `&lt;tr&gt;&lt;td&gt;&lt;code&gt;${escapeHtml(row.code)}&lt;/code&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(row.name)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;strong&gt;${num.format(row.qty)}&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(row.unit)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(rowPurchaseTotal(row))}&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;tfoot&gt;&lt;tr&gt;&lt;th colspan=&quot;4&quot;&gt;Tahmini malzeme sipariş toplamı&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;${money.format(orderRows.reduce((sum, row) =&gt; sum + rowPurchaseTotal(row), 0))}&lt;/th&gt;&lt;/tr&gt;&lt;/tfoot&gt;&lt;/table&gt;&lt;/div&gt;`
          : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Projeye ilk ölçü kaydedildiğinde sipariş listesi burada otomatik oluşacak.&lt;/div&gt;&#x27;;
      }

      function renderProjectCustomerOptions() {
        const select = root.querySelector(&#x27;#d360-standalone-project-customer&#x27;);
        select.innerHTML = customers.length
          ? `&lt;option value=&quot;&quot;&gt;Müşteri seçin&lt;/option&gt;${customers.map(customer =&gt; `&lt;option value=&quot;${customer.id}&quot;&gt;${escapeHtml(customer.name)} · ${escapeHtml(customer.status || &#x27;Aktif&#x27;)} · ${escapeHtml(customer.phone)}&lt;/option&gt;`).join(&#x27;&#x27;)}`
          : &#x27;&lt;option value=&quot;&quot;&gt;Önce müşteri ekleyin&lt;/option&gt;&#x27;;
        select.disabled = !customers.length;
      }

      function renderAssignmentOptions() {
        const customerSelect = root.querySelector(&#x27;#d360-measure-customer&#x27;);
        const projectSelect = root.querySelector(&#x27;#d360-measure-project&#x27;);
        const newProjectFields = root.querySelector(&#x27;#d360-new-measure-project&#x27;);
        const help = root.querySelector(&#x27;#d360-measure-assignment-help&#x27;);
        customerSelect.innerHTML = customers.length
          ? `&lt;option value=&quot;&quot;&gt;Müşteri seçin&lt;/option&gt;${customers.map(customer =&gt; `&lt;option value=&quot;${customer.id}&quot;&gt;${escapeHtml(customer.name)} · ${escapeHtml(customer.status || &#x27;Aktif&#x27;)} · ${escapeHtml(customer.phone)}&lt;/option&gt;`).join(&#x27;&#x27;)}`
          : &#x27;&lt;option value=&quot;&quot;&gt;Önce müşteri ekleyin&lt;/option&gt;&#x27;;
        customerSelect.disabled = !customers.length;
        if (!customers.some(customer =&gt; customer.id === state.measureCustomerId)) state.measureCustomerId = &#x27;&#x27;;
        customerSelect.value = state.measureCustomerId;

        if (!state.measureCustomerId) {
          state.measureProjectId = &#x27;&#x27;;
          projectSelect.innerHTML = &#x27;&lt;option value=&quot;&quot;&gt;Önce müşteri seçin&lt;/option&gt;&#x27;;
          projectSelect.disabled = true;
          newProjectFields.hidden = true;
          help.textContent = customers.length ? &#x27;Ölçünün kimin hesabına kaydedileceğini seçin.&#x27; : &#x27;Önce Müşteriler bölümünden müşteri ekleyin; sonra bu ekrana dönün.&#x27;;
          renderProjectCustomerOptions();
          renderMeasurementBatch();
          return;
        }

        const customer = customers.find(item =&gt; item.id === state.measureCustomerId);
        const list = projects.filter(project =&gt; project.customerId === state.measureCustomerId);
        projectSelect.disabled = false;
        projectSelect.innerHTML = `&lt;option value=&quot;new&quot;&gt;+ Yeni proje oluştur&lt;/option&gt;${list.map(project =&gt; `&lt;option value=&quot;${project.id}&quot;&gt;${escapeHtml(project.name)} · ${escapeHtml(project.location || &#x27;Konum yok&#x27;)}&lt;/option&gt;`).join(&#x27;&#x27;)}`;
        if (state.measureProjectId !== &#x27;new&#x27; &amp;&amp; !list.some(project =&gt; project.id === state.measureProjectId)) state.measureProjectId = &#x27;new&#x27;;
        if (!state.measureProjectId) state.measureProjectId = &#x27;new&#x27;;
        projectSelect.value = state.measureProjectId;
        newProjectFields.hidden = state.measureProjectId !== &#x27;new&#x27;;
        const project = list.find(item =&gt; item.id === state.measureProjectId);
        help.textContent = project
          ? `Bu ölçü ${customer.name} / ${project.name} projesine eklenecek.`
          : `${customer.name} için yeni bir proje oluşturulacak; proje adı ve konumu zorunludur.`;
        renderProjectCustomerOptions();
        renderMeasurementBatch();
      }

      function renderMeasurementBatch(message = &#x27;&#x27;) {
        const table = root.querySelector(&#x27;#d360-measure-list-table&#x27;);
        const count = root.querySelector(&#x27;#d360-measure-list-count&#x27;);
        const status = root.querySelector(&#x27;#d360-measure-list-status&#x27;);
        const openButton = root.querySelector(&#x27;#d360-open-measure-project&#x27;);
        if (!table || !count || !status || !openButton) return;
        const project = projects.find(item =&gt; item.id === state.measureProjectId &amp;&amp; item.customerId === state.measureCustomerId);
        const items = project &amp;&amp; Array.isArray(project.items) ? project.items : [];
        count.textContent = project ? `${items.length} ölçü · ${projectItemCount(project)} adet` : &#x27;0 ölçü kaydı&#x27;;
        openButton.disabled = !project;
        if (!project) {
          table.innerHTML = `&lt;tr&gt;&lt;td colspan=&quot;5&quot; class=&quot;d360-empty&quot;&gt;${state.measureProjectId === &#x27;new&#x27; ? &#x27;İlk ölçüyü eklediğinizde yeni proje ve ölçü listesi birlikte oluşturulacak.&#x27; : &#x27;Önce müşteri ve proje seçin.&#x27;}&lt;/td&gt;&lt;/tr&gt;`;
          status.textContent = message || &#x27;Bir evdeki tüm kapı ve pencereleri bu ekrandan peş peşe kaydedebilirsiniz.&#x27;;
          return;
        }
        table.innerHTML = items.length ? items.map((item, index) =&gt; {
          if (!item.id) item.id = makeId(&#x27;itm&#x27;);
          return `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(item.reference || `Ölçü ${index + 1}`)}&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(item.productName)}${item.measurementOnly ? &#x27;&lt;div class=&quot;text-small&quot;&gt;Teknik seçim bekliyor&lt;/div&gt;&#x27; : &#x27;&lt;div class=&quot;text-small&quot;&gt;Fiyatlandırıldı&lt;/div&gt;&#x27;}&lt;/td&gt;&lt;td&gt;${num.format(item.width)} × ${num.format(item.height)} mm&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${num.format(item.qty)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost text-destructive&quot; data-measure-remove=&quot;${item.id}&quot;&gt;Kaldır&lt;/button&gt;&lt;/td&gt;&lt;/tr&gt;`;
        }).join(&#x27;&#x27;) : &#x27;&lt;tr&gt;&lt;td colspan=&quot;5&quot; class=&quot;d360-empty&quot;&gt;Bu projede henüz ölçü yok. İlk kapı veya pencereyi ekleyin.&lt;/td&gt;&lt;/tr&gt;&#x27;;
        status.textContent = message || `${project.name} açık. Yeni modeli ve ölçüyü girip aynı düğmeye tekrar basın.`;
      }

      function resolveMeasurementProject() {
        const customer = customers.find(item =&gt; item.id === state.measureCustomerId);
        if (!customer) return null;
        let project = projects.find(item =&gt; item.id === state.measureProjectId &amp;&amp; item.customerId === state.measureCustomerId);
        if (state.measureProjectId === &#x27;new&#x27;) {
          project = createProject({
            customerId: customer.id,
            name: root.querySelector(&#x27;#d360-measure-project-name&#x27;).value.trim(),
            location: root.querySelector(&#x27;#d360-measure-project-location&#x27;).value.trim(),
            status: &#x27;Ölçü alındı&#x27;
          });
          if (project) state.measureProjectId = project.id;
        }
        return project || null;
      }

      function addQuickMeasurement() {
        if (!validateMeasurements()) return;
        const customer = customers.find(item =&gt; item.id === state.measureCustomerId);
        const project = resolveMeasurementProject();
        if (!customer || !project) {
          root.querySelector(&#x27;#d360-measure-error&#x27;).textContent = &#x27;Proje oluşturulamadı. Müşteri ve proje bilgilerini kontrol edin.&#x27;;
          return;
        }
        const fieldPhoto = root.querySelector(&#x27;#d360-measure-photo&#x27;).files &amp;&amp; root.querySelector(&#x27;#d360-measure-photo&#x27;).files[0];
        project.items = Array.isArray(project.items) ? project.items : [];
        project.items.push({
          id: makeId(&#x27;itm&#x27;),
          measurementOnly: true,
          productId: state.selected,
          productName: selectedProduct().name,
          width: state.width,
          height: state.height,
          qty: state.qty,
          material: &#x27;Teknik seçim bekliyor&#x27;,
          materialId: &#x27;&#x27;,
          system: &#x27;Teknik seçim bekliyor&#x27;,
          systemId: &#x27;&#x27;,
          glass: &#x27;Henüz seçilmedi&#x27;,
          glassId: &#x27;&#x27;,
          finish: &#x27;Henüz seçilmedi&#x27;,
          finishId: &#x27;&#x27;,
          operation: &#x27;Henüz seçilmedi&#x27;,
          operationId: &#x27;&#x27;,
          reference: root.querySelector(&#x27;#d360-measure-reference&#x27;).value.trim(),
          note: root.querySelector(&#x27;#d360-measure-note&#x27;).value.trim(),
          photoName: fieldPhoto ? fieldPhoto.name : &#x27;&#x27;,
          orderRows: [],
          total: 0,
          addedAt: new Date().toLocaleDateString(&#x27;tr-TR&#x27;)
        });
        project.status = &#x27;Ölçü alındı&#x27;;
        refreshProjectTotals(project);
        state.selectedProjectId = project.id;
        state.selectedCustomerId = customer.id;
        state.projectItems = project.products;
        root.querySelector(&#x27;#d360-project-badge&#x27;).textContent = `${project.name} · ${project.products} ürün`;
        root.querySelector(&#x27;#d360-measure-reference&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-note&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-photo&#x27;).value = &#x27;&#x27;;
        state.qty = 1;
        root.querySelector(&#x27;#d360-qty&#x27;).value = &#x27;1&#x27;;
        renderChoiceSummary();
        renderProjects();
        renderCustomers();
        renderMeasurementBatch(`${selectedProduct().name} ölçüsü eklendi. Sıradaki kapı veya pencerenin modelini ve ölçüsünü girin.`);
        persistData();
      }

      function renderProjects() {
        projects.forEach(project =&gt; {
          if (!project.id) project.id = makeId(&#x27;prj&#x27;);
          const customer = customers.find(item =&gt; item.id === project.customerId);
          if (customer) project.customer = customer.name;
          refreshProjectTotals(project);
        });
        const rows = projects.length
          ? projects.map(project =&gt; `&lt;tr&gt;&lt;td&gt;&lt;code&gt;${escapeHtml(project.no)}&lt;/code&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(project.name)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(project.customer || &#x27;—&#x27;)}&lt;/td&gt;&lt;td&gt;${escapeHtml(project.location || &#x27;—&#x27;)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${project.products}&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(project.status)}&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(project.total)}&lt;/td&gt;&lt;td&gt;&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-project-view=&quot;${project.id}&quot;&gt;Aç&lt;/button&gt;&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)
          : &#x27;&lt;tr&gt;&lt;td colspan=&quot;7&quot; class=&quot;d360-empty&quot;&gt;Henüz proje yok. “Yeni proje” ile müşteri ve konum bilgilerini girerek başlayın.&lt;/td&gt;&lt;/tr&gt;&#x27;;
        root.querySelector(&#x27;#d360-project-table&#x27;).innerHTML = rows;
        renderProjectDetail();
        renderAssignmentOptions();
        renderRoleWorkspace();
        ensureIcons();
      }

      function customerProjects(customerId) {
        return projects.filter(project =&gt; project.customerId === customerId);
      }

      function deleteCustomer(customerId) {
        const customer = customers.find(item =&gt; item.id === customerId);
        if (!customer) return;
        const linkedProjects = customerProjects(customerId);
        const detail = linkedProjects.length
          ? ` Bu müşteriye bağlı ${linkedProjects.length} proje ve içlerindeki bütün ölçüler de silinecek.`
          : &#x27;&#x27;;
        if (!globalThis.confirm(`${customer.name} müşterisini silmek istediğinize emin misiniz?${detail}`)) return;
        const deletedProjectIds = new Set(linkedProjects.map(project =&gt; project.id));
        for (let index = projects.length - 1; index &gt;= 0; index -= 1) if (projects[index].customerId === customerId) projects.splice(index, 1);
        customers.splice(customers.findIndex(item =&gt; item.id === customerId), 1);
        if (state.selectedCustomerId === customerId) state.selectedCustomerId = null;
        if (state.editingCustomerId === customerId) state.editingCustomerId = null;
        if (state.projectCustomerId === customerId) state.projectCustomerId = null;
        if (state.measureCustomerId === customerId) {
          state.measureCustomerId = &#x27;&#x27;;
          state.measureProjectId = &#x27;&#x27;;
        }
        if (deletedProjectIds.has(state.selectedProjectId)) state.selectedProjectId = null;
        toggleForm(&#x27;#d360-customer-form&#x27;, false);
        toggleForm(&#x27;#d360-customer-project-form&#x27;, false);
        renderCustomers();
        renderProjects();
        persistData();
      }

      function renderCustomers() {
        const customerQuery = state.customerSearch.trim().toLocaleLowerCase(&#x27;tr-TR&#x27;);
        const visibleCustomers = customers.filter(customer =&gt; `${customer.name} ${customer.phone} ${customer.email || &#x27;&#x27;}`.toLocaleLowerCase(&#x27;tr-TR&#x27;).includes(customerQuery));
        root.querySelector(&#x27;#d360-customer-result-count&#x27;).textContent = `${visibleCustomers.length} müşteri`;
        root.querySelector(&#x27;#d360-customer-table&#x27;).innerHTML = visibleCustomers.length ? visibleCustomers.map(customer =&gt; {
          if (!customer.status) customer.status = &#x27;Aktif&#x27;;
          return `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(customer.name)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(customer.email || &#x27;E-posta yok&#x27;)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(customer.phone)}&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(customer.status)}&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;div class=&quot;d360-action-cell&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-customer-measure=&quot;${customer.id}&quot;&gt;&lt;i data-lucide=&quot;ruler&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;Ölçü ekle&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-customer-view=&quot;${customer.id}&quot;&gt;Müşteriyi aç&lt;/button&gt;&lt;/div&gt;&lt;/td&gt;&lt;/tr&gt;`;
        }).join(&#x27;&#x27;) : `&lt;tr&gt;&lt;td colspan=&quot;4&quot; class=&quot;d360-empty&quot;&gt;${customers.length ? &#x27;Aradığınız müşteri bulunamadı. Yazımı kontrol edin veya yeni müşteri kaydedin.&#x27; : &#x27;Henüz müşteri yok. “Müşteri listede yok” düğmesiyle ilk kaydı oluşturun.&#x27;}&lt;/td&gt;&lt;/tr&gt;`;
        renderCustomerDetail();
        renderAssignmentOptions();
        ensureIcons();
      }

      function renderCustomerDetail() {
        const detail = root.querySelector(&#x27;#d360-customer-detail&#x27;);
        const customer = customers.find(item =&gt; item.id === state.selectedCustomerId);
        const editButton = root.querySelector(&#x27;#d360-detail-edit-customer&#x27;);
        const projectButton = root.querySelector(&#x27;#d360-detail-add-project&#x27;);

      function renderSystems() {
        const brands = [...new Set(systems.map(system =&gt; system.brand || &#x27;Özel sistem&#x27;))].sort((a, b) =&gt; a.localeCompare(b, &#x27;tr&#x27;));
        const brandFilter = root.querySelector(&#x27;#d360-system-brand-filter&#x27;);
        brandFilter.innerHTML = &#x27;&lt;option value=&quot;all&quot;&gt;Tüm markalar&lt;/option&gt;&#x27; + brands.map(brand =&gt; `&lt;option value=&quot;${escapeHtml(brand)}&quot;&gt;${escapeHtml(brand)}&lt;/option&gt;`).join(&#x27;&#x27;);
        brandFilter.value = brands.includes(state.systemBrandFilter) ? state.systemBrandFilter : &#x27;all&#x27;;
        state.systemBrandFilter = brandFilter.value;
        const query = state.systemSearch.trim().toLocaleLowerCase(&#x27;tr-TR&#x27;);
        const list = systems.filter(system =&gt; {
          const searchable = `${system.brand || &#x27;&#x27;} ${system.name} ${system.region || &#x27;&#x27;} ${systemApplications(system).map(application =&gt; applicationLabels[application] || application).join(&#x27; &#x27;)}`.toLocaleLowerCase(&#x27;tr-TR&#x27;);
          const brandMatch = state.systemBrandFilter === &#x27;all&#x27; || (system.brand || &#x27;Özel sistem&#x27;) === state.systemBrandFilter;
          const applicationMatch = state.systemApplicationFilter === &#x27;all&#x27; || systemApplications(system).includes(&#x27;all&#x27;) || systemApplications(system).includes(state.systemApplicationFilter);
          const readyMatch = state.systemReadyFilter === &#x27;all&#x27; || (state.systemReadyFilter === &#x27;ready&#x27; ? system.technicalReady : !system.technicalReady);
          return (!query || searchable.includes(query)) &amp;&amp; brandMatch &amp;&amp; applicationMatch &amp;&amp; readyMatch;
        });
        root.querySelector(&#x27;#d360-system-result-count&#x27;).textContent = `${list.length} sistem`;
        const readyCount = systems.filter(system =&gt; system.technicalReady).length;
        root.querySelector(&#x27;#d360-system-library-summary&#x27;).textContent = `${brands.length} marka · ${readyCount} üretim kuralı hazır · ${systems.length - readyCount} seri teknik katalog bekliyor`;
        root.querySelector(&#x27;#d360-system-table&#x27;).innerHTML = list.length ? list.map(system =&gt; {
          const materials = systemMaterials(system).map(material =&gt; material === &#x27;all&#x27; ? &#x27;Tüm malzemeler&#x27; : (materialTypes[material] ? materialTypes[material].label : material)).join(&#x27; / &#x27;);
          const applications = systemApplications(system).map(application =&gt; applicationLabels[application] || application).join(&#x27;, &#x27;);
          const verification = system.technicalReady ? &#x27;Üretime hazır&#x27; : (system.verification === &#x27;archive&#x27; ? &#x27;Arşiv eşleşti · kural bekliyor&#x27; : &#x27;Seri doğrulandı · kural bekliyor&#x27;);
          return `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(system.brand || &#x27;Özel sistem&#x27;)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(system.name)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(system.region || &#x27;—&#x27;)}&lt;/td&gt;&lt;td&gt;${escapeHtml(applications)}&lt;/td&gt;&lt;td&gt;${escapeHtml(materials)}&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(verification)}&lt;/span&gt;&lt;div class=&quot;text-small&quot;&gt;${system.rules.length} kural&lt;/div&gt;&lt;/td&gt;&lt;td&gt;&lt;div class=&quot;d360-action-cell&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-system-edit=&quot;${system.id}&quot;&gt;Düzenle&lt;/button&gt;&lt;/div&gt;&lt;/td&gt;&lt;/tr&gt;`;
        }).join(&#x27;&#x27;) : &#x27;&lt;tr&gt;&lt;td colspan=&quot;6&quot; class=&quot;d360-empty&quot;&gt;Bu filtrelere uygun sistem bulunamadı. Aramayı veya filtreleri temizleyin.&lt;/td&gt;&lt;/tr&gt;&#x27;;
        renderSystemOptions();
        ensureIcons();
      }

      function renderSystemRules() {
        root.querySelector(&#x27;#d360-rule-table&#x27;).innerHTML = state.systemDraftRules.length
          ? state.systemDraftRules.map((rule, index) =&gt; `&lt;tr&gt;&lt;td&gt;${escapeHtml(ruleLabels[rule.type] || rule.type)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${num.format(rule.value)}&lt;/td&gt;&lt;td&gt;${escapeHtml(rule.unit)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost&quot; data-rule-remove=&quot;${index}&quot;&gt;Kaldır&lt;/button&gt;&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)
          : &#x27;&lt;tr&gt;&lt;td colspan=&quot;4&quot; class=&quot;d360-empty&quot;&gt;Henüz kural yok. Yukarıdan ilk kuralı ekleyin.&lt;/td&gt;&lt;/tr&gt;&#x27;;

      function openSystemForm(systemId) {
        const system = systems.find(item =&gt; item.id === systemId);

        root.querySelector(&#x27;#d360-system-region&#x27;).value = system ? (system.region || &#x27;Özel atölye&#x27;) : &#x27;Özel atölye&#x27;;
        root.querySelector(&#x27;#d360-system-material&#x27;).value = system ? system.material : &#x27;pvc&#x27;;
        root.querySelector(&#x27;#d360-system-application&#x27;).value = system ? (systemApplications(system)[0] || &#x27;all&#x27;) : &#x27;all&#x27;;
        root.querySelector(&#x27;#d360-system-verification&#x27;).value = system ? (system.verification || (system.technicalReady ? &#x27;ready&#x27; : &#x27;pending&#x27;)) : &#x27;pending&#x27;;

      const pageTitles = { dashboard: &#x27;Başlangıç&#x27;, catalog: &#x27;Ürün oluştur&#x27;, projects: &#x27;Projeler&#x27;, materials: &#x27;Fiyat ve stok yönetimi&#x27;, customers: &#x27;Müşteriler&#x27;, team: &#x27;Ekip ve yetki yönetimi&#x27;, settings: &#x27;Profil sistemleri&#x27;, print: &#x27;Müşteri çıktısı&#x27; };
      const wizardCopy = {
        1: { title: &#x27;Önce ürün tipini seçin&#x27;, help: &#x27;Pencere, kapı, sürme, panjur veya arşiv sistemlerinden bir şablon seçin.&#x27; },
        2: { title: &#x27;Müşteriyi ve projeyi seçip ölçüyü girin&#x27;, help: &#x27;Önce ölçünün kime ait olduğunu seçin; ardından dış kasa ölçülerini ve adedi yazın.&#x27; },
        3: { title: &#x27;Teknik seçimleri tamamlayın&#x27;, help: &#x27;Malzeme, cam/dolgu, renk ve kumanda biçimini seçin.&#x27; },
        4: { title: &#x27;Üretim çıktısını kontrol edin&#x27;, help: &#x27;Çizim, malzeme listesi ve kesim ölçülerini tek tek doğrulayın.&#x27; },
        5: { title: &#x27;Fiyat ve ölçü kaydı hazır&#x27;, help: &#x27;Toplamı kontrol edin; kayıt seçtiğiniz müşterinin proje hesabına eklenecek.&#x27; }
      };

      function validateMeasurements() {
        const customer = customers.find(item =&gt; item.id === state.measureCustomerId);
        const project = projects.find(item =&gt; item.id === state.measureProjectId &amp;&amp; item.customerId === state.measureCustomerId);
        const newName = root.querySelector(&#x27;#d360-measure-project-name&#x27;).value.trim();
        const newLocation = root.querySelector(&#x27;#d360-measure-project-location&#x27;).value.trim();
        const fields = [root.querySelector(&#x27;#d360-width&#x27;), root.querySelector(&#x27;#d360-height&#x27;), root.querySelector(&#x27;#d360-qty&#x27;)];
        const dimensionsValid = fields.every(field =&gt; field.checkValidity() &amp;&amp; field.value !== &#x27;&#x27;);
        let message = &#x27;&#x27;;
        if (!customer) message = &#x27;Önce bu ölçünün ait olduğu müşteriyi seçin.&#x27;;
        else if (state.measureProjectId === &#x27;new&#x27; &amp;&amp; (!newName || !newLocation)) message = &#x27;Yeni proje için proje adı ve konum / şantiye bilgisi girin.&#x27;;
        else if (state.measureProjectId !== &#x27;new&#x27; &amp;&amp; !project) message = &#x27;Mevcut bir proje seçin veya yeni proje oluşturun.&#x27;;
        else if (!dimensionsValid) message = &#x27;Ölçüleri kontrol edin: genişlik 300–12.000 mm, yükseklik 300–6.000 mm ve adet en az 1 olmalıdır.&#x27;;
        root.querySelector(&#x27;#d360-measure-error&#x27;).textContent = message;
        return !message;
      }

      function showWizardStep(step) {
        const target = clamp(step, 1, 5);
        if (target &gt; state.maxStep) return;
        state.step = target;
        root.querySelectorAll(&#x27;[data-step-panel]&#x27;).forEach(panel =&gt; { panel.hidden = Number(panel.dataset.stepPanel) !== target; });
        root.querySelectorAll(&#x27;[data-wizard-step]&#x27;).forEach(button =&gt; {
          const buttonStep = Number(button.dataset.wizardStep);
          const active = buttonStep === target;
          button.disabled = buttonStep &gt; state.maxStep;
          button.classList.toggle(&#x27;btn-primary&#x27;, active);
          button.classList.toggle(&#x27;btn-ghost&#x27;, !active);
          if (active) button.setAttribute(&#x27;aria-current&#x27;, &#x27;step&#x27;);
          else button.removeAttribute(&#x27;aria-current&#x27;);
        });
        root.querySelector(&#x27;#d360-wizard-counter&#x27;).textContent = `Adım ${target} / 5`;
        root.querySelector(&#x27;#d360-wizard-title&#x27;).textContent = wizardCopy[target].title;
        root.querySelector(&#x27;#d360-wizard-help&#x27;).textContent = wizardCopy[target].help;
        renderChoiceSummary();
        if (target &gt;= 4) renderConfigurator();
        ensureIcons();
      }

      function advanceWizard(target) {
        if (target === 3 &amp;&amp; !validateMeasurements()) return;
        if (target === 4) {
          const fits = state.width &lt;= systemRule(&#x27;maxWidth&#x27;, 12000) &amp;&amp; state.height &lt;= systemRule(&#x27;maxHeight&#x27;, 6000);
          renderSystemFitStatus();
          if (!fits) return;
        }
        state.maxStep = Math.max(state.maxStep, target);
        showWizardStep(target);
      }

      function showPage(page) {
        state.page = page;
        root.querySelectorAll(&#x27;[data-page-view]&#x27;).forEach(section =&gt; { section.hidden = section.dataset.pageView !== page; });
        root.querySelectorAll(&#x27;[data-page]&#x27;).forEach(button =&gt; {
          const active = button.dataset.page === page;
          button.setAttribute(&#x27;aria-selected&#x27;, String(active));
          button.classList.toggle(&#x27;btn-ghost&#x27;, !active);
        });
        root.querySelector(&#x27;#d360-page-title&#x27;).textContent = pageTitles[page];
        if (page === &#x27;materials&#x27;) renderMaterialTable();

&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;

    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;

    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;

        .split(/\s+/)

    autoUpdateCleanup?.();

      return;
    }

    activeTrigger = null;
    tooltip?.remove();

        shift({ padding: tooltipGap }),

              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,

      placement: getPlacement(trigger),

    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }

      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {

        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;

    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger

      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =

      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);

        { id: &#x27;sys-hs&#x27;, name: &#x27;HS kaldır-sür&#x27;, material: &#x27;aluThermal&#x27;, status: &#x27;Aktif&#x27;, rules: [{ type: &#x27;maxWidth&#x27;, value: 6500, unit: &#x27;mm&#x27; }, { type: &#x27;maxHeight&#x27;, value: 3200, unit: &#x27;mm&#x27; }, { type: &#x27;wastePercent&#x27;, value: 10, unit: &#x27;%&#x27; }, { type: &#x27;priceFactor&#x27;, value: 1.25, unit: &#x27;x&#x27; }] },
        { id: &#x27;sys-3200&#x27;, name: &#x27;3200 Seri sürme&#x27;, material: &#x27;aluCold&#x27;, status: &#x27;Arşiv&#x27;, rules: [{ type: &#x27;sashWidthDeduction&#x27;, value: 5, unit: &#x27;mm&#x27; }, { type: &#x27;sashHeightDeduction&#x27;, value: 70, unit: &#x27;mm&#x27; }, { type: &#x27;glassDeduction&#x27;, value: 118, unit: &#x27;mm&#x27; }, { type: &#x27;wastePercent&#x27;, value: 8, unit: &#x27;%&#x27; }] },
        { id: &#x27;sys-4661&#x27;, name: &#x27;46/61 damaklı sürme&#x27;, material: &#x27;aluCold&#x27;, status: &#x27;Arşiv&#x27;, rules: [{ type: &#x27;sashWidthDeduction&#x27;, value: 13, unit: &#x27;mm&#x27; }, { type: &#x27;sashHeightDeduction&#x27;, value: 73, unit: &#x27;mm&#x27; }, { type: &#x27;glassDeduction&#x27;, value: 105, unit: &#x27;mm&#x27; }, { type: &#x27;wastePercent&#x27;, value: 8, unit: &#x27;%&#x27; }] },
        { id: &#x27;sys-pan42&#x27;, name: &quot;4,2&#x27;lik kasa panjur&quot;, material: &#x27;aluCold&#x27;, status: &#x27;Arşiv&#x27;, rules: [{ type: &#x27;frameDeduction&#x27;, value: 72, unit: &#x27;mm&#x27; }, { type: &#x27;wastePercent&#x27;, value: 9, unit: &#x27;%&#x27; }, { type: &#x27;priceFactor&#x27;, value: 1.05, unit: &#x27;x&#x27; }] }
      ];

      const ruleLabels = { maxWidth: &#x27;Maksimum genişlik&#x27;, maxHeight: &#x27;Maksimum yükseklik&#x27;, wastePercent: &#x27;Fire oranı&#x27;, priceFactor: &#x27;Fiyat çarpanı&#x27;, frameDeduction: &#x27;Kasa kesim payı&#x27;, sashWidthDeduction: &#x27;Kanat genişlik düşümü&#x27;, sashHeightDeduction: &#x27;Kanat yükseklik düşümü&#x27;, glassDeduction: &#x27;Cam düşümü&#x27; };

      const state = {
        page: &#x27;dashboard&#x27;,
        step: 1,
        maxStep: 1,
        category: &#x27;window&#x27;,
        search: &#x27;&#x27;,
        selected: &#x27;double-tilt-turn&#x27;,
        width: 1800,
        height: 2200,
        qty: 1,
        material: &#x27;pvc&#x27;,
        systemId: &#x27;sys-pvc70&#x27;,
        glass: &#x27;double&#x27;,
        finish: &#x27;white&#x27;,
        operation: &#x27;manual&#x27;,
        output: &#x27;materials&#x27;,
        projectItems: 0,
        measureCustomerId: &#x27;&#x27;,
        measureProjectId: &#x27;&#x27;,
        selectedProjectId: null,
        materialFilter: &#x27;all&#x27;,
        currency: &#x27;TRY&#x27;,
        exchangeRate: 1,
        profitRate: 25,
        vatRate: 20,
        returnToProductAfterPricing: false,
        activeRole: &#x27;survey&#x27;,
        customerSearch: &#x27;&#x27;,
        editingCustomerId: null,
        selectedCustomerId: null,
        projectCustomerId: null,
        editingTeamMemberId: null,
        editingSystemId: null,
        systemDraftRules: []
      };

      const categoryLabels = Object.fromEntries(categories.map(item =&gt; [item.id, item.label]));
      const glassRates = { double: 950, lowe: 1180, triple: 1550, tempered: 1350, laminated: 1650, acoustic: 2100, fire: 4200, panel: 1250 };
      const glassLabels = { double: &#x27;4+16+4 ısıcam&#x27;, lowe: &#x27;Low-E ısıcam&#x27;, triple: &#x27;Üçlü ısıcam&#x27;, tempered: &#x27;Temperli cam&#x27;, laminated: &#x27;Lamine güvenlik camı&#x27;, acoustic: &#x27;Akustik cam&#x27;, fire: &#x27;Yangına dayanımlı cam&#x27;, panel: &#x27;Sandviç panel&#x27; };
      const finishRates = { white: 1, anthracite: 1.1, black: 1.1, bronze: 1.12, wood: 1.18, ral: 1.2 };
      const finishLabels = { white: &#x27;Beyaz&#x27;, anthracite: &#x27;Antrasit&#x27;, black: &#x27;Siyah&#x27;, bronze: &#x27;Bronz&#x27;, wood: &#x27;Ahşap desen&#x27;, ral: &#x27;Özel RAL&#x27; };
      const operationLabels = { manual: &#x27;Manuel&#x27;, motor: &#x27;Motorlu&#x27;, smart: &#x27;Akıllı ev motoru&#x27; };
      const money = { format(value) { return new Intl.NumberFormat(&#x27;tr-TR&#x27;, { style: &#x27;currency&#x27;, currency: state.currency, maximumFractionDigits: 0 }).format(value / Math.max(.0001, state.exchangeRate)); } };
      const num = new Intl.NumberFormat(&#x27;tr-TR&#x27;, { maximumFractionDigits: 2 });

      function selectedProduct() {
        return products.find(product =&gt; product.id === state.selected) || products[0];
      }

      function selectedSystem() {
        return systems.find(system =&gt; system.id === state.systemId) || systems.find(system =&gt; system.material === state.material) || systems[0];
      }

      function systemRule(type, fallback) {
        const rule = selectedSystem().rules.find(item =&gt; item.type === type);
        return rule ? Number(rule.value) : fallback;
      }

      function escapeHtml(value) {
        return String(value).replace(/[&amp;&lt;&gt;&#x27;&quot;]/g, character =&gt; ({ &#x27;&amp;&#x27;: &#x27;&amp;amp;&#x27;, &#x27;&lt;&#x27;: &#x27;&amp;lt;&#x27;, &#x27;&gt;&#x27;: &#x27;&amp;gt;&#x27;, &quot;&#x27;&quot;: &#x27;&amp;#39;&#x27;, &#x27;&quot;&#x27;: &#x27;&amp;quot;&#x27; }[character]));
      }

      function makeId(prefix) {
        return `${prefix}-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
      }

      function priceValue(code, fallback) {
        const item = priceMaterials.find(material =&gt; material.code === code);
        return item ? Number(item.price) : fallback;
      }

      function profileRate(materialId) {
        const codes = { pvc: &#x27;PVC-KANAT70&#x27;, aluCold: &#x27;ALU-50&#x27;, aluThermal: &#x27;ALU-TB75&#x27;, wood: &#x27;AHSP-LAM&#x27;, woodAlu: &#x27;AHSP-ALU&#x27;, steel: &#x27;CELIK-60&#x27;, stainless: &#x27;PASLANMAZ&#x27;, composite: &#x27;PVC-KANAT70&#x27;, glass: &#x27;CAM-TEMP&#x27; };
        return priceValue(codes[materialId], materialTypes[materialId].rate);
      }

      function glassRate(glassId) {
        const codes = { double: &#x27;CAM-ISI&#x27;, lowe: &#x27;CAM-LOWE&#x27;, triple: &#x27;CAM-3LU&#x27;, tempered: &#x27;CAM-TEMP&#x27;, laminated: &#x27;CAM-LAM&#x27;, acoustic: &#x27;CAM-AKUS&#x27;, fire: &#x27;CAM-FIRE&#x27;, panel: &#x27;PANEL-40&#x27; };
        return priceValue(codes[glassId], glassRates[glassId]);
      }

      function persistData() {
        try {
          localStorage.setItem(&#x27;dograma360-prototype-v4&#x27;, JSON.stringify({ customers, projects, teamMembers, systems, priceMaterials, pricing: { currency: state.currency, exchangeRate: state.exchangeRate, profitRate: state.profitRate, vatRate: state.vatRate }, workspace: { activeRole: state.activeRole, simpleHomeVersion: 1 } }));
        } catch (error) {
          root.querySelector(&#x27;#d360-price-status&#x27;).textContent = &#x27;Bu tarayıcı yerel kayda izin vermiyor; değişiklikler açık oturumda korunacak.&#x27;;
        }
      }

      function restoreData() {
        try {
          localStorage.removeItem(&#x27;dograma360-prototype-v3&#x27;);
          const stored = JSON.parse(localStorage.getItem(&#x27;dograma360-prototype-v4&#x27;) || &#x27;null&#x27;);
          if (!stored) return;
          if (Array.isArray(stored.customers)) customers.splice(0, customers.length, ...stored.customers);
          if (Array.isArray(stored.projects)) projects.splice(0, projects.length, ...stored.projects);
          if (Array.isArray(stored.teamMembers)) teamMembers.splice(0, teamMembers.length, ...stored.teamMembers);
          if (Array.isArray(stored.systems)) systems.splice(0, systems.length, ...stored.systems);
          if (Array.isArray(stored.priceMaterials)) priceMaterials.splice(0, priceMaterials.length, ...stored.priceMaterials);
          if (stored.pricing) {
            state.currency = stored.pricing.currency || &#x27;TRY&#x27;;
            state.exchangeRate = Number(stored.pricing.exchangeRate) || 1;
            state.profitRate = Number(stored.pricing.profitRate) || 0;
            state.vatRate = Number(stored.pricing.vatRate) || 0;
          }
          if (stored.workspace &amp;&amp; stored.workspace.simpleHomeVersion === 1 &amp;&amp; roleDefinitions.some(role =&gt; role.id === stored.workspace.activeRole)) state.activeRole = stored.workspace.activeRole;
          customers.forEach(customer =&gt; { if (!customer.status) customer.status = &#x27;Aktif&#x27;; });
        } catch (error) {
          return;
        }
      }

      function clamp(value, min, max) {
        const numberValue = Number(value);
        if (!Number.isFinite(numberValue)) return min;
        return Math.min(max, Math.max(min, numberValue));
      }

      function ensureIcons() {
        if (globalThis.lucide &amp;&amp; typeof globalThis.lucide.createIcons === &#x27;function&#x27;) {
          globalThis.lucide.createIcons({ attrs: { width: 16, height: 16 } });
        }
      }

      function productIcon(product) {
        if (product.category === &#x27;legacy&#x27;) return &#x27;archive&#x27;;
        if (product.category === &#x27;door&#x27;) return &#x27;door-open&#x27;;
        if (product.category === &#x27;shading&#x27;) return &#x27;blinds&#x27;;
        if (product.category === &#x27;facade&#x27;) return &#x27;building-2&#x27;;
        if (product.category === &#x27;auxiliary&#x27;) return &#x27;puzzle&#x27;;
        if (product.category === &#x27;sliding&#x27;) return &#x27;panel-top&#x27;;
        return &#x27;panels-top-left&#x27;;
      }

      function renderCategories() {
        root.querySelector(&#x27;#d360-categories&#x27;).innerHTML = categories.map(category =&gt; {
          const count = category.id === &#x27;all&#x27; ? products.length : products.filter(product =&gt; product.category === category.id).length;
          const active = category.id === state.category;
          return `&lt;button type=&quot;button&quot; class=&quot;btn${active ? &#x27;&#x27; : &#x27; btn-ghost&#x27;} d360-cat-${category.id}&quot; data-category=&quot;${category.id}&quot; aria-pressed=&quot;${active}&quot;&gt;&lt;span class=&quot;d360-cat-dot&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;${category.label} · ${count}&lt;/button&gt;`;
        }).join(&#x27;&#x27;);
      }

      function filteredProducts() {
        const search = state.search.trim().toLocaleLowerCase(&#x27;tr-TR&#x27;);
        return products.filter(product =&gt; {
          const categoryMatch = state.category === &#x27;all&#x27; || product.category === state.category;
          const searchMatch = !search || `${product.name} ${categoryLabels[product.category]} ${product.id}`.toLocaleLowerCase(&#x27;tr-TR&#x27;).includes(search);
          return categoryMatch &amp;&amp; searchMatch;
        });
      }

      function renderProductGrid() {
        const list = filteredProducts();
        root.querySelector(&#x27;#d360-result-count&#x27;).textContent = `${list.length} ürün`;
        root.querySelector(&#x27;#d360-product-grid&#x27;).innerHTML = list.length ? list.map(product =&gt; {
          const active = product.id === state.selected;
          const materials = product.materials.map(id =&gt; materialTypes[id].label).join(&#x27;, &#x27;);
          return `&lt;button type=&quot;button&quot; class=&quot;btn viz-tile d360-cat-${product.category}${active ? &#x27; is-selected&#x27; : &#x27;&#x27;}&quot; data-product-id=&quot;${product.id}&quot; aria-pressed=&quot;${active}&quot; aria-label=&quot;${product.name}; ${categoryLabels[product.category]}; ${materials}&quot;&gt;&lt;span class=&quot;d360-cat-dot&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;${product.name}&lt;/button&gt;`;
        }).join(&#x27;&#x27;) : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Aramanıza uygun ürün bulunamadı.&lt;/div&gt;&#x27;;
        ensureIcons();
      }

      function renderMaterialOptions() {
        const product = selectedProduct();
        if (!product.materials.includes(state.material)) state.material = product.materials[0];
        const select = root.querySelector(&#x27;#d360-material&#x27;);
        select.innerHTML = product.materials.map(id =&gt; `&lt;option value=&quot;${id}&quot;&gt;${materialTypes[id].label}&lt;/option&gt;`).join(&#x27;&#x27;);
        select.value = state.material;
        renderSystemOptions();
      }

      function renderSystemOptions() {
        const list = systems.filter(system =&gt; system.material === &#x27;all&#x27; || system.material === state.material);
        if (!list.some(system =&gt; system.id === state.systemId)) state.systemId = (list.find(system =&gt; system.material === state.material) || list[0]).id;
        const select = root.querySelector(&#x27;#d360-profile-system&#x27;);
        select.innerHTML = list.map(system =&gt; `&lt;option value=&quot;${system.id}&quot;&gt;${escapeHtml(system.name)}&lt;/option&gt;`).join(&#x27;&#x27;);
        select.value = state.systemId;
        renderSystemFitStatus();
      }

      function renderSystemFitStatus() {
        const system = selectedSystem();
        const maxWidth = systemRule(&#x27;maxWidth&#x27;, 12000);
        const maxHeight = systemRule(&#x27;maxHeight&#x27;, 6000);
        const fits = state.width &lt;= maxWidth &amp;&amp; state.height &lt;= maxHeight;
        const status = root.querySelector(&#x27;#d360-system-fit-status&#x27;);
        status.textContent = fits
          ? `${system.name}: ölçüler sistem sınırları içinde.`
          : `${system.name} için ölçü sınırı aşılıyor (${num.format(maxWidth)} × ${num.format(maxHeight)} mm). Başka sistem seçin veya kuralları düzenleyin.`;
        status.classList.toggle(&#x27;text-destructive&#x27;, !fits);
      }

      function renderSelected() {
        const product = selectedProduct();
        root.querySelector(&#x27;#d360-selected-name&#x27;).textContent = product.name;
        const materialList = product.materials.map(id =&gt; materialTypes[id].label).join(&#x27; · &#x27;);
        const archiveNote = product.legacy ? &#x27; · Atölye arşivi · Eski fiyatlar kullanılmıyor&#x27; : &#x27;&#x27;;
        root.querySelector(&#x27;#d360-selected-meta&#x27;).textContent = `${categoryLabels[product.category]} · ${materialList}${archiveNote}`;
        root.querySelectorAll(&#x27;[data-selected-name]&#x27;).forEach(element =&gt; { element.textContent = product.name; });
        root.querySelectorAll(&#x27;[data-selected-meta]&#x27;).forEach(element =&gt; { element.textContent = `${categoryLabels[product.category]} · ${materialList}${archiveNote}`; });
        renderMaterialOptions();
        renderChoiceSummary();
      }

      function renderChoiceSummary() {
        const material = materialTypes[state.material] || materialTypes[selectedProduct().materials[0]];
        root.querySelector(&#x27;#d360-width-summary&#x27;).textContent = `${num.format(state.width)} mm`;
        root.querySelector(&#x27;#d360-height-summary&#x27;).textContent = `${num.format(state.height)} mm`;
        root.querySelector(&#x27;#d360-qty-summary&#x27;).textContent = num.format(state.qty);
        root.querySelector(&#x27;#d360-dimension-summary&#x27;).textContent = `${num.format(state.width)} × ${num.format(state.height)} mm · ${num.format(state.qty)} adet`;
        root.querySelector(&#x27;#d360-material-summary&#x27;).textContent = `${selectedSystem().name} · ${material.label} · ${glassLabels[state.glass]} · ${finishLabels[state.finish]}`;
        renderSystemFitStatus();
      }

      function profileMetrics(product, width = state.width, height = state.height) {
        const w = width;
        const h = height;
        const area = w * h / 1000000;
        const perimeter = 2 * (w + h) / 1000;
        let frameM = perimeter;
        let panelM = 0;
        let glassArea = area * .72;
        let slatArea = 0;
        let specialM = 0;
        let hardware = 1;

        if (/casement|tiltturn|door|pivot|glassDoor|panelDoor|blindDoor/.test(product.kind)) {
          panelM = product.panels * 2 * (w / product.panels + h) / 1000;
          glassArea = product.kind === &#x27;panelDoor&#x27; || product.kind === &#x27;blindDoor&#x27; ? 0 : area * .66;
          hardware = product.panels;
        }
        if (/slide|panorama|autoSlide|cornerSlide/.test(product.kind)) {
          panelM = product.panels * 2 * (w / product.panels + h) / 1000;
          specialM = w / 1000 * Math.min(product.panels, 3);
          glassArea = area * .76;
          hardware = product.panels;
        }
        if (/fold/.test(product.kind)) {
          panelM = product.panels * 2 * (w / product.panels + h) / 1000;
          specialM = 2 * w / 1000;
          glassArea = area * .7;
          hardware = product.panels;
        }
        if (/shutter/.test(product.kind)) {
          frameM = 2 * h / 1000;
          panelM = 0;
          glassArea = 0;
          slatArea = area;
          specialM = w / 1000;
          hardware = 1;
        }
        if (/screen|blind/.test(product.kind) &amp;&amp; !/Door/.test(product.kind)) {
          panelM = 0;
          glassArea = 0;
          slatArea = area;
          hardware = 1;
        }
        if (/facade|spider/.test(product.kind)) {
          frameM = perimeter + 3 * h / 1000 + 2 * w / 1000;
          panelM = 0;
          glassArea = area * .9;
          specialM = frameM * .7;
          hardware = Math.max(4, product.panels);
        }
        if (/railing/.test(product.kind)) {
          frameM = 2 * w / 1000 + 3 * h / 1000;
          panelM = 0;
          glassArea = area * .68;
          hardware = 4;
        }
        if (/garage/.test(product.kind)) {
          frameM = 2 * h / 1000 + w / 1000;
          panelM = 0;
          glassArea = 0;
          slatArea = area;
          hardware = 2;
        }
        if (/pergola|winterGarden|skylight/.test(product.kind)) {
          frameM = perimeter + product.panels * h / 1000;
          panelM = product.panels * w / 1000;
          glassArea = area * .78;
          hardware = product.panels;
        }
        if (/awning|canopy|sill/.test(product.kind)) {
          frameM = perimeter * .6;
          panelM = 0;
          glassArea = product.kind === &#x27;canopy&#x27; ? area * .85 : 0;
          slatArea = product.kind === &#x27;awning&#x27; ? area : 0;
          hardware = 2;
        }
        return { area, perimeter, frameM, panelM, glassArea, slatArea, specialM, hardware };
      }

      function calculate() {
        const product = selectedProduct();
        const metrics = profileMetrics(product);
        const material = materialTypes[state.material];
        const finishFactor = finishRates[state.finish];
        const wastePercent = systemRule(&#x27;wastePercent&#x27;, 8);
        const priceFactor = systemRule(&#x27;priceFactor&#x27;, 1);
        const operationCost = state.operation === &#x27;smart&#x27; ? priceValue(&#x27;MOTOR-AKIL&#x27;, 5900) : state.operation === &#x27;motor&#x27; ? priceValue(&#x27;MOTOR-TUP&#x27;, 3900) : 0;
        const profileCost = (metrics.frameM + metrics.panelM + metrics.specialM) * profileRate(state.material) * (1 + wastePercent / 100) * finishFactor * priceFactor;
        const glassCost = metrics.glassArea * glassRate(state.glass);
        const shutterRate = state.material === &#x27;pvc&#x27; ? priceValue(&#x27;PAN-PVC&#x27;, 680) : priceValue(&#x27;PAN-ALU&#x27;, 980);
        const fillCost = metrics.slatArea * shutterRate;
        let hardwareRate = 620;
        if (product.category === &#x27;sliding&#x27;) hardwareRate = product.premium ? priceValue(&#x27;AKS-HS&#x27;, 7800) : priceValue(&#x27;AKS-SURME&#x27;, 1450);
        if (product.category === &#x27;door&#x27;) hardwareRate = /fire|security|panic/.test(product.id) ? 3100 : priceValue(&#x27;KILIT-MP&#x27;, 2100);
        if (product.category === &#x27;facade&#x27;) hardwareRate = 850;
        if (product.category === &#x27;shading&#x27;) hardwareRate = 420;
        const hardwareCost = metrics.hardware * hardwareRate;
        const consumables = Math.max(480, metrics.perimeter * 95);
        const materialCostEach = profileCost + glassCost + fillCost + hardwareCost + operationCost + consumables;
        const laborEach = Math.max(1250, metrics.area * (product.premium ? 1550 : 780));
        const directEach = materialCostEach + laborEach;
        const beforeVatEach = directEach * (1 + state.profitRate / 100);
        const totalEach = beforeVatEach * (1 + state.vatRate / 100);
        return {
          product,
          metrics,
          profileCost,
          glassCost,
          fillCost,
          hardwareCost,
          operationCost,
          consumables,
          wastePercent,
          priceFactor,
          materialCostEach,
          laborEach,
          directEach,
          beforeVatEach,
          totalEach,
          grandTotal: totalEach * state.qty
        };
      }

      function svgBaseGeometry() {
        const maxW = 360;
        const maxH = 235;
        const scale = Math.min(maxW / state.width, maxH / state.height);
        const width = state.width * scale;
        const height = state.height * scale;
        const x = 105 + (maxW - width) / 2;
        const y = 48 + (maxH - height) / 2;
        const profile = Math.max(10, Math.min(20, 65 * scale));
        return { x, y, width, height, profile, ix: x + profile, iy: y + profile, iw: Math.max(30, width - 2 * profile), ih: Math.max(30, height - 2 * profile) };
      }

      function panelRect(x, y, width, height) {
        return `&lt;rect class=&quot;d360-glass&quot; x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${width}&quot; height=&quot;${height}&quot;&gt;&lt;/rect&gt;&lt;rect class=&quot;d360-panel&quot; x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${width}&quot; height=&quot;${height}&quot; rx=&quot;2&quot;&gt;&lt;/rect&gt;`;
      }

      function renderProductSvg() {
        const product = selectedProduct();
        const svg = root.querySelector(&#x27;#d360-product-svg&#x27;);
        const g = svgBaseGeometry();
        const p = [];

        p.push(arrow);

        const standardFrame = () =&gt; {

        };

        if (/shutter/.test(product.kind)) {
          p.push(`&lt;rect class=&quot;d360-frame&quot; x=&quot;${g.x}&quot; y=&quot;${g.y}&quot; width=&quot;${g.width}&quot; height=&quot;${g.height}&quot;&gt;&lt;/rect&gt;`);
