  left: 0;
  width: 16px;
  height: 16px;
  box-sizing: border-box;
  border: 1px solid light-dark(var(--primary-foreground), var(--foreground));
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
  box-shadow: var(--shadow-sm);
  content: &quot;&quot;;
  transform: translate(2px, -50%);
  transition: transform 200ms cubic-bezier(0, 0, 0.2, 1);
}

.form-switch .form-check-input:checked {
  background: var(--primary);
}

.form-switch .form-check-input:checked::before {
  transform: translate(14px, -50%);
}

.form-switch .form-check-input:focus-visible {
  box-shadow: 0 0 0 2px var(--ring);
}

.form-range {
  appearance: none;
  display: block;
  width: 100%;
  height: 28px;
  flex: 1;
  margin: 0;
  padding: 0;
  outline: none;
  border: 0;
  accent-color: var(--primary);
  background: linear-gradient(
      color-mix(in srgb, var(--foreground) 7%, transparent),
      color-mix(in srgb, var(--foreground) 7%, transparent)
    )
    center / 100% 2px no-repeat;
}

.form-range::-webkit-slider-runnable-track {
  height: 28px;
  background: transparent;
}

.form-range::-webkit-slider-thumb {
  appearance: none;
  width: 20px;
  height: 20px;
  margin-top: 4px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-webkit-slider-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range::-moz-range-track {
  height: 28px;
  background: transparent;
}

.form-range::-moz-range-thumb {
  width: 20px;
  height: 20px;
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  background: light-dark(var(--primary-foreground), var(--foreground));
}

.form-range:focus-visible::-moz-range-thumb {
  border-color: var(--ring);
  box-shadow: inset 0 0 0 1px var(--ring);
}

.form-range:disabled {
  cursor: not-allowed;
  opacity: 0.4;
}

.btn:not(.btn-primary, .viz-tile):is(
    [aria-pressed=&quot;true&quot;],
    [aria-selected=&quot;true&quot;],
    .is-selected
  ) {
  border-color: var(--primary);
  color: var(--primary-foreground);
  background: var(--primary);
}

.btn.viz-tile:is([aria-pressed=&quot;true&quot;], [aria-selected=&quot;true&quot;], .is-selected) {
  border-color: var(--primary);
  box-shadow: inset 0 0 0 1px var(--primary);
}

.btn:focus-visible {
  outline: 2px solid var(--ring);
  outline-offset: 2px;
}

svg {
  display: block;
  max-width: 100%;
  height: auto;
}

#widget &gt; svg {
  width: 100%;
}

.text-warning,
.text-destructive {
  color: var(--destructive);
}

      function systemMatchesMaterial(system) {
        const materials = systemMaterials(system);
        return materials.includes(&#x27;all&#x27;) || materials.includes(state.material);
      }

      function systemMatchesProduct(system, product = selectedProduct()) {
        const applications = systemApplications(system);
        return applications.includes(&#x27;all&#x27;) || applications.includes(productApplication(product));
      }

      function selectedSystem() {
        return systems.find(system =&gt; system.id === state.systemId) || systems.find(system =&gt; systemMatchesMaterial(system) &amp;&amp; systemMatchesProduct(system)) || systems[0];
      }

      function systemRule(type, fallback) {
        const rule = selectedSystem().rules.find(item =&gt; item.type === type);
        return rule ? Number(rule.value) : fallback;
      }

      function escapeHtml(value) {
        return String(value).replace(/[&amp;&lt;&gt;&#x27;&quot;]/g, character =&gt; ({ &#x27;&amp;&#x27;: &#x27;&amp;amp;&#x27;, &#x27;&lt;&#x27;: &#x27;&amp;lt;&#x27;, &#x27;&gt;&#x27;: &#x27;&amp;gt;&#x27;, &quot;&#x27;&quot;: &#x27;&amp;#39;&#x27;, &#x27;&quot;&#x27;: &#x27;&amp;quot;&#x27; }[character]));
      }

      function makeId(prefix) {
        return `${prefix}-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
      }

      function applyThemePreference(theme, saveWorkspace = false) {
        const value = [&#x27;system&#x27;, &#x27;light&#x27;, &#x27;dark&#x27;].includes(theme) ? theme : &#x27;system&#x27;;
        state.theme = value;
        if (value === &#x27;system&#x27;) delete document.documentElement.dataset.theme;
        else document.documentElement.dataset.theme = value;
        try { if (parent !== window) parent.postMessage({ type: &#x27;dograma360-theme&#x27;, theme: value }, &#x27;*&#x27;); } catch (error) { /* Gömülü önizlemede ana sayfa değişmeyebilir. */ }
        root.querySelectorAll(&#x27;#d360-auth-theme, #d360-theme&#x27;).forEach(select =&gt; { select.value = value; });
        try { localStorage.setItem(&#x27;dograma360-theme&#x27;, value); } catch (error) { /* Bulut kaydı kullanılacak. */ }
        if (saveWorkspace &amp;&amp; (authState.user || authState.demo)) persistData();
      }

      try {
        const savedTheme = localStorage.getItem(&#x27;dograma360-theme&#x27;);
        if ([&#x27;system&#x27;, &#x27;light&#x27;, &#x27;dark&#x27;].includes(savedTheme)) state.theme = savedTheme;
      } catch (error) { /* Tarayıcı depolaması kapalıysa cihaz ayarı kullanılır. */ }
      applyThemePreference(state.theme);

      function priceValue(code, fallback) {
        const item = priceMaterials.find(material =&gt; material.code === code);
        return item ? Number(item.price) : fallback;
      }

      function profileRate(materialId) {
        const codes = { pvc: &#x27;PVC-KANAT70&#x27;, aluCold: &#x27;ALU-50&#x27;, aluThermal: &#x27;ALU-TB75&#x27;, wood: &#x27;AHSP-LAM&#x27;, woodAlu: &#x27;AHSP-ALU&#x27;, steel: &#x27;CELIK-60&#x27;, stainless: &#x27;PASLANMAZ&#x27;, composite: &#x27;PVC-KANAT70&#x27;, glass: &#x27;CAM-TEMP&#x27; };
        return priceValue(codes[materialId], materialTypes[materialId].rate);
      }

      function glassRate(glassId) {
        const codes = { double: &#x27;CAM-ISI&#x27;, lowe: &#x27;CAM-LOWE&#x27;, triple: &#x27;CAM-3LU&#x27;, tempered: &#x27;CAM-TEMP&#x27;, laminated: &#x27;CAM-LAM&#x27;, acoustic: &#x27;CAM-AKUS&#x27;, fire: &#x27;CAM-FIRE&#x27;, panel: &#x27;PANEL-40&#x27; };
        return priceValue(codes[glassId], glassRates[glassId]);
      }

      function workspacePayload() {
        return {
          version: 7,
          customers: cloneValue(customers),
          projects: cloneValue(projects),
          teamMembers: cloneValue(teamMembers),
          systems: cloneValue(systems),
          priceMaterials: cloneValue(priceMaterials),
          pricing: { currency: state.currency, exchangeRate: state.exchangeRate, profitRate: state.profitRate, vatRate: state.vatRate },
          appearance: { theme: state.theme },
          workspace: { activeRole: state.activeRole, simpleHomeVersion: 1 },
          updatedAt: new Date().toISOString()
        };
      }

      function resetWorkspace() {
        customers.splice(0, customers.length);
        projects.splice(0, projects.length);
        teamMembers.splice(0, teamMembers.length);
        systems.splice(0, systems.length, ...cloneValue(seedWorkspace.systems));
        priceMaterials.splice(0, priceMaterials.length, ...cloneValue(seedWorkspace.priceMaterials));
        state.currency = seedWorkspace.pricing.currency;
        state.exchangeRate = seedWorkspace.pricing.exchangeRate;
        state.profitRate = seedWorkspace.pricing.profitRate;
        state.vatRate = seedWorkspace.pricing.vatRate;
        state.activeRole = seedWorkspace.workspace.activeRole;
        state.selectedProjectId = null;
        state.selectedCustomerId = null;
        state.measureCustomerId = &#x27;&#x27;;
        state.measureProjectId = &#x27;&#x27;;
      }

      function applyWorkspace(stored) {
        resetWorkspace();
        if (!stored || typeof stored !== &#x27;object&#x27;) return;
        if (Array.isArray(stored.customers)) customers.splice(0, customers.length, ...stored.customers);
        if (Array.isArray(stored.projects)) projects.splice(0, projects.length, ...stored.projects);
        if (Array.isArray(stored.teamMembers)) teamMembers.splice(0, teamMembers.length, ...stored.teamMembers);
        if (Array.isArray(stored.systems)) {
          const savedById = new Map(stored.systems.map(system =&gt; [system.id, system]));
          const mergedSystems = seedWorkspace.systems.map(seed =&gt; normalizeSystem({ ...seed, ...(savedById.get(seed.id) || {}) }));
          stored.systems.filter(system =&gt; !seedWorkspace.systems.some(seed =&gt; seed.id === system.id)).forEach(system =&gt; mergedSystems.unshift(normalizeSystem(system)));
          systems.splice(0, systems.length, ...mergedSystems);
        }
        if (Array.isArray(stored.priceMaterials)) {
          const savedMaterialByCode = new Map(stored.priceMaterials.map(material =&gt; [material.code, material]));
          const mergedMaterials = seedWorkspace.priceMaterials.map(seed =&gt; ({ ...seed, ...(savedMaterialByCode.get(seed.code) || {}) }));
          stored.priceMaterials.filter(material =&gt; !seedWorkspace.priceMaterials.some(seed =&gt; seed.code === material.code)).forEach(material =&gt; mergedMaterials.unshift(material));
          priceMaterials.splice(0, priceMaterials.length, ...mergedMaterials);
        }
        if (stored.pricing) {
          state.currency = stored.pricing.currency || &#x27;TRY&#x27;;
          state.exchangeRate = Number(stored.pricing.exchangeRate) || 1;
          state.profitRate = Number(stored.pricing.profitRate) || 0;
          state.vatRate = Number(stored.pricing.vatRate) || 0;
        }
        if (stored.appearance &amp;&amp; [&#x27;system&#x27;, &#x27;light&#x27;, &#x27;dark&#x27;].includes(stored.appearance.theme)) applyThemePreference(stored.appearance.theme);
        if (stored.workspace &amp;&amp; stored.workspace.simpleHomeVersion === 1 &amp;&amp; roleDefinitions.some(role =&gt; role.id === stored.workspace.activeRole)) state.activeRole = stored.workspace.activeRole;
        customers.forEach(customer =&gt; { if (!customer.status) customer.status = &#x27;Aktif&#x27;; });
      }

      function userStorageKey(userId) {
        return userId ? `dograma360-workspace-${userId}` : &#x27;dograma360-prototype-v4&#x27;;
      }

      function setSyncStatus(message, isError = false) {
        const syncStatus = root.querySelector(&#x27;#d360-sync-status&#x27;);
        if (!syncStatus) return;
        syncStatus.classList.toggle(&#x27;text-destructive&#x27;, isError);
        syncStatus.innerHTML = `&lt;i data-lucide=&quot;${isError ? &#x27;cloud-off&#x27; : &#x27;cloud-check&#x27;}&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;${escapeHtml(message)}`;
        ensureIcons();
      }

      async function saveWorkspaceToCloud(payload) {
        if (!cloudClient || !authState.user || authState.demo) return;
        setSyncStatus(&#x27;Buluta kaydediliyor…&#x27;);
        const { error } = await cloudClient.from(&#x27;workspaces&#x27;).upsert({
          user_id: authState.user.id,
          data: payload,
          updated_at: new Date().toISOString()
        }, { onConflict: &#x27;user_id&#x27; });
        if (error) {
          setSyncStatus(&#x27;Bulut kaydı başarısız&#x27;, true);
          return;
        }
        setSyncStatus(&#x27;Tüm değişiklikler kaydedildi&#x27;);
      }

      function persistData() {
        const payload = workspacePayload();
        try {
          localStorage.setItem(userStorageKey(authState.user &amp;&amp; authState.user.id), JSON.stringify(payload));
        } catch (error) {
          setSyncStatus(&#x27;Bu tarayıcı yerel kayda izin vermiyor&#x27;, true);
        }
        if (!cloudClient || !authState.user || authState.demo) return;
        clearTimeout(cloudSaveTimer);
        cloudSaveTimer = setTimeout(() =&gt; { saveWorkspaceToCloud(payload); }, 450);
      }

      function readLocalWorkspace(userId) {
        try {
          localStorage.removeItem(&#x27;dograma360-prototype-v3&#x27;);
          const accountData = JSON.parse(localStorage.getItem(userStorageKey(userId)) || &#x27;null&#x27;);
          if (accountData) return { data: accountData, legacy: false };
          const legacyData = JSON.parse(localStorage.getItem(&#x27;dograma360-prototype-v4&#x27;) || &#x27;null&#x27;);
          return legacyData ? { data: legacyData, legacy: true } : { data: null, legacy: false };
        } catch (error) {
          return { data: null, legacy: false };
        }
      }

      async function restoreWorkspaceForUser(userId) {
        resetWorkspace();
        const cached = readLocalWorkspace(userId);
        if (!cloudClient || !userId) {
          if (cached.data) applyWorkspace(cached.data);
          return;
        }
        setSyncStatus(&#x27;Bulut kayıtları yükleniyor…&#x27;);
        const { data, error } = await cloudClient.from(&#x27;workspaces&#x27;).select(&#x27;data&#x27;).eq(&#x27;user_id&#x27;, userId).maybeSingle();
        if (error) {
          if (cached.data) applyWorkspace(cached.data);
          setSyncStatus(&#x27;Yerel kayıt açıldı; bulut bağlantısını kontrol edin&#x27;, true);
          return;
        }
        if (data &amp;&amp; data.data) {
          applyWorkspace(data.data);
          try { localStorage.setItem(userStorageKey(userId), JSON.stringify(data.data)); } catch (storageError) { /* no-op */ }
          setSyncStatus(&#x27;Bulut kayıtları yüklendi&#x27;);
          return;
        }
        if (cached.data) applyWorkspace(cached.data);
        await saveWorkspaceToCloud(workspacePayload());
        if (cached.legacy) {
          try { localStorage.removeItem(&#x27;dograma360-prototype-v4&#x27;); } catch (storageError) { /* no-op */ }
        }
      }

      function setAuthMessage(message, isError = false) {
        authStatus.textContent = message;
        authStatus.classList.toggle(&#x27;text-destructive&#x27;, isError);
      }

      function authErrorMessage(error) {
        const code = error &amp;&amp; (error.code || error.message || &#x27;&#x27;);
        if (/invalid_credentials|Invalid login/i.test(code)) return &#x27;E-posta veya şifre hatalı.&#x27;;
        if (/email_address_not_authorized/i.test(code)) return &#x27;Bu adrese e-posta gönderilemedi. Üretim için SMTP ayarı gereklidir.&#x27;;
        if (/already registered|user_already_exists/i.test(code)) return &#x27;Bu e-posta ile daha önce hesap açılmış.&#x27;;
        if (/rate|429/i.test(code)) return &#x27;Çok fazla deneme yapıldı. Lütfen kısa bir süre sonra tekrar deneyin.&#x27;;
        if (/expired|invalid.*otp|token/i.test(code)) return &#x27;Kod geçersiz veya süresi dolmuş. Yeni kod isteyin.&#x27;;
        return &#x27;İşlem tamamlanamadı. İnternet bağlantınızı kontrol edip tekrar deneyin.&#x27;;
      }

      function showAuthMode(mode) {
        const signIn = mode === &#x27;signin&#x27;;
        root.querySelector(&#x27;#d360-signin-form&#x27;).hidden = !signIn;
        root.querySelector(&#x27;#d360-signup-form&#x27;).hidden = signIn;
        root.querySelector(&#x27;#d360-verify-form&#x27;).hidden = true;
        root.querySelectorAll(&#x27;[data-auth-mode]&#x27;).forEach(button =&gt; {
          const active = button.dataset.authMode === mode;
          button.classList.toggle(&#x27;btn-primary&#x27;, active);
          button.setAttribute(&#x27;aria-selected&#x27;, String(active));
        });
        setAuthMessage(signIn ? &#x27;E-posta ve şifrenizi girin.&#x27; : &#x27;Bilgilerinizi girin; doğrulama kodunu e-postanıza gönderelim.&#x27;);
      }

      function showVerification(email) {
        authState.pendingEmail = email;
        root.querySelector(&#x27;#d360-signin-form&#x27;).hidden = true;
        root.querySelector(&#x27;#d360-signup-form&#x27;).hidden = true;
        root.querySelector(&#x27;#d360-verify-form&#x27;).hidden = false;
        root.querySelector(&#x27;#d360-verify-help&#x27;).textContent = `${email} adresine gönderdiğimiz 6 haneli kodu yazın.`;
        root.querySelector(&#x27;#d360-verify-code&#x27;).value = &#x27;&#x27;;
        setAuthMessage(&#x27;Kod gönderildi. E-postanızın gereksiz klasörünü de kontrol edin.&#x27;);
      }

      function setAuthBusy(busy, message) {
        [&#x27;#d360-signin-submit&#x27;, &#x27;#d360-signup-submit&#x27;, &#x27;#d360-verify-submit&#x27;, &#x27;#d360-resend-code&#x27;].forEach(selector =&gt; {
          const button = root.querySelector(selector);
          if (button) button.disabled = busy;
        });
        if (message) setAuthMessage(message);
      }

      async function activateSession(session) {
        const user = session &amp;&amp; session.user;
        if (!user || authState.loadingUserId === user.id) return;
        if (authState.user &amp;&amp; authState.user.id === user.id &amp;&amp; !appShell.hidden) return;
        authState.loadingUserId = user.id;
        authState.session = session;
        authState.user = user;
        authState.demo = false;
        authScreen.hidden = true;
        appShell.hidden = false;
        const metadata = user.user_metadata || {};
        root.querySelector(&#x27;#d360-user-name&#x27;).textContent = metadata.full_name || user.email || &#x27;Kullanıcı&#x27;;
        root.querySelector(&#x27;#d360-company-name&#x27;).textContent = metadata.company_name || &#x27;Doğrama360 hesabı&#x27;;
        await restoreWorkspaceForUser(user.id);
        refreshWorkspaceViews();
        authState.loadingUserId = null;
      }

      function showSignedOut() {
        authState.session = null;
        authState.user = null;
        authState.demo = false;
        appShell.hidden = true;
        authScreen.hidden = false;
        showAuthMode(&#x27;signin&#x27;);
        ensureIcons();
      }

      function openDemoMode() {
        authState.demo = true;
        authScreen.hidden = true;
        appShell.hidden = false;
        root.querySelector(&#x27;#d360-user-name&#x27;).textContent = &#x27;Tanıtım kullanıcısı&#x27;;
        root.querySelector(&#x27;#d360-company-name&#x27;).textContent = &#x27;Yerel tanıtım hesabı&#x27;;
        const cached = readLocalWorkspace(null);
        if (cached.data) applyWorkspace(cached.data);
        refreshWorkspaceViews();
        setSyncStatus(&#x27;Yalnızca bu tarayıcıya kaydediliyor&#x27;);
      }

      function initializeAuthentication() {
        root.querySelectorAll(&#x27;#d360-auth-theme, #d360-theme&#x27;).forEach(select =&gt; {
          select.addEventListener(&#x27;change&#x27;, event =&gt; applyThemePreference(event.target.value, true));
        });
        root.querySelectorAll(&#x27;[data-auth-mode]&#x27;).forEach(button =&gt; button.addEventListener(&#x27;click&#x27;, () =&gt; showAuthMode(button.dataset.authMode)));
        root.querySelector(&#x27;#d360-change-email&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; showAuthMode(&#x27;signup&#x27;));
        root.querySelector(&#x27;#d360-demo-login&#x27;).addEventListener(&#x27;click&#x27;, openDemoMode);
        root.querySelector(&#x27;#d360-signin-form&#x27;).addEventListener(&#x27;submit&#x27;, async event =&gt; {
          event.preventDefault();
          if (!cloudClient) return setAuthMessage(&#x27;Bulut hesabı henüz yapılandırılmadı.&#x27;, true);
          setAuthBusy(true, &#x27;Giriş yapılıyor…&#x27;);
          const email = root.querySelector(&#x27;#d360-signin-email&#x27;).value.trim();
          const password = root.querySelector(&#x27;#d360-signin-password&#x27;).value;
          const { data, error } = await cloudClient.auth.signInWithPassword({ email, password });
          setAuthBusy(false);
          if (error) return setAuthMessage(authErrorMessage(error), true);
          await activateSession(data.session);
        });
        root.querySelector(&#x27;#d360-signup-form&#x27;).addEventListener(&#x27;submit&#x27;, async event =&gt; {
          event.preventDefault();
          if (!cloudClient) return setAuthMessage(&#x27;Bulut hesabı henüz yapılandırılmadı.&#x27;, true);
          const fullName = root.querySelector(&#x27;#d360-signup-name&#x27;).value.trim();
          const companyName = root.querySelector(&#x27;#d360-signup-company&#x27;).value.trim();
          const email = root.querySelector(&#x27;#d360-signup-email&#x27;).value.trim();
          const password = root.querySelector(&#x27;#d360-signup-password&#x27;).value;
          const confirmation = root.querySelector(&#x27;#d360-signup-password-confirm&#x27;).value;
          if (password !== confirmation) return setAuthMessage(&#x27;Şifreler aynı değil.&#x27;, true);
          setAuthBusy(true, &#x27;Doğrulama kodu gönderiliyor…&#x27;);
          const { data, error } = await cloudClient.auth.signUp({ email, password, options: { data: { full_name: fullName, company_name: companyName } } });
          setAuthBusy(false);
          if (error) return setAuthMessage(authErrorMessage(error), true);
          if (data.session) return activateSession(data.session);
          showVerification(email);
        });
        root.querySelector(&#x27;#d360-verify-form&#x27;).addEventListener(&#x27;submit&#x27;, async event =&gt; {
          event.preventDefault();
          if (!cloudClient || !authState.pendingEmail) return;
          const token = root.querySelector(&#x27;#d360-verify-code&#x27;).value.replace(/\D/g, &#x27;&#x27;);
          if (token.length !== 6) return setAuthMessage(&#x27;6 haneli kodu eksiksiz girin.&#x27;, true);
          setAuthBusy(true, &#x27;Kod doğrulanıyor…&#x27;);
          const { data, error } = await cloudClient.auth.verifyOtp({ email: authState.pendingEmail, token, type: &#x27;email&#x27; });
          setAuthBusy(false);
          if (error) return setAuthMessage(authErrorMessage(error), true);
          await activateSession(data.session);
        });
        root.querySelector(&#x27;#d360-resend-code&#x27;).addEventListener(&#x27;click&#x27;, async () =&gt; {
          if (!cloudClient || !authState.pendingEmail) return;
          setAuthBusy(true, &#x27;Yeni kod gönderiliyor…&#x27;);
          const { error } = await cloudClient.auth.resend({ type: &#x27;signup&#x27;, email: authState.pendingEmail });
          setAuthBusy(false);
          setAuthMessage(error ? authErrorMessage(error) : &#x27;Yeni kod gönderildi.&#x27;, Boolean(error));
        });
        root.querySelector(&#x27;#d360-forgot-password&#x27;).addEventListener(&#x27;click&#x27;, async () =&gt; {
          if (!cloudClient) return setAuthMessage(&#x27;Bulut hesabı henüz yapılandırılmadı.&#x27;, true);
          const email = root.querySelector(&#x27;#d360-signin-email&#x27;).value.trim();
          if (!email) return setAuthMessage(&#x27;Önce e-posta adresinizi yazın.&#x27;, true);
          setAuthBusy(true, &#x27;Şifre yenileme e-postası gönderiliyor…&#x27;);
          const { error } = await cloudClient.auth.resetPasswordForEmail(email, { redirectTo: location.href.split(&#x27;#&#x27;)[0] });
          setAuthBusy(false);
          setAuthMessage(error ? authErrorMessage(error) : &#x27;Şifre yenileme e-postası gönderildi.&#x27;, Boolean(error));
        });
        root.querySelector(&#x27;#d360-logout&#x27;).addEventListener(&#x27;click&#x27;, async () =&gt; {
          clearTimeout(cloudSaveTimer);
          if (cloudClient &amp;&amp; authState.user) await cloudClient.auth.signOut();
          showSignedOut();
        });
        if (!cloudClient) {
          root.querySelector(&#x27;#d360-auth-config&#x27;).hidden = false;
          setAuthMessage(&#x27;Bulut bağlantısı kurulumu bekleniyor.&#x27;);
          return;
        }
        root.querySelector(&#x27;#d360-auth-config&#x27;).hidden = true;
        cloudClient.auth.onAuthStateChange((event, session) =&gt; {
          if (event === &#x27;SIGNED_OUT&#x27; || !session) showSignedOut();
          else setTimeout(() =&gt; { activateSession(session); }, 0);
        });
        cloudClient.auth.getSession().then(({ data, error }) =&gt; {
          if (error || !data.session) showSignedOut();
          else activateSession(data.session);
        });
      }

      function clamp(value, min, max) {
        const numberValue = Number(value);
        if (!Number.isFinite(numberValue)) return min;
        return Math.min(max, Math.max(min, numberValue));
      }

      function ensureIcons() {
        if (globalThis.lucide &amp;&amp; typeof globalThis.lucide.createIcons === &#x27;function&#x27;) {
          globalThis.lucide.createIcons({ attrs: { width: 16, height: 16 } });
        }
      }

      function productIcon(product) {
        if (product.category === &#x27;legacy&#x27;) return &#x27;archive&#x27;;
        if (product.category === &#x27;door&#x27;) return &#x27;door-open&#x27;;
        if (product.category === &#x27;shading&#x27;) return &#x27;blinds&#x27;;
        if (product.category === &#x27;facade&#x27;) return &#x27;building-2&#x27;;
        if (product.category === &#x27;auxiliary&#x27;) return &#x27;puzzle&#x27;;
        if (product.category === &#x27;sliding&#x27;) return &#x27;panel-top&#x27;;
        return &#x27;panels-top-left&#x27;;
      }

      function renderCategories() {
        root.querySelector(&#x27;#d360-categories&#x27;).innerHTML = categories.map(category =&gt; {
          const count = category.id === &#x27;all&#x27; ? products.length : products.filter(product =&gt; product.category === category.id).length;
          const active = category.id === state.category;
          return `&lt;button type=&quot;button&quot; class=&quot;btn${active ? &#x27;&#x27; : &#x27; btn-ghost&#x27;} d360-cat-${category.id}&quot; data-category=&quot;${category.id}&quot; aria-pressed=&quot;${active}&quot;&gt;&lt;span class=&quot;d360-cat-dot&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;${category.label} · ${count}&lt;/button&gt;`;
        }).join(&#x27;&#x27;);
      }

      function renderMeasurementModelOptions() {
        const select = root.querySelector(&#x27;#d360-measure-model&#x27;);
        if (!select) return;
        select.innerHTML = categories.filter(category =&gt; category.id !== &#x27;all&#x27;).map(category =&gt; {
          const list = products.filter(product =&gt; product.category === category.id);
          return `&lt;optgroup label=&quot;${escapeHtml(category.label)}&quot;&gt;${list.map(product =&gt; `&lt;option value=&quot;${product.id}&quot;&gt;${escapeHtml(product.name)}&lt;/option&gt;`).join(&#x27;&#x27;)}&lt;/optgroup&gt;`;
        }).join(&#x27;&#x27;);
        select.value = state.selected;
      }

      function filteredProducts() {
        const search = state.search.trim().toLocaleLowerCase(&#x27;tr-TR&#x27;);
        return products.filter(product =&gt; {
          const categoryMatch = state.category === &#x27;all&#x27; || product.category === state.category;
          const searchMatch = !search || `${product.name} ${categoryLabels[product.category]} ${product.id}`.toLocaleLowerCase(&#x27;tr-TR&#x27;).includes(search);
          return categoryMatch &amp;&amp; searchMatch;
        });
      }

      function renderProductGrid() {
        const list = filteredProducts();
        root.querySelector(&#x27;#d360-result-count&#x27;).textContent = `${list.length} ürün`;
        root.querySelector(&#x27;#d360-product-grid&#x27;).innerHTML = list.length ? list.map(product =&gt; {
          const active = product.id === state.selected;
          const materials = product.materials.map(id =&gt; materialTypes[id].label).join(&#x27;, &#x27;);
          return `&lt;button type=&quot;button&quot; class=&quot;btn viz-tile d360-cat-${product.category}${active ? &#x27; is-selected&#x27; : &#x27;&#x27;}&quot; data-product-id=&quot;${product.id}&quot; aria-pressed=&quot;${active}&quot; aria-label=&quot;${product.name}; ${categoryLabels[product.category]}; ${materials}&quot;&gt;&lt;span class=&quot;d360-cat-dot&quot; aria-hidden=&quot;true&quot;&gt;&lt;/span&gt;${product.name}&lt;/button&gt;`;
        }).join(&#x27;&#x27;) : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Aramanıza uygun ürün bulunamadı.&lt;/div&gt;&#x27;;
        ensureIcons();
      }

      function renderMaterialOptions() {
        const product = selectedProduct();
        if (!product.materials.includes(state.material)) state.material = product.materials[0];
        const select = root.querySelector(&#x27;#d360-material&#x27;);
        select.innerHTML = product.materials.map(id =&gt; `&lt;option value=&quot;${id}&quot;&gt;${materialTypes[id].label}&lt;/option&gt;`).join(&#x27;&#x27;);
        select.value = state.material;
        renderSystemOptions();
      }

      function renderSystemOptions() {
        const product = selectedProduct();
        const preferredId = preferredSystemIdForProduct(product);
        const list = systems.filter(system =&gt; systemMatchesMaterial(system) &amp;&amp; systemMatchesProduct(system));
        if (preferredId &amp;&amp; list.some(system =&gt; system.id === preferredId) &amp;&amp; product.legacy) state.systemId = preferredId;
        else if (!list.some(system =&gt; system.id === state.systemId)) {
          const preferred = list.find(system =&gt; system.id === preferredId);
          const ready = list.find(system =&gt; system.technicalReady &amp;&amp; !systemMaterials(system).includes(&#x27;all&#x27;));
          state.systemId = (preferred || ready || list[0] || systems[0]).id;
        }
        const select = root.querySelector(&#x27;#d360-profile-system&#x27;);
        const grouped = list.reduce((groups, system) =&gt; {
          const brand = system.brand || &#x27;Özel sistem&#x27;;
          if (!groups[brand]) groups[brand] = [];
          groups[brand].push(system);
          return groups;
        }, {});
        select.innerHTML = Object.keys(grouped).sort((a, b) =&gt; a.localeCompare(b, &#x27;tr&#x27;)).map(brand =&gt; `&lt;optgroup label=&quot;${escapeHtml(brand)}&quot;&gt;${grouped[brand].map(system =&gt; `&lt;option value=&quot;${system.id}&quot;&gt;${escapeHtml(system.name)}${system.technicalReady ? &#x27;&#x27; : &#x27; · teknik veri bekliyor&#x27;}&lt;/option&gt;`).join(&#x27;&#x27;)}&lt;/optgroup&gt;`).join(&#x27;&#x27;);
        select.value = state.systemId;
        renderSystemFitStatus();
      }

      function renderSystemFitStatus() {
        const system = selectedSystem();
        const status = root.querySelector(&#x27;#d360-system-fit-status&#x27;);
        if (!system.technicalReady) {
          const archiveText = system.verification === &#x27;archive&#x27; ? &#x27;Atölye arşivindeki ürünle doğru seri eşleştirildi.&#x27; : &#x27;Seri adı resmî üretici kataloğundan doğrulandı.&#x27;;
          status.textContent = `${system.brand || &#x27;Sistem&#x27;} · ${system.name}: ${archiveText} Kesim düşümleri ve aksesuar kodları tamamlanana kadar kesin kesim listesi üretilmez. Profil fiyatlarını “Fiyat &amp; stok” ekranında girin.`;
          status.classList.remove(&#x27;text-destructive&#x27;);
          return;
        }
        const maxWidth = systemRule(&#x27;maxWidth&#x27;, 12000);
        const maxHeight = systemRule(&#x27;maxHeight&#x27;, 6000);
        const fits = state.width &lt;= maxWidth &amp;&amp; state.height &lt;= maxHeight;
        status.textContent = fits
          ? `${system.brand || &#x27;Sistem&#x27;} · ${system.name}: üretim kuralları hazır ve ölçüler sistem sınırları içinde.`
          : `${system.name} için ölçü sınırı aşılıyor (${num.format(maxWidth)} × ${num.format(maxHeight)} mm). Başka sistem seçin veya kuralları düzenleyin.`;
        status.classList.toggle(&#x27;text-destructive&#x27;, !fits);
      }

      function renderSelected() {
        const product = selectedProduct();
        root.querySelector(&#x27;#d360-selected-name&#x27;).textContent = product.name;
        const materialList = product.materials.map(id =&gt; materialTypes[id].label).join(&#x27; · &#x27;);
        const archiveNote = product.legacy ? &#x27; · Atölye arşivi · Eski fiyatlar kullanılmıyor&#x27; : &#x27;&#x27;;
        root.querySelector(&#x27;#d360-selected-meta&#x27;).textContent = `${categoryLabels[product.category]} · ${materialList}${archiveNote}`;
        root.querySelectorAll(&#x27;[data-selected-name]&#x27;).forEach(element =&gt; { element.textContent = product.name; });
        root.querySelectorAll(&#x27;[data-selected-meta]&#x27;).forEach(element =&gt; { element.textContent = `${categoryLabels[product.category]} · ${materialList}${archiveNote}`; });
        renderMaterialOptions();
        renderChoiceSummary();
      }

      function renderChoiceSummary() {
        const material = materialTypes[state.material] || materialTypes[selectedProduct().materials[0]];
        root.querySelector(&#x27;#d360-width-summary&#x27;).textContent = `${num.format(state.width)} mm`;
        root.querySelector(&#x27;#d360-height-summary&#x27;).textContent = `${num.format(state.height)} mm`;
        root.querySelector(&#x27;#d360-qty-summary&#x27;).textContent = num.format(state.qty);
        root.querySelector(&#x27;#d360-dimension-summary&#x27;).textContent = `${num.format(state.width)} × ${num.format(state.height)} mm · ${num.format(state.qty)} adet`;
        root.querySelector(&#x27;#d360-material-summary&#x27;).textContent = `${selectedSystem().name} · ${material.label} · ${glassLabels[state.glass]} · ${finishLabels[state.finish]}`;
        renderSystemFitStatus();
      }

      function profileMetrics(product, width = state.width, height = state.height) {
        const w = width;
        const h = height;
        const area = w * h / 1000000;
        const perimeter = 2 * (w + h) / 1000;
        let frameM = perimeter;
        let panelM = 0;
        let glassArea = area * .72;
        let slatArea = 0;
        let specialM = 0;
        let hardware = 1;

        if (/casement|tiltturn|door|pivot|glassDoor|panelDoor|blindDoor/.test(product.kind)) {
          panelM = product.panels * 2 * (w / product.panels + h) / 1000;
          glassArea = product.kind === &#x27;panelDoor&#x27; || product.kind === &#x27;blindDoor&#x27; ? 0 : area * .66;
          hardware = product.panels;
        }
        if (/slide|panorama|autoSlide|cornerSlide/.test(product.kind)) {
          panelM = product.panels * 2 * (w / product.panels + h) / 1000;
          specialM = w / 1000 * Math.min(product.panels, 3);
          glassArea = area * .76;
          hardware = product.panels;
        }
        if (/fold/.test(product.kind)) {
          panelM = product.panels * 2 * (w / product.panels + h) / 1000;
          specialM = 2 * w / 1000;
          glassArea = area * .7;
          hardware = product.panels;
        }
        if (/shutter/.test(product.kind)) {
          frameM = 2 * h / 1000;
          panelM = 0;
          glassArea = 0;
          slatArea = area;
          specialM = w / 1000;
          hardware = 1;
        }
        if (/screen|blind/.test(product.kind) &amp;&amp; !/Door/.test(product.kind)) {
          panelM = 0;
          glassArea = 0;
          slatArea = area;
          hardware = 1;
        }
        if (/facade|spider/.test(product.kind)) {
          frameM = perimeter + 3 * h / 1000 + 2 * w / 1000;
          panelM = 0;
          glassArea = area * .9;
          specialM = frameM * .7;
          hardware = Math.max(4, product.panels);
        }
        if (/railing/.test(product.kind)) {
          frameM = 2 * w / 1000 + 3 * h / 1000;
          panelM = 0;
          glassArea = area * .68;
          hardware = 4;
        }
        if (/garage/.test(product.kind)) {
          frameM = 2 * h / 1000 + w / 1000;
          panelM = 0;
          glassArea = 0;
          slatArea = area;
          hardware = 2;
        }
        if (/pergola|winterGarden|skylight/.test(product.kind)) {
          frameM = perimeter + product.panels * h / 1000;
          panelM = product.panels * w / 1000;
          glassArea = area * .78;
          hardware = product.panels;
        }
        if (/awning|canopy|sill/.test(product.kind)) {
          frameM = perimeter * .6;
          panelM = 0;
          glassArea = product.kind === &#x27;canopy&#x27; ? area * .85 : 0;
          slatArea = product.kind === &#x27;awning&#x27; ? area : 0;
          hardware = 2;
        }
        return { area, perimeter, frameM, panelM, glassArea, slatArea, specialM, hardware };
      }

      function calculate() {
        const product = selectedProduct();
        const metrics = profileMetrics(product);
        const material = materialTypes[state.material];
        const finishFactor = finishRates[state.finish];
        const wastePercent = systemRule(&#x27;wastePercent&#x27;, 8);
        const priceFactor = systemRule(&#x27;priceFactor&#x27;, 1);
        const operationCost = state.operation === &#x27;smart&#x27; ? priceValue(&#x27;MOTOR-AKIL&#x27;, 5900) : state.operation === &#x27;motor&#x27; ? priceValue(&#x27;MOTOR-TUP&#x27;, 3900) : 0;
        const codes = profileCodes(product, state.material);
        const fallbackProfileRate = profileRate(state.material);
        const frameRate = priceValue(codes.frame, fallbackProfileRate);
        const panelRate = priceValue(codes.panel, fallbackProfileRate);
        const specialRate = priceValue(codes.special || codes.frame, fallbackProfileRate);
        const profileCost = (metrics.frameM * frameRate + metrics.panelM * panelRate + metrics.specialM * specialRate) * (1 + wastePercent / 100) * finishFactor * priceFactor;
        const glassCost = metrics.glassArea * glassRate(state.glass);
        const shutterRate = state.material === &#x27;pvc&#x27; ? priceValue(&#x27;PAN-PVC&#x27;, 680) : priceValue(&#x27;PAN-ALU&#x27;, 980);
        const fillCost = metrics.slatArea * shutterRate;
        let hardwareRate = 620;
        if (product.category === &#x27;sliding&#x27;) hardwareRate = product.premium ? priceValue(&#x27;AKS-HS&#x27;, 7800) : priceValue(&#x27;AKS-SURME&#x27;, 1450);
        if (product.category === &#x27;door&#x27;) hardwareRate = /fire|security|panic/.test(product.id) ? 3100 : priceValue(&#x27;KILIT-MP&#x27;, 2100);
        if (product.category === &#x27;facade&#x27;) hardwareRate = 850;
        if (product.category === &#x27;shading&#x27;) hardwareRate = 420;
        const hardwareCost = metrics.hardware * hardwareRate;
        const consumables = Math.max(480, metrics.perimeter * 95);
        const materialCostEach = profileCost + glassCost + fillCost + hardwareCost + operationCost + consumables;
        const laborEach = Math.max(1250, metrics.area * (product.premium ? 1550 : 780));
        const directEach = materialCostEach + laborEach;
        const beforeVatEach = directEach * (1 + state.profitRate / 100);
        const totalEach = beforeVatEach * (1 + state.vatRate / 100);
        return {
          product,
          metrics,
          profileCost,
          glassCost,
          fillCost,
          hardwareCost,
          operationCost,
          consumables,
          wastePercent,
          priceFactor,
          materialCostEach,
          laborEach,
          directEach,
          beforeVatEach,
          totalEach,
          grandTotal: totalEach * state.qty
        };
      }

      function svgBaseGeometry() {
        const maxW = 360;
        const maxH = 235;
        const scale = Math.min(maxW / state.width, maxH / state.height);
        const width = state.width * scale;
        const height = state.height * scale;
        const x = 105 + (maxW - width) / 2;
        const y = 48 + (maxH - height) / 2;
        const profile = Math.max(10, Math.min(20, 65 * scale));
        return { x, y, width, height, profile, ix: x + profile, iy: y + profile, iw: Math.max(30, width - 2 * profile), ih: Math.max(30, height - 2 * profile) };
      }

      function panelRect(x, y, width, height) {
        return `&lt;rect class=&quot;d360-glass&quot; x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${width}&quot; height=&quot;${height}&quot;&gt;&lt;/rect&gt;&lt;rect class=&quot;d360-panel&quot; x=&quot;${x}&quot; y=&quot;${y}&quot; width=&quot;${width}&quot; height=&quot;${height}&quot; rx=&quot;2&quot;&gt;&lt;/rect&gt;`;
      }

      function renderProductSvg() {
        const product = selectedProduct();
        const svg = root.querySelector(&#x27;#d360-product-svg&#x27;);
        const g = svgBaseGeometry();
        const p = [];
        const arrow = &#x27;&lt;defs&gt;&lt;linearGradient id=&quot;d360-profile-gradient&quot; x1=&quot;0&quot; y1=&quot;0&quot; x2=&quot;1&quot; y2=&quot;1&quot;&gt;&lt;stop offset=&quot;0&quot; stop-color=&quot;var(--viz-series-1)&quot; stop-opacity=&quot;.34&quot;&gt;&lt;/stop&gt;&lt;stop offset=&quot;1&quot; stop-color=&quot;var(--viz-series-3)&quot; stop-opacity=&quot;.2&quot;&gt;&lt;/stop&gt;&lt;/linearGradient&gt;&lt;linearGradient id=&quot;d360-glass-gradient&quot; x1=&quot;0&quot; y1=&quot;0&quot; x2=&quot;0&quot; y2=&quot;1&quot;&gt;&lt;stop offset=&quot;0&quot; stop-color=&quot;var(--viz-series-2)&quot; stop-opacity=&quot;.22&quot;&gt;&lt;/stop&gt;&lt;stop offset=&quot;1&quot; stop-color=&quot;var(--viz-series-5)&quot; stop-opacity=&quot;.1&quot;&gt;&lt;/stop&gt;&lt;/linearGradient&gt;&lt;marker id=&quot;d360-arrow&quot; viewBox=&quot;0 0 10 10&quot; refX=&quot;5&quot; refY=&quot;5&quot; markerWidth=&quot;6&quot; markerHeight=&quot;6&quot; orient=&quot;auto-start-reverse&quot;&gt;&lt;path d=&quot;M0 0 L10 5 L0 10z&quot; fill=&quot;var(--muted-foreground)&quot;&gt;&lt;/path&gt;&lt;/marker&gt;&lt;pattern id=&quot;d360-mesh&quot; width=&quot;8&quot; height=&quot;8&quot; patternUnits=&quot;userSpaceOnUse&quot;&gt;&lt;path d=&quot;M0 0L8 8M8 0L0 8&quot; stroke=&quot;var(--viz-series-6)&quot; stroke-width=&quot;.7&quot;&gt;&lt;/path&gt;&lt;/pattern&gt;&lt;/defs&gt;&#x27;;
        p.push(arrow);
        p.push(&#x27;&lt;rect x=&quot;0&quot; y=&quot;0&quot; width=&quot;560&quot; height=&quot;330&quot; rx=&quot;18&quot; fill=&quot;color-mix(in srgb, var(--viz-series-5) 7%, transparent)&quot;&gt;&lt;/rect&gt;&#x27;);

        const standardFrame = () =&gt; {
          p.push(`&lt;rect class=&quot;d360-glass&quot; x=&quot;${g.ix}&quot; y=&quot;${g.iy}&quot; width=&quot;${g.iw}&quot; height=&quot;${g.ih}&quot;&gt;&lt;/rect&gt;`);
          p.push(`&lt;path class=&quot;d360-frame&quot; fill-rule=&quot;evenodd&quot; d=&quot;M${g.x} ${g.y}H${g.x + g.width}V${g.y + g.height}H${g.x}ZM${g.ix} ${g.iy}V${g.iy + g.ih}H${g.ix + g.iw}V${g.iy}Z&quot;&gt;&lt;/path&gt;`);
        };

        if (/shutter/.test(product.kind)) {
          p.push(`&lt;rect class=&quot;d360-frame&quot; x=&quot;${g.x}&quot; y=&quot;${g.y}&quot; width=&quot;${g.width}&quot; height=&quot;${g.height}&quot;&gt;&lt;/rect&gt;`);
          const boxH = Math.min(38, g.height * .18);
          p.push(`&lt;rect class=&quot;d360-solid&quot; x=&quot;${g.x}&quot; y=&quot;${g.y}&quot; width=&quot;${g.width}&quot; height=&quot;${boxH}&quot;&gt;&lt;/rect&gt;`);
          for (let yy = g.y + boxH + 7; yy &lt; g.y + g.height - 3; yy += 10) p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${g.x + 7} ${yy}H${g.x + g.width - 7}&quot;&gt;&lt;/path&gt;`);
        } else if (/screen/.test(product.kind)) {
          standardFrame();
          p.push(`&lt;rect x=&quot;${g.ix}&quot; y=&quot;${g.iy}&quot; width=&quot;${g.iw}&quot; height=&quot;${g.ih}&quot; fill=&quot;url(#d360-mesh)&quot;&gt;&lt;/rect&gt;`);
          if (product.kind === &#x27;screenPlisse&#x27;) for (let xx = g.ix + 6; xx &lt; g.ix + g.iw; xx += 8) p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${xx} ${g.iy}V${g.iy + g.ih}&quot;&gt;&lt;/path&gt;`);
        } else if (/facade|spider/.test(product.kind)) {
          standardFrame();
          for (let i = 1; i &lt; 4; i += 1) p.push(`&lt;path class=&quot;d360-solid&quot; d=&quot;M${g.x + g.width * i / 4 - 3} ${g.y}h6v${g.height}h-6z&quot;&gt;&lt;/path&gt;`);
          for (let i = 1; i &lt; 3; i += 1) p.push(`&lt;path class=&quot;d360-solid&quot; d=&quot;M${g.x} ${g.y + g.height * i / 3 - 3}h${g.width}v6h-${g.width}z&quot;&gt;&lt;/path&gt;`);
          if (product.kind === &#x27;spider&#x27;) {
            for (let i = 1; i &lt; 4; i += 1) for (let j = 1; j &lt; 3; j += 1) p.push(`&lt;circle class=&quot;d360-handle&quot; cx=&quot;${g.x + g.width * i / 4}&quot; cy=&quot;${g.y + g.height * j / 3}&quot; r=&quot;4&quot;&gt;&lt;/circle&gt;`);
          }
        } else if (/railing/.test(product.kind)) {
          p.push(`&lt;path class=&quot;d360-solid&quot; d=&quot;M${g.x} ${g.y + 12}h${g.width}v8h-${g.width}z&quot;&gt;&lt;/path&gt;`);
          p.push(`&lt;rect class=&quot;d360-glass&quot; x=&quot;${g.x + 10}&quot; y=&quot;${g.y + 25}&quot; width=&quot;${g.width - 20}&quot; height=&quot;${g.height - 35}&quot;&gt;&lt;/rect&gt;`);
          for (let i = 0; i &lt;= 3; i += 1) p.push(`&lt;rect class=&quot;d360-solid&quot; x=&quot;${g.x + g.width * i / 3 - 3}&quot; y=&quot;${g.y + 12}&quot; width=&quot;6&quot; height=&quot;${g.height - 5}&quot;&gt;&lt;/rect&gt;`);
        } else if (/pergola|winterGarden|skylight/.test(product.kind)) {
          p.push(`&lt;path class=&quot;d360-frame&quot; d=&quot;M${g.x + 25} ${g.y + 35}L${g.x + g.width - 10} ${g.y}L${g.x + g.width} ${g.y + g.height - 25}L${g.x} ${g.y + g.height}Z&quot;&gt;&lt;/path&gt;`);
          for (let i = 1; i &lt; 6; i += 1) p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${g.x + 25 + (g.width - 35) * i / 6} ${g.y + 35 - 35 * i / 6}L${g.x + g.width * i / 6} ${g.y + g.height - 25 * i / 6}&quot;&gt;&lt;/path&gt;`);
        } else if (/awning|canopy/.test(product.kind)) {
          p.push(`&lt;path class=&quot;d360-glass&quot; d=&quot;M${g.x + 25} ${g.y + 45}L${g.x + g.width - 5} ${g.y}L${g.x + g.width} ${g.y + g.height - 25}L${g.x} ${g.y + g.height}Z&quot;&gt;&lt;/path&gt;`);
          p.push(`&lt;path class=&quot;d360-panel&quot; d=&quot;M${g.x + 25} ${g.y + 45}L${g.x + g.width - 5} ${g.y}L${g.x + g.width} ${g.y + g.height - 25}L${g.x} ${g.y + g.height}Z&quot;&gt;&lt;/path&gt;`);
          p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${g.x + 15} ${g.y + g.height - 8}L${g.x + g.width - 15} ${g.y + 12}&quot;&gt;&lt;/path&gt;`);
        } else if (/sill/.test(product.kind)) {
          p.push(`&lt;path class=&quot;d360-frame&quot; d=&quot;M${g.x} ${g.y + g.height * .55}H${g.x + g.width}L${g.x + g.width - 18} ${g.y + g.height * .75}H${g.x + 18}Z&quot;&gt;&lt;/path&gt;`);
        } else if (/garage/.test(product.kind)) {
          p.push(`&lt;rect class=&quot;d360-frame&quot; x=&quot;${g.x}&quot; y=&quot;${g.y}&quot; width=&quot;${g.width}&quot; height=&quot;${g.height}&quot;&gt;&lt;/rect&gt;`);
          for (let i = 1; i &lt; 6; i += 1) p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${g.x + 5} ${g.y + g.height * i / 6}H${g.x + g.width - 5}&quot;&gt;&lt;/path&gt;`);
        } else if (/blind/.test(product.kind)) {
          standardFrame();
          for (let yy = g.iy + 8; yy &lt; g.iy + g.ih; yy += 12) p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${g.ix + 4} ${yy}H${g.ix + g.iw - 4}&quot;&gt;&lt;/path&gt;`);
          if (/Door/.test(product.kind)) p.push(`&lt;rect class=&quot;d360-handle&quot; x=&quot;${g.x + g.width - 25}&quot; y=&quot;${g.y + g.height / 2 - 12}&quot; width=&quot;4&quot; height=&quot;24&quot; rx=&quot;2&quot;&gt;&lt;/rect&gt;`);
        } else if (/slide|panorama|autoSlide|cornerSlide/.test(product.kind)) {
          standardFrame();
          const count = product.panels;
          const pw = g.iw / count;
          for (let i = 0; i &lt; count; i += 1) {
            const px = g.ix + pw * i;
            p.push(panelRect(px + 3, g.iy + 4, pw - 6, g.ih - 8));
            const dir = i % 2 === 0 ? 1 : -1;
            p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${px + pw / 2 - 13 * dir} ${g.iy + g.ih / 2}h${26 * dir}&quot;&gt;&lt;/path&gt;`);
          }
        } else if (/fold/.test(product.kind)) {
          standardFrame();
          const pw = g.iw / product.panels;
          for (let i = 0; i &lt; product.panels; i += 1) {
            p.push(panelRect(g.ix + i * pw + 2, g.iy + 4, pw - 4, g.ih - 8));
            p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${g.ix + i * pw + 4} ${g.iy + 8}L${g.ix + i * pw + pw - 4} ${g.iy + g.ih / 2}L${g.ix + i * pw + 4} ${g.iy + g.ih - 8}&quot;&gt;&lt;/path&gt;`);
          }
        } else if (/guillotine/.test(product.kind)) {
          standardFrame();
          const ph = g.ih / 2;
          p.push(panelRect(g.ix + 4, g.iy + 4, g.iw - 8, ph - 6));
          p.push(panelRect(g.ix + 4, g.iy + ph + 2, g.iw - 8, ph - 6));
          p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${g.ix + g.iw / 2} ${g.iy + ph + 20}v-34&quot;&gt;&lt;/path&gt;`);
        } else if (/casement2|tiltturn2|door2/.test(product.kind)) {
          standardFrame();
          const pw = (g.iw - 8) / 2;
          p.push(panelRect(g.ix + 3, g.iy + 4, pw, g.ih - 8));
          p.push(panelRect(g.ix + pw + 5, g.iy + 4, pw, g.ih - 8));
          p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${g.ix + 7} ${g.iy + 8}L${g.ix + pw - 3} ${g.iy + g.ih / 2}L${g.ix + 7} ${g.iy + g.ih - 8}M${g.ix + g.iw - 7} ${g.iy + 8}L${g.ix + pw + 11} ${g.iy + g.ih / 2}L${g.ix + g.iw - 7} ${g.iy + g.ih - 8}&quot;&gt;&lt;/path&gt;`);
          p.push(`&lt;rect class=&quot;d360-handle&quot; x=&quot;${g.ix + pw - 5}&quot; y=&quot;${g.iy + g.ih / 2 - 12}&quot; width=&quot;4&quot; height=&quot;24&quot; rx=&quot;2&quot;&gt;&lt;/rect&gt;&lt;rect class=&quot;d360-handle&quot; x=&quot;${g.ix + pw + 9}&quot; y=&quot;${g.iy + g.ih / 2 - 12}&quot; width=&quot;4&quot; height=&quot;24&quot; rx=&quot;2&quot;&gt;&lt;/rect&gt;`);
        } else if (/casement1|tiltturn1|door1|pivotDoor|glassDoor|panelDoor|topHung|bottomHung|pivotH|pivotV/.test(product.kind)) {
          standardFrame();
          if (product.kind === &#x27;panelDoor&#x27;) p.push(`&lt;rect class=&quot;d360-solid&quot; x=&quot;${g.ix + 4}&quot; y=&quot;${g.iy + 4}&quot; width=&quot;${g.iw - 8}&quot; height=&quot;${g.ih - 8}&quot;&gt;&lt;/rect&gt;`);
          else p.push(panelRect(g.ix + 4, g.iy + 4, g.iw - 8, g.ih - 8));
          if (/topHung/.test(product.kind)) p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${g.ix + 8} ${g.iy + 8}L${g.ix + g.iw / 2} ${g.iy + g.ih - 8}L${g.ix + g.iw - 8} ${g.iy + 8}&quot;&gt;&lt;/path&gt;`);
          else if (/bottomHung/.test(product.kind)) p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${g.ix + 8} ${g.iy + g.ih - 8}L${g.ix + g.iw / 2} ${g.iy + 8}L${g.ix + g.iw - 8} ${g.iy + g.ih - 8}&quot;&gt;&lt;/path&gt;`);
          else if (/pivotH/.test(product.kind)) p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${g.ix + 5} ${g.iy + g.ih / 2}H${g.ix + g.iw - 5}&quot;&gt;&lt;/path&gt;`);
          else if (/pivotV|pivotDoor/.test(product.kind)) p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${g.ix + g.iw / 2} ${g.iy + 5}V${g.iy + g.ih - 5}&quot;&gt;&lt;/path&gt;`);
          else p.push(`&lt;path class=&quot;d360-detail&quot; d=&quot;M${g.ix + 8} ${g.iy + 8}L${g.ix + g.iw - 8} ${g.iy + g.ih / 2}L${g.ix + 8} ${g.iy + g.ih - 8}&quot;&gt;&lt;/path&gt;`);
          p.push(`&lt;rect class=&quot;d360-handle&quot; x=&quot;${g.x + g.width - 27}&quot; y=&quot;${g.y + g.height / 2 - 12}&quot; width=&quot;4&quot; height=&quot;24&quot; rx=&quot;2&quot;&gt;&lt;/rect&gt;`);
        } else if (/arched/.test(product.kind)) {
          p.push(`&lt;path class=&quot;d360-glass&quot; d=&quot;M${g.x} ${g.y + g.height}V${g.y + g.width / 2}A${g.width / 2} ${g.width / 2} 0 0 1 ${g.x + g.width} ${g.y + g.width / 2}V${g.y + g.height}Z&quot;&gt;&lt;/path&gt;`);
          p.push(`&lt;path class=&quot;d360-panel&quot; d=&quot;M${g.x} ${g.y + g.height}V${g.y + g.width / 2}A${g.width / 2} ${g.width / 2} 0 0 1 ${g.x + g.width} ${g.y + g.width / 2}V${g.y + g.height}Z&quot;&gt;&lt;/path&gt;`);
        } else {
          standardFrame();
          if (/ribbon|bay/.test(product.kind)) for (let i = 1; i &lt; product.panels; i += 1) p.push(`&lt;rect class=&quot;d360-solid&quot; x=&quot;${g.ix + g.iw * i / product.panels - 3}&quot; y=&quot;${g.iy}&quot; width=&quot;6&quot; height=&quot;${g.ih}&quot;&gt;&lt;/rect&gt;`);
        }

        const dimY = g.y + g.height + 35;
        const dimX = g.x - 35;
        p.push(`&lt;path class=&quot;d360-dim&quot; d=&quot;M${g.x} ${dimY}H${g.x + g.width}&quot; marker-start=&quot;url(#d360-arrow)&quot; marker-end=&quot;url(#d360-arrow)&quot;&gt;&lt;/path&gt;&lt;path class=&quot;d360-dim&quot; d=&quot;M${g.x} ${g.y + g.height + 5}V${dimY + 5}M${g.x + g.width} ${g.y + g.height + 5}V${dimY + 5}&quot;&gt;&lt;/path&gt;&lt;text class=&quot;d360-dim-text&quot; x=&quot;${g.x + g.width / 2}&quot; y=&quot;${dimY - 8}&quot; text-anchor=&quot;middle&quot;&gt;${num.format(state.width)} mm&lt;/text&gt;`);
        p.push(`&lt;path class=&quot;d360-dim&quot; d=&quot;M${dimX} ${g.y}V${g.y + g.height}&quot; marker-start=&quot;url(#d360-arrow)&quot; marker-end=&quot;url(#d360-arrow)&quot;&gt;&lt;/path&gt;&lt;path class=&quot;d360-dim&quot; d=&quot;M${dimX - 5} ${g.y}H${g.x - 5}M${dimX - 5} ${g.y + g.height}H${g.x - 5}&quot;&gt;&lt;/path&gt;&lt;text class=&quot;d360-dim-text&quot; x=&quot;${dimX - 11}&quot; y=&quot;${g.y + g.height / 2}&quot; text-anchor=&quot;middle&quot; transform=&quot;rotate(-90 ${dimX - 11} ${g.y + g.height / 2})&quot;&gt;${num.format(state.height)} mm&lt;/text&gt;`);
        p.push(`&lt;text class=&quot;d360-svg-label&quot; x=&quot;280&quot; y=&quot;356&quot; text-anchor=&quot;middle&quot;&gt;${product.name} · ${materialTypes[state.material].label} · ${finishLabels[state.finish]}&lt;/text&gt;`);
        svg.innerHTML = `&lt;title id=&quot;d360-svg-title&quot;&gt;${product.name} önizlemesi&lt;/title&gt;&lt;desc id=&quot;d360-svg-desc&quot;&gt;${num.format(state.width)} milimetre genişlik ve ${num.format(state.height)} milimetre yükseklikte ${product.name.toLocaleLowerCase(&#x27;tr-TR&#x27;)}.&lt;/desc&gt;${p.join(&#x27;&#x27;)}`;
      }

      function catalogMaterial(code) {
        return priceMaterials.find(material =&gt; material.code === code);
      }

      function orderRow(code, fallbackName, qty, unit, fallbackPrice = 0) {
        const catalog = catalogMaterial(code);
        return {
          code,
          name: catalog ? catalog.name : fallbackName,
          qty: Math.max(0, Number(qty) || 0),
          unit: catalog ? catalog.unit : unit,
          fallbackPrice: catalog ? Number(catalog.price) : Number(fallbackPrice) || 0
        };
      }

      function profileCodes(product, materialId) {
        if (product.legacyRule === &#x27;aldoks&#x27;) {
          if (product.id === &#x27;legacy-aldoks-wide-door&#x27;) return { frame: &#x27;ALDOKS-GENIS-ZET&#x27;, panel: &#x27;ALDOKS-GENIS-TAF&#x27; };
          if (product.id === &#x27;legacy-aldoks-fixed&#x27;) return { frame: &#x27;ALDOKS-SABIT-TAF&#x27;, panel: &#x27;ALDOKS-SABIT-TAF&#x27; };
          return { frame: &#x27;ALDOKS-DAR-ZET&#x27;, panel: &#x27;ALDOKS-DAR-TAF&#x27; };
        }
        if (product.legacyRule === &#x27;oval&#x27;) return { frame: &#x27;OVAL-KASA&#x27;, panel: &#x27;OVAL-TAF&#x27; };
        if (product.legacyRule === &#x27;slide3200&#x27;) return { frame: &#x27;3200-KASA&#x27;, panel: &#x27;3200-KANAT&#x27; };
        if (product.legacyRule === &#x27;slide4661&#x27;) return { frame: &#x27;46/61-KASA&#x27;, panel: &#x27;46/61-KANAT&#x27; };
        if (/shutter/.test(product.kind)) return { frame: &#x27;PAN-RAY&#x27;, panel: &#x27;PAN-RAY&#x27; };
        if (/facade|spider/.test(product.kind)) return { frame: &#x27;CEPHE-DIKME&#x27;, panel: &#x27;CEPHE-DIKME&#x27;, special: &#x27;CEPHE-KAPAK&#x27; };
        const map = {
          pvc: { frame: &#x27;PVC-KASA70&#x27;, panel: &#x27;PVC-KANAT70&#x27; },
          aluCold: { frame: &#x27;ALU-50&#x27;, panel: &#x27;ALU-50&#x27; },
          aluThermal: { frame: &#x27;ALU-TB75&#x27;, panel: &#x27;ALU-TB75&#x27; },
          wood: { frame: &#x27;AHSP-LAM&#x27;, panel: &#x27;AHSP-LAM&#x27; },
          woodAlu: { frame: &#x27;AHSP-ALU&#x27;, panel: &#x27;AHSP-ALU&#x27; },
          steel: { frame: &#x27;CELIK-60&#x27;, panel: &#x27;CELIK-60&#x27; },
          stainless: { frame: &#x27;PASLANMAZ&#x27;, panel: &#x27;PASLANMAZ&#x27; },
          composite: { frame: &#x27;PVC-KASA70&#x27;, panel: &#x27;PVC-KANAT70&#x27; },
          glass: { frame: &#x27;ALU-50&#x27;, panel: &#x27;ALU-50&#x27; }
        };
        return map[materialId] || map.pvc;
      }

      function glassCode(glassId) {
        return ({ double: &#x27;CAM-ISI&#x27;, lowe: &#x27;CAM-LOWE&#x27;, triple: &#x27;CAM-3LU&#x27;, tempered: &#x27;CAM-TEMP&#x27;, laminated: &#x27;CAM-LAM&#x27;, acoustic: &#x27;CAM-AKUS&#x27;, fire: &#x27;CAM-FIRE&#x27;, panel: &#x27;PANEL-40&#x27; })[glassId] || &#x27;CAM-ISI&#x27;;
      }

      function materialRowsForConfiguration({ product, metrics, materialId, glassId, operationId, qty, wastePercent, width = state.width }) {
        const rows = [];
        const codes = profileCodes(product, materialId);
        const wasteFactor = 1 + Math.max(0, Number(wastePercent) || 0) / 100;
        const profileFallback = profileRate(materialId);
        const add = row =&gt; { if (row.qty &gt; .001) rows.push(row); };
        const frameName = /shutter/.test(product.kind) ? &#x27;Panjur yan dikme / ray&#x27; : `${materialTypes[materialId].label} kasa profili`;
        add(orderRow(codes.frame, frameName, metrics.frameM * wasteFactor * qty, &#x27;m&#x27;, profileFallback));
        add(orderRow(codes.panel, `${materialTypes[materialId].label} kanat / panel profili`, metrics.panelM * wasteFactor * qty, &#x27;m&#x27;, profileFallback));
        if (metrics.specialM &gt; 0 &amp;&amp; !/shutter/.test(product.kind)) add(orderRow(codes.special || `${codes.frame}-OZEL`, &#x27;Ray / özel taşıyıcı profil&#x27;, metrics.specialM * wasteFactor * qty, &#x27;m&#x27;, profileFallback));
        if (materialId === &#x27;pvc&#x27; || materialId === &#x27;composite&#x27;) add(orderRow(&#x27;GALV-15&#x27;, &#x27;Galvaniz destek sacı 1,5 mm&#x27;, (metrics.frameM + metrics.panelM) * wasteFactor * qty, &#x27;m&#x27;, 110));
        if (metrics.glassArea &gt; 0) add(orderRow(glassCode(glassId), glassLabels[glassId], metrics.glassArea * qty, &#x27;m²&#x27;, glassRate(glassId)));

        if (metrics.slatArea &gt; 0) {
          const fillCode = /screen/.test(product.kind) ? &#x27;SINEK-FILE&#x27; : /awning/.test(product.kind) ? &#x27;ZIP-KUMAS&#x27; : materialId === &#x27;pvc&#x27; ? &#x27;PAN-PVC&#x27; : &#x27;PAN-ALU&#x27;;
          add(orderRow(fillCode, &#x27;Lamel / dolgu&#x27;, metrics.slatArea * qty, &#x27;m²&#x27;, materialId === &#x27;pvc&#x27; ? 680 : 980));
        }
        if (/shutter/.test(product.kind)) add(orderRow(&#x27;PAN-KUTU&#x27;, &#x27;Panjur kutusu&#x27;, width / 1000 * qty, &#x27;m&#x27;, 480));

        if (/facade|spider/.test(product.kind)) add(orderRow(&#x27;ANKRAJ&#x27;, &#x27;Cephe ankraj konsolu&#x27;, Math.ceil(metrics.hardware * 2 * qty), &#x27;adet&#x27;, 185));
        else if (product.category === &#x27;sliding&#x27;) add(orderRow(product.premium ? &#x27;AKS-HS&#x27; : &#x27;AKS-SURME&#x27;, product.premium ? &#x27;Kaldır-sür donanım seti&#x27; : &#x27;Sürme makara ve kilit seti&#x27;, Math.max(1, metrics.hardware) * qty, &#x27;set&#x27;, product.premium ? 7800 : 1450));
        else if (product.category === &#x27;door&#x27;) {
          add(orderRow(&#x27;KILIT-MP&#x27;, &#x27;Çok noktalı kapı kilidi&#x27;, qty, &#x27;adet&#x27;, 2100));
          add(orderRow(&#x27;MENTESE&#x27;, &#x27;Ağır hizmet kapı menteşesi&#x27;, Math.max(3, metrics.hardware * 2) * qty, &#x27;adet&#x27;, 420));
        } else if (/shutter|garage/.test(product.kind)) add(orderRow(&#x27;PAN-MEK&#x27;, &#x27;Panjur mekanizması ve askı seti&#x27;, qty, &#x27;set&#x27;, 420));
        else if (/awning|blind/.test(product.kind)) add(orderRow(&#x27;GOL-MEK&#x27;, &#x27;Gölgelendirme hareket ve montaj seti&#x27;, qty, &#x27;set&#x27;, 420));
        else if (/screen/.test(product.kind)) add(orderRow(&#x27;SINEK-AKS&#x27;, &#x27;Sineklik tutamak ve kılavuz seti&#x27;, qty, &#x27;set&#x27;, 320));
        else if (/pergola|winterGarden|skylight/.test(product.kind)) add(orderRow(&#x27;TASIYICI-AKS&#x27;, &#x27;Taşıyıcı bağlantı ve montaj seti&#x27;, Math.max(1, metrics.hardware) * qty, &#x27;set&#x27;, 650));
        else if (/railing/.test(product.kind)) add(orderRow(&#x27;ANKRAJ&#x27;, &#x27;Korkuluk ankraj ve bağlantı seti&#x27;, Math.max(4, metrics.hardware) * qty, &#x27;adet&#x27;, 185));
        else if (!/fixed|screen|blind|sill|awning|canopy/.test(product.kind)) add(orderRow(&#x27;AKS-CIFT&#x27;, &#x27;Açılım aksesuar seti&#x27;, Math.max(1, metrics.hardware) * qty, &#x27;set&#x27;, 1750));

        if (operationId === &#x27;motor&#x27; || operationId === &#x27;smart&#x27;) add(orderRow(operationId === &#x27;smart&#x27; ? &#x27;MOTOR-AKIL&#x27; : &#x27;MOTOR-TUP&#x27;, operationLabels[operationId], qty, &#x27;adet&#x27;, operationId === &#x27;smart&#x27; ? 5900 : 3900));
        if (/slide|panorama|autoSlide|cornerSlide/.test(product.kind)) add(orderRow(&#x27;FITIL-FIRCA&#x27;, &#x27;Sürme fırça fitili&#x27;, metrics.perimeter * 1.5 * qty, &#x27;m&#x27;, 16));
        add(orderRow(&#x27;CONTA-EPDM&#x27;, &#x27;EPDM cam ve kasa contası&#x27;, metrics.perimeter * 2 * qty, &#x27;m&#x27;, 22));
        add(orderRow(&#x27;VIDA&#x27;, &#x27;Montaj vidası&#x27;, Math.ceil(metrics.perimeter * 5 * qty), &#x27;adet&#x27;, 4.5));
        add(orderRow(&#x27;SILIKON&#x27;, &#x27;Nötr silikon&#x27;, Math.max(1, Math.ceil(metrics.perimeter * qty / 8)), &#x27;tüp&#x27;, 210));
        add(orderRow(&#x27;KOPUK&#x27;, &#x27;Montaj köpüğü&#x27;, Math.max(1, Math.ceil(metrics.perimeter * qty / 10)), &#x27;adet&#x27;, 230));
        return rows;
      }

      function currentMaterialRows(calc) {
        return materialRowsForConfiguration({
          product: calc.product,
          metrics: calc.metrics,
          materialId: state.material,
          glassId: state.glass,
          operationId: state.operation,
          qty: state.qty,
          wastePercent: calc.wastePercent,
          width: state.width
        });
      }

      function rowPurchaseTotal(row) {
        const catalog = catalogMaterial(row.code);
        return row.qty * (catalog ? Number(catalog.price) : Number(row.fallbackPrice || 0));
      }

      function materialOutput(calc) {
        const rows = currentMaterialRows(calc);
        return `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Kod&lt;/th&gt;&lt;th&gt;Malzeme / aksesuar&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Sipariş miktarı&lt;/th&gt;&lt;th&gt;Birim&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Alış tutarı&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${rows.map(row =&gt; `&lt;tr&gt;&lt;td&gt;&lt;code&gt;${escapeHtml(row.code)}&lt;/code&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(row.name)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${num.format(row.qty)}&lt;/td&gt;&lt;td&gt;${escapeHtml(row.unit)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(rowPurchaseTotal(row))}&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`;
      }

      function cutOutput(calc) {
        const product = calc.product;
        const q = state.qty;
        const rows = [];
        const system = selectedSystem();
        if (!system.technicalReady &amp;&amp; ![&#x27;slide3200&#x27;, &#x27;slide4661&#x27;, &#x27;shutterSingle&#x27;, &#x27;shutterWindowMulti&#x27;, &#x27;shutterDoorMulti&#x27;].includes(product.legacyRule)) {
          return `&lt;div class=&quot;d360-status&quot;&gt;&lt;strong&gt;Kesim listesi güvenli biçimde durduruldu.&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(system.brand || &#x27;Sistem&#x27;)} · ${escapeHtml(system.name)} için seri eşleşmesi hazır; fakat kasa, kanat, cam ve aksesuar düşümleri henüz doğrulanmadı. “Profil sistemleri” ekranında teknik katalogdaki kuralları ekleyip durumu “Üretim kuralları tamamlandı” yapın.&lt;/div&gt;&lt;/div&gt;`;
        }
        if (product.legacyRule === &#x27;slide3200&#x27;) {
          const sashW = (state.width - 5) / 2;
          const sashH = state.height - 70;
          rows.push(
            { part: &#x27;Kasa yatay&#x27;, code: &#x27;3200-KASA&#x27;, count: 2 * q, size: `${num.format(state.width)} mm` },
            { part: &#x27;Kasa dikey&#x27;, code: &#x27;3200-KASA&#x27;, count: 2 * q, size: `${num.format(state.height)} mm` },
            { part: &#x27;Kanat yatay&#x27;, code: &#x27;3200-KANAT&#x27;, count: 4 * q, size: `${num.format(sashW)} mm` },
            { part: &#x27;Kanat dikey&#x27;, code: &#x27;3200-KANAT&#x27;, count: 4 * q, size: `${num.format(sashH)} mm` },
            { part: &#x27;Cam&#x27;, code: &#x27;CAM&#x27;, count: 2 * q, size: `${num.format(sashW - 118)} × ${num.format(sashH - 118)} mm` },
            { part: &#x27;Pervaz yatay&#x27;, code: &#x27;3200-PERVAZ&#x27;, count: 2 * q, size: `${num.format(state.width + 64)} mm` },
            { part: &#x27;Pervaz dikey&#x27;, code: &#x27;3200-PERVAZ&#x27;, count: 2 * q, size: `${num.format(state.height + 64)} mm` }
          );
        } else if (product.legacyRule === &#x27;slide4661&#x27;) {
          const sashW = (state.width - 13) / 2;
          const sashH = state.height - 73;
          rows.push(
            { part: &#x27;Kasa yatay&#x27;, code: &#x27;46/61-KASA&#x27;, count: 2 * q, size: `${num.format(state.width)} mm` },
            { part: &#x27;Kasa dikey&#x27;, code: &#x27;46/61-KASA&#x27;, count: 2 * q, size: `${num.format(state.height)} mm` },
            { part: &#x27;Kanat yatay&#x27;, code: &#x27;46/61-KANAT&#x27;, count: 4 * q, size: `${num.format(sashW)} mm` },
            { part: &#x27;Kanat dikey&#x27;, code: &#x27;46/61-KANAT&#x27;, count: 4 * q, size: `${num.format(sashH)} mm` },
            { part: &#x27;Cam&#x27;, code: &#x27;CAM&#x27;, count: 2 * q, size: `${num.format(sashW - 105)} × ${num.format(sashH - 105)} mm` },
            { part: &#x27;Pervaz yatay&#x27;, code: &#x27;46/61-PERVAZ&#x27;, count: 2 * q, size: `${num.format(state.width + 68)} mm` },
            { part: &#x27;Pervaz dikey&#x27;, code: &#x27;46/61-PERVAZ&#x27;, count: 2 * q, size: `${num.format(state.height + 68)} mm` }
          );
        } else if (product.legacyRule === &#x27;shutterSingle&#x27;) {
          const sashW = state.width - 72;
          const sashH = state.height - 72;
          rows.push(
            { part: &#x27;Kasa yatay&#x27;, code: &#x27;4,2-KASA&#x27;, count: 2 * q, size: `${num.format(state.width)} mm` },
            { part: &#x27;Kasa dikey&#x27;, code: &#x27;4,2-KASA&#x27;, count: 2 * q, size: `${num.format(state.height)} mm` },
            { part: &#x27;Kanat yatay&#x27;, code: &#x27;PAN-KANAT&#x27;, count: 2 * q, size: `${num.format(sashW)} mm` },
            { part: &#x27;Kanat dikey&#x27;, code: &#x27;PAN-KANAT&#x27;, count: 2 * q, size: `${num.format(sashH)} mm` },
            { part: &#x27;Mekanizma&#x27;, code: &#x27;PAN-MEK&#x27;, count: q, size: `${num.format(sashH - 150)} mm` },
            { part: &#x27;Tij&#x27;, code: &#x27;PAN-TIJ&#x27;, count: 2 * q, size: `${num.format((sashH - 250) / 2)} mm` }
          );
        } else if (product.legacyRule === &#x27;shutterWindowMulti&#x27; || product.legacyRule === &#x27;shutterDoorMulti&#x27;) {
          const panelCount = Math.max(1, product.panels);
          const sashW = (state.width - 84) / panelCount + 19;
          const sashH = state.height - (product.legacyRule === &#x27;shutterDoorMulti&#x27; ? 43 : 72);
          rows.push(
            { part: &#x27;Kanat yatay&#x27;, code: &#x27;PAN-KANAT&#x27;, count: 2 * panelCount * q, size: `${num.format(sashW)} mm` },
            { part: &#x27;Kanat dikey&#x27;, code: &#x27;PAN-KANAT&#x27;, count: 2 * panelCount * q, size: `${num.format(sashH)} mm` },
            { part: &#x27;Kitabe&#x27;, code: &#x27;PAN-KITABE&#x27;, count: 2 * panelCount * q, size: `${num.format(sashW - 121)} mm` },
            { part: &#x27;Kapak&#x27;, code: &#x27;PAN-KAPAK&#x27;, count: 2 * panelCount * q, size: `${num.format(sashW - 122)} mm` },
            { part: &#x27;Yaprak&#x27;, code: &#x27;PAN-YAPRAK&#x27;, count: panelCount * q, size: `${num.format(sashW - 162)} mm` },
            { part: &#x27;Mekanizma&#x27;, code: &#x27;PAN-MEK&#x27;, count: panelCount * q, size: `${num.format(sashH - (product.legacyRule === &#x27;shutterDoorMulti&#x27; ? 1033 : 150))} mm` },
            { part: &#x27;Tij&#x27;, code: &#x27;PAN-TIJ&#x27;, count: 2 * panelCount * q, size: `${num.format((sashH - 250) / 2)} mm` }
          );
        } else if (/shutter/.test(product.kind)) {
          rows.push({ part: &#x27;Panjur kutusu&#x27;, code: &#x27;PAN-KUTU&#x27;, count: q, size: `${num.format(state.width)} mm` }, { part: &#x27;Yan dikme / ray&#x27;, code: &#x27;PAN-RAY&#x27;, count: 2 * q, size: `${num.format(state.height)} mm` }, { part: &#x27;Lamel paketi&#x27;, code: &#x27;PAN-LAMEL&#x27;, count: q, size: `${num.format(state.width)} × ${num.format(state.height)} mm` });
        } else if (/facade|spider/.test(product.kind)) {
          rows.push({ part: &#x27;Cephe dikmesi&#x27;, code: &#x27;CEPHE-DIKME&#x27;, count: 5 * q, size: `${num.format(state.height)} mm` }, { part: &#x27;Cephe yatayı&#x27;, code: &#x27;CEPHE-YATAY&#x27;, count: 3 * 4 * q, size: `${num.format(state.width / 4)} mm` }, { part: &#x27;Cam modülü&#x27;, code: &#x27;CAM&#x27;, count: 12 * q, size: `${num.format(state.width / 4 - 30)} × ${num.format(state.height / 3 - 30)} mm` });
        } else if (/pergola|winterGarden|skylight/.test(product.kind)) {
          rows.push({ part: &#x27;Çevre profili&#x27;, code: &#x27;KASA&#x27;, count: 2 * q, size: `${num.format(state.width)} mm` }, { part: &#x27;Taşıyıcı profil&#x27;, code: &#x27;TASIYICI&#x27;, count: product.panels * q, size: `${num.format(state.height)} mm` }, { part: &#x27;Üst panel&#x27;, code: &#x27;DOLGU&#x27;, count: product.panels * q, size: `${num.format(state.width / product.panels)} × ${num.format(state.height)} mm` });
        } else {
          const frameDeduction = systemRule(&#x27;frameDeduction&#x27;, 0);
          const sashWidthDeduction = systemRule(&#x27;sashWidthDeduction&#x27;, 46);
          const sashHeightDeduction = systemRule(&#x27;sashHeightDeduction&#x27;, 92);
          const glassDeduction = systemRule(&#x27;glassDeduction&#x27;, 140);
          rows.push({ part: &#x27;Kasa yatay&#x27;, code: &#x27;KASA&#x27;, count: 2 * q, size: `${num.format(state.width - frameDeduction)} mm` }, { part: &#x27;Kasa dikey&#x27;, code: &#x27;KASA&#x27;, count: 2 * q, size: `${num.format(state.height - frameDeduction)} mm` });
          if (product.panels &gt; 0 &amp;&amp; !/fixed|screen|blind|sill/.test(product.kind)) {
            rows.push({ part: &#x27;Kanat / panel yatay&#x27;, code: &#x27;KANAT&#x27;, count: 2 * product.panels * q, size: `${num.format(state.width / product.panels - sashWidthDeduction)} mm` }, { part: &#x27;Kanat / panel dikey&#x27;, code: &#x27;KANAT&#x27;, count: 2 * product.panels * q, size: `${num.format(state.height - sashHeightDeduction)} mm` });
          }
          if (calc.metrics.glassArea &gt; 0) rows.push({ part: &#x27;Cam / dolgu&#x27;, code: &#x27;CAM&#x27;, count: Math.max(1, product.panels) * q, size: `${num.format(state.width / Math.max(1, product.panels) - glassDeduction)} × ${num.format(state.height - glassDeduction)} mm` });
        }
        return `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Parça&lt;/th&gt;&lt;th&gt;Kod&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Adet&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Kesim ölçüsü&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${rows.map(row =&gt; `&lt;tr&gt;&lt;td&gt;${row.part}&lt;/td&gt;&lt;td&gt;&lt;code&gt;${row.code}&lt;/code&gt;&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${num.format(row.count)}&lt;/td&gt;&lt;td class=&quot;text-end text-nowrap&quot;&gt;${row.size}&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`;
      }

      function offerOutput(calc) {
        return `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table&quot;&gt;&lt;tbody&gt;&lt;tr&gt;&lt;th&gt;Malzeme gideri&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(calc.materialCostEach * state.qty)}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;İşçilik&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(calc.laborEach * state.qty)}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;Doğrudan maliyet&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(calc.directEach * state.qty)}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;Kâr (%${num.format(state.profitRate)})&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format((calc.beforeVatEach - calc.directEach) * state.qty)}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;KDV hariç&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(calc.beforeVatEach * state.qty)}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;KDV (%${num.format(state.vatRate)})&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format((calc.totalEach - calc.beforeVatEach) * state.qty)}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;Genel toplam (${state.currency})&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;${money.format(calc.grandTotal)}&lt;/th&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`;
      }

      function captureProductDrawing(item, index) {
        const previous = {
          selected: state.selected,
          width: state.width,
          height: state.height,
          material: state.material,
          finish: state.finish
        };
        const product = products.find(entry =&gt; entry.id === item.productId) || selectedProduct();
        try {
          state.selected = product.id;
          state.width = Number(item.width) || previous.width;
          state.height = Number(item.height) || previous.height;
          state.material = item.materialId &amp;&amp; product.materials.includes(item.materialId) ? item.materialId : product.materials[0];
          state.finish = item.finishId &amp;&amp; finishLabels[item.finishId] ? item.finishId : &#x27;white&#x27;;
          renderProductSvg();
          const drawing = root.querySelector(&#x27;#d360-product-svg&#x27;).cloneNode(true);
          drawing.removeAttribute(&#x27;id&#x27;);
          drawing.classList.add(&#x27;customer-print-drawing&#x27;);
          return drawing.outerHTML
            .replaceAll(&#x27;d360-svg-title&#x27;, `d360-print-${index}-svg-title`)
            .replaceAll(&#x27;d360-svg-desc&#x27;, `d360-print-${index}-svg-desc`)
            .replaceAll(&#x27;d360-profile-gradient&#x27;, `d360-print-${index}-profile-gradient`)
            .replaceAll(&#x27;d360-glass-gradient&#x27;, `d360-print-${index}-glass-gradient`)
            .replaceAll(&#x27;d360-arrow&#x27;, `d360-print-${index}-arrow`);
        } finally {
          Object.assign(state, previous);
          renderProductSvg();
        }
      }

      function customerPrintItem(item, index) {
        const drawing = captureProductDrawing(item, index);
        const technicalStatus = item.measurementOnly ? &#x27;Teknik seçim ve fiyatlandırma bekliyor&#x27; : &#x27;Üretim seçimi tamamlandı&#x27;;
        const itemTotal = Number(item.total) &gt; 0 ? money.format(item.total) : &#x27;Fiyatlandırma bekliyor&#x27;;
        return `&lt;article class=&quot;d360-print-item&quot;&gt;
          &lt;div&gt;${drawing}&lt;/div&gt;
          &lt;div class=&quot;d360-print-specs&quot;&gt;
            &lt;div class=&quot;d360-print-item-note&quot;&gt;&lt;span class=&quot;text-small&quot;&gt;Poz ${index + 1}&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.reference || `Ürün ${index + 1}`)} · ${escapeHtml(item.productName || &#x27;Doğrama&#x27;)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Dış kasa ölçüsü&lt;/span&gt;&lt;strong&gt;${num.format(item.width)} × ${num.format(item.height)} mm&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Adet&lt;/span&gt;&lt;strong&gt;${num.format(item.qty || 1)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Profil sistemi&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.system || &#x27;Teknik seçim bekliyor&#x27;)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Malzeme&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.material || &#x27;Teknik seçim bekliyor&#x27;)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Cam / dolgu&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.glass || &#x27;Henüz seçilmedi&#x27;)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Renk / yüzey&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.finish || &#x27;Henüz seçilmedi&#x27;)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Kullanım&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.operation || &#x27;Manuel&#x27;)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Tutar&lt;/span&gt;&lt;strong&gt;${escapeHtml(itemTotal)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div class=&quot;d360-print-item-note&quot;&gt;&lt;span class=&quot;text-small&quot;&gt;Durum&lt;/span&gt;&lt;strong&gt;${escapeHtml(technicalStatus)}&lt;/strong&gt;&lt;/div&gt;
            ${item.note ? `&lt;div class=&quot;d360-print-item-note&quot;&gt;&lt;span class=&quot;text-small&quot;&gt;Açıklama&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.note)}&lt;/strong&gt;&lt;/div&gt;` : &#x27;&#x27;}
          &lt;/div&gt;
        &lt;/article&gt;`;
      }

      function buildCustomerPrint({ customer, project, items, total, documentNo }) {
        const company = root.querySelector(&#x27;#d360-company-name&#x27;).textContent.trim() || &#x27;Doğrama360 firma hesabı&#x27;;
        const date = new Date().toLocaleDateString(&#x27;tr-TR&#x27;);
        const pricedItems = items.filter(item =&gt; Number(item.total) &gt; 0);
        const totalLabel = pricedItems.length ? money.format(total) : &#x27;Fiyatlandırma bekliyor&#x27;;
        return `&lt;div class=&quot;d360-print-header&quot;&gt;
          &lt;div&gt;&lt;strong&gt;${escapeHtml(company)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;Teklif ve ürün görselleri&lt;/div&gt;&lt;/div&gt;
          &lt;div&gt;&lt;strong&gt;${escapeHtml(documentNo)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;Düzenleme tarihi: ${escapeHtml(date)}&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;d360-print-customer&quot;&gt;
          &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Müşteri&lt;/span&gt;&lt;strong&gt;${escapeHtml(customer ? customer.name : &#x27;Müşteri seçilmedi&#x27;)}&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;${escapeHtml(customer ? customer.phone : &#x27;&#x27;)}${customer &amp;&amp; customer.email ? ` · ${escapeHtml(customer.email)}` : &#x27;&#x27;}&lt;/span&gt;&lt;/div&gt;
          &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Proje / konum&lt;/span&gt;&lt;strong&gt;${escapeHtml(project ? project.name : &#x27;Yeni teklif&#x27;)}&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;${escapeHtml(project &amp;&amp; project.location ? project.location : &#x27;Konum belirtilmedi&#x27;)}&lt;/span&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div&gt;&lt;strong&gt;Ürünler ve üretim görselleri&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;Çizimler seçilen ürün tipi ve dış kasa ölçüsüne göre hazırlanmıştır.&lt;/div&gt;&lt;/div&gt;
        &lt;div&gt;${items.length ? items.map(customerPrintItem).join(&#x27;&#x27;) : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Çıktıya eklenecek ürün bulunamadı.&lt;/div&gt;&#x27;}&lt;/div&gt;
