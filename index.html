        if (/facade|spider/.test(product.kind)) add(orderRow(&#x27;ANKRAJ&#x27;, &#x27;Cephe ankraj konsolu&#x27;, Math.ceil(metrics.hardware * 2 * qty), &#x27;adet&#x27;, 185));
        else if (product.category === &#x27;sliding&#x27;) add(orderRow(product.premium ? &#x27;AKS-HS&#x27; : &#x27;AKS-SURME&#x27;, product.premium ? &#x27;Kaldır-sür donanım seti&#x27; : &#x27;Sürme makara ve kilit seti&#x27;, Math.max(1, metrics.hardware) * qty, &#x27;set&#x27;, product.premium ? 7800 : 1450));
        else if (product.category === &#x27;door&#x27;) {
          add(orderRow(&#x27;KILIT-MP&#x27;, &#x27;Çok noktalı kapı kilidi&#x27;, qty, &#x27;adet&#x27;, 2100));
          add(orderRow(&#x27;MENTESE&#x27;, &#x27;Ağır hizmet kapı menteşesi&#x27;, Math.max(3, metrics.hardware * 2) * qty, &#x27;adet&#x27;, 420));
        } else if (/shutter|garage/.test(product.kind)) add(orderRow(&#x27;PAN-MEK&#x27;, &#x27;Panjur mekanizması ve askı seti&#x27;, qty, &#x27;set&#x27;, 420));
        else if (/awning|blind/.test(product.kind)) add(orderRow(&#x27;GOL-MEK&#x27;, &#x27;Gölgelendirme hareket ve montaj seti&#x27;, qty, &#x27;set&#x27;, 420));
        else if (/screen/.test(product.kind)) add(orderRow(&#x27;SINEK-AKS&#x27;, &#x27;Sineklik tutamak ve kılavuz seti&#x27;, qty, &#x27;set&#x27;, 320));
        else if (/pergola|winterGarden|skylight/.test(product.kind)) add(orderRow(&#x27;TASIYICI-AKS&#x27;, &#x27;Taşıyıcı bağlantı ve montaj seti&#x27;, Math.max(1, metrics.hardware) * qty, &#x27;set&#x27;, 650));
        else if (/railing/.test(product.kind)) add(orderRow(&#x27;ANKRAJ&#x27;, &#x27;Korkuluk ankraj ve bağlantı seti&#x27;, Math.max(4, metrics.hardware) * qty, &#x27;adet&#x27;, 185));
        else if (!/fixed|screen|blind|sill|awning|canopy/.test(product.kind)) add(orderRow(&#x27;AKS-CIFT&#x27;, &#x27;Açılım aksesuar seti&#x27;, Math.max(1, metrics.hardware) * qty, &#x27;set&#x27;, 1750));

        if (operationId === &#x27;motor&#x27; || operationId === &#x27;smart&#x27;) add(orderRow(operationId === &#x27;smart&#x27; ? &#x27;MOTOR-AKIL&#x27; : &#x27;MOTOR-TUP&#x27;, operationLabels[operationId], qty, &#x27;adet&#x27;, operationId === &#x27;smart&#x27; ? 5900 : 3900));
        if (/slide|panorama|autoSlide|cornerSlide/.test(product.kind)) add(orderRow(&#x27;FITIL-FIRCA&#x27;, &#x27;Sürme fırça fitili&#x27;, metrics.perimeter * 1.5 * qty, &#x27;m&#x27;, 16));
        add(orderRow(&#x27;CONTA-EPDM&#x27;, &#x27;EPDM cam ve kasa contası&#x27;, metrics.perimeter * 2 * qty, &#x27;m&#x27;, 22));
        add(orderRow(&#x27;VIDA&#x27;, &#x27;Montaj vidası&#x27;, Math.ceil(metrics.perimeter * 5 * qty), &#x27;adet&#x27;, 4.5));
        add(orderRow(&#x27;SILIKON&#x27;, &#x27;Nötr silikon&#x27;, Math.max(1, Math.ceil(metrics.perimeter * qty / 8)), &#x27;tüp&#x27;, 210));
        add(orderRow(&#x27;KOPUK&#x27;, &#x27;Montaj köpüğü&#x27;, Math.max(1, Math.ceil(metrics.perimeter * qty / 10)), &#x27;adet&#x27;, 230));
        return rows;
      }

      function currentMaterialRows(calc) {
        return materialRowsForConfiguration({
          product: calc.product,
          metrics: calc.metrics,
          materialId: state.material,
          glassId: state.glass,
          operationId: state.operation,
          qty: state.qty,
          wastePercent: calc.wastePercent,
          width: state.width
        });
      }

      function rowPurchaseTotal(row) {
        const catalog = catalogMaterial(row.code);
        return row.qty * (catalog ? Number(catalog.price) : Number(row.fallbackPrice || 0));
      }

      function materialOutput(calc) {
        const rows = currentMaterialRows(calc);
        return `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Kod&lt;/th&gt;&lt;th&gt;Malzeme / aksesuar&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Sipariş miktarı&lt;/th&gt;&lt;th&gt;Birim&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Alış tutarı&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${rows.map(row =&gt; `&lt;tr&gt;&lt;td&gt;&lt;code&gt;${escapeHtml(row.code)}&lt;/code&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(row.name)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${num.format(row.qty)}&lt;/td&gt;&lt;td&gt;${escapeHtml(row.unit)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(rowPurchaseTotal(row))}&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`;
      }

      function cutOutput(calc) {
        const product = calc.product;
        const q = state.qty;
        const rows = [];
        const system = selectedSystem();
        if (product.legacyRule === &#x27;slide3200&#x27;) {
          const sashW = (state.width - 5) / 2;
          const sashH = state.height - 70;
          rows.push(
            { part: &#x27;Kasa yatay&#x27;, code: &#x27;3200-KASA&#x27;, count: 2 * q, size: `${num.format(state.width)} mm` },
            { part: &#x27;Kasa dikey&#x27;, code: &#x27;3200-KASA&#x27;, count: 2 * q, size: `${num.format(state.height)} mm` },
            { part: &#x27;Kanat yatay&#x27;, code: &#x27;3200-KANAT&#x27;, count: 4 * q, size: `${num.format(sashW)} mm` },
            { part: &#x27;Kanat dikey&#x27;, code: &#x27;3200-KANAT&#x27;, count: 4 * q, size: `${num.format(sashH)} mm` },
            { part: &#x27;Cam&#x27;, code: &#x27;CAM&#x27;, count: 2 * q, size: `${num.format(sashW - 118)} × ${num.format(sashH - 118)} mm` },
            { part: &#x27;Pervaz yatay&#x27;, code: &#x27;3200-PERVAZ&#x27;, count: 2 * q, size: `${num.format(state.width + 64)} mm` },
            { part: &#x27;Pervaz dikey&#x27;, code: &#x27;3200-PERVAZ&#x27;, count: 2 * q, size: `${num.format(state.height + 64)} mm` }
          );
        } else if (product.legacyRule === &#x27;slide4661&#x27;) {
          const sashW = (state.width - 13) / 2;
          const sashH = state.height - 73;
          rows.push(
            { part: &#x27;Kasa yatay&#x27;, code: &#x27;46/61-KASA&#x27;, count: 2 * q, size: `${num.format(state.width)} mm` },
            { part: &#x27;Kasa dikey&#x27;, code: &#x27;46/61-KASA&#x27;, count: 2 * q, size: `${num.format(state.height)} mm` },
            { part: &#x27;Kanat yatay&#x27;, code: &#x27;46/61-KANAT&#x27;, count: 4 * q, size: `${num.format(sashW)} mm` },
            { part: &#x27;Kanat dikey&#x27;, code: &#x27;46/61-KANAT&#x27;, count: 4 * q, size: `${num.format(sashH)} mm` },
            { part: &#x27;Cam&#x27;, code: &#x27;CAM&#x27;, count: 2 * q, size: `${num.format(sashW - 105)} × ${num.format(sashH - 105)} mm` },
            { part: &#x27;Pervaz yatay&#x27;, code: &#x27;46/61-PERVAZ&#x27;, count: 2 * q, size: `${num.format(state.width + 68)} mm` },
            { part: &#x27;Pervaz dikey&#x27;, code: &#x27;46/61-PERVAZ&#x27;, count: 2 * q, size: `${num.format(state.height + 68)} mm` }
          );
        } else if (product.legacyRule === &#x27;shutterSingle&#x27;) {
          const sashW = state.width - 72;
          const sashH = state.height - 72;
          rows.push(
            { part: &#x27;Kasa yatay&#x27;, code: &#x27;4,2-KASA&#x27;, count: 2 * q, size: `${num.format(state.width)} mm` },
            { part: &#x27;Kasa dikey&#x27;, code: &#x27;4,2-KASA&#x27;, count: 2 * q, size: `${num.format(state.height)} mm` },
            { part: &#x27;Kanat yatay&#x27;, code: &#x27;PAN-KANAT&#x27;, count: 2 * q, size: `${num.format(sashW)} mm` },
            { part: &#x27;Kanat dikey&#x27;, code: &#x27;PAN-KANAT&#x27;, count: 2 * q, size: `${num.format(sashH)} mm` },
            { part: &#x27;Mekanizma&#x27;, code: &#x27;PAN-MEK&#x27;, count: q, size: `${num.format(sashH - 150)} mm` },
            { part: &#x27;Tij&#x27;, code: &#x27;PAN-TIJ&#x27;, count: 2 * q, size: `${num.format((sashH - 250) / 2)} mm` }
          );
        } else if (product.legacyRule === &#x27;shutterWindowMulti&#x27; || product.legacyRule === &#x27;shutterDoorMulti&#x27;) {
          const panelCount = Math.max(1, product.panels);
          const sashW = (state.width - 84) / panelCount + 19;
          const sashH = state.height - (product.legacyRule === &#x27;shutterDoorMulti&#x27; ? 43 : 72);
          rows.push(
            { part: &#x27;Kanat yatay&#x27;, code: &#x27;PAN-KANAT&#x27;, count: 2 * panelCount * q, size: `${num.format(sashW)} mm` },
            { part: &#x27;Kanat dikey&#x27;, code: &#x27;PAN-KANAT&#x27;, count: 2 * panelCount * q, size: `${num.format(sashH)} mm` },
            { part: &#x27;Kitabe&#x27;, code: &#x27;PAN-KITABE&#x27;, count: 2 * panelCount * q, size: `${num.format(sashW - 121)} mm` },
            { part: &#x27;Kapak&#x27;, code: &#x27;PAN-KAPAK&#x27;, count: 2 * panelCount * q, size: `${num.format(sashW - 122)} mm` },
            { part: &#x27;Yaprak&#x27;, code: &#x27;PAN-YAPRAK&#x27;, count: panelCount * q, size: `${num.format(sashW - 162)} mm` },
            { part: &#x27;Mekanizma&#x27;, code: &#x27;PAN-MEK&#x27;, count: panelCount * q, size: `${num.format(sashH - (product.legacyRule === &#x27;shutterDoorMulti&#x27; ? 1033 : 150))} mm` },
            { part: &#x27;Tij&#x27;, code: &#x27;PAN-TIJ&#x27;, count: 2 * panelCount * q, size: `${num.format((sashH - 250) / 2)} mm` }
          );
        } else if (/shutter/.test(product.kind)) {
          rows.push({ part: &#x27;Panjur kutusu&#x27;, code: &#x27;PAN-KUTU&#x27;, count: q, size: `${num.format(state.width)} mm` }, { part: &#x27;Yan dikme / ray&#x27;, code: &#x27;PAN-RAY&#x27;, count: 2 * q, size: `${num.format(state.height)} mm` }, { part: &#x27;Lamel paketi&#x27;, code: &#x27;PAN-LAMEL&#x27;, count: q, size: `${num.format(state.width)} × ${num.format(state.height)} mm` });
        } else if (/facade|spider/.test(product.kind)) {
          rows.push({ part: &#x27;Cephe dikmesi&#x27;, code: &#x27;CEPHE-DIKME&#x27;, count: 5 * q, size: `${num.format(state.height)} mm` }, { part: &#x27;Cephe yatayı&#x27;, code: &#x27;CEPHE-YATAY&#x27;, count: 3 * 4 * q, size: `${num.format(state.width / 4)} mm` }, { part: &#x27;Cam modülü&#x27;, code: &#x27;CAM&#x27;, count: 12 * q, size: `${num.format(state.width / 4 - 30)} × ${num.format(state.height / 3 - 30)} mm` });
        } else if (/pergola|winterGarden|skylight/.test(product.kind)) {
          rows.push({ part: &#x27;Çevre profili&#x27;, code: &#x27;KASA&#x27;, count: 2 * q, size: `${num.format(state.width)} mm` }, { part: &#x27;Taşıyıcı profil&#x27;, code: &#x27;TASIYICI&#x27;, count: product.panels * q, size: `${num.format(state.height)} mm` }, { part: &#x27;Üst panel&#x27;, code: &#x27;DOLGU&#x27;, count: product.panels * q, size: `${num.format(state.width / product.panels)} × ${num.format(state.height)} mm` });
        } else {
          const frameDeduction = systemRule(&#x27;frameDeduction&#x27;, 0);
          const sashWidthDeduction = systemRule(&#x27;sashWidthDeduction&#x27;, 46);
          const sashHeightDeduction = systemRule(&#x27;sashHeightDeduction&#x27;, 92);
          const glassDeduction = systemRule(&#x27;glassDeduction&#x27;, 140);
          rows.push({ part: &#x27;Kasa yatay&#x27;, code: &#x27;KASA&#x27;, count: 2 * q, size: `${num.format(state.width - frameDeduction)} mm` }, { part: &#x27;Kasa dikey&#x27;, code: &#x27;KASA&#x27;, count: 2 * q, size: `${num.format(state.height - frameDeduction)} mm` });
          if (product.panels &gt; 0 &amp;&amp; !/fixed|screen|blind|sill/.test(product.kind)) {
            rows.push({ part: &#x27;Kanat / panel yatay&#x27;, code: &#x27;KANAT&#x27;, count: 2 * product.panels * q, size: `${num.format(state.width / product.panels - sashWidthDeduction)} mm` }, { part: &#x27;Kanat / panel dikey&#x27;, code: &#x27;KANAT&#x27;, count: 2 * product.panels * q, size: `${num.format(state.height - sashHeightDeduction)} mm` });
          }
          if (calc.metrics.glassArea &gt; 0) rows.push({ part: &#x27;Cam / dolgu&#x27;, code: &#x27;CAM&#x27;, count: Math.max(1, product.panels) * q, size: `${num.format(state.width / Math.max(1, product.panels) - glassDeduction)} × ${num.format(state.height - glassDeduction)} mm` });
        }
        return `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Parça&lt;/th&gt;&lt;th&gt;Kod&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Adet&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Kesim ölçüsü&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${rows.map(row =&gt; `&lt;tr&gt;&lt;td&gt;${row.part}&lt;/td&gt;&lt;td&gt;&lt;code&gt;${row.code}&lt;/code&gt;&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${num.format(row.count)}&lt;/td&gt;&lt;td class=&quot;text-end text-nowrap&quot;&gt;${row.size}&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`;
      }

      function offerOutput(calc) {
        return `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table&quot;&gt;&lt;tbody&gt;&lt;tr&gt;&lt;th&gt;Malzeme gideri&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(calc.materialCostEach * state.qty)}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;İşçilik&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(calc.laborEach * state.qty)}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;Doğrudan maliyet&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(calc.directEach * state.qty)}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;Kâr (%${num.format(state.profitRate)})&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format((calc.beforeVatEach - calc.directEach) * state.qty)}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;KDV hariç&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(calc.beforeVatEach * state.qty)}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;KDV (%${num.format(state.vatRate)})&lt;/th&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format((calc.totalEach - calc.beforeVatEach) * state.qty)}&lt;/td&gt;&lt;/tr&gt;&lt;tr&gt;&lt;th&gt;Genel toplam (${state.currency})&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;${money.format(calc.grandTotal)}&lt;/th&gt;&lt;/tr&gt;&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`;
      }

      function captureProductDrawing(item, index) {
        const previous = {
          selected: state.selected,
          width: state.width,
          height: state.height,
          material: state.material,
          finish: state.finish
        };
        const product = products.find(entry =&gt; entry.id === item.productId) || selectedProduct();
        try {
          state.selected = product.id;
          state.width = Number(item.width) || previous.width;
          state.height = Number(item.height) || previous.height;
          state.material = item.materialId &amp;&amp; product.materials.includes(item.materialId) ? item.materialId : product.materials[0];
          state.finish = item.finishId &amp;&amp; finishLabels[item.finishId] ? item.finishId : &#x27;white&#x27;;
          renderProductSvg();
          const drawing = root.querySelector(&#x27;#d360-product-svg&#x27;).cloneNode(true);
          drawing.removeAttribute(&#x27;id&#x27;);
          drawing.classList.add(&#x27;customer-print-drawing&#x27;);
          return drawing.outerHTML
            .replaceAll(&#x27;d360-svg-title&#x27;, `d360-print-${index}-svg-title`)
            .replaceAll(&#x27;d360-svg-desc&#x27;, `d360-print-${index}-svg-desc`)
            .replaceAll(&#x27;d360-profile-gradient&#x27;, `d360-print-${index}-profile-gradient`)
            .replaceAll(&#x27;d360-glass-gradient&#x27;, `d360-print-${index}-glass-gradient`)
            .replaceAll(&#x27;d360-arrow&#x27;, `d360-print-${index}-arrow`)
            .replaceAll(&#x27;d360-mesh&#x27;, `d360-print-${index}-mesh`);
        } finally {
          Object.assign(state, previous);
          renderProductSvg();
        }
      }

      function savedItemCutOutput(item) {
        item = completeProjectItemTechnical(item);
        const previous = {
          selected: state.selected,
          width: state.width,
          height: state.height,
          qty: state.qty,
          material: state.material,
          systemId: state.systemId,
          glass: state.glass,
          finish: state.finish,
          operation: state.operation
        };
        const product = products.find(entry =&gt; entry.id === item.productId) || selectedProduct();
        try {
          state.selected = product.id;
          state.width = Number(item.width) || previous.width;
          state.height = Number(item.height) || previous.height;
          state.qty = Number(item.qty) || 1;
          state.material = item.materialId &amp;&amp; product.materials.includes(item.materialId) ? item.materialId : product.materials[0];
          state.systemId = systems.some(system =&gt; system.id === item.systemId) ? item.systemId : previous.systemId;
          state.glass = item.glassId &amp;&amp; glassLabels[item.glassId] ? item.glassId : &#x27;double&#x27;;
          state.finish = item.finishId &amp;&amp; finishLabels[item.finishId] ? item.finishId : &#x27;white&#x27;;
          state.operation = item.operationId &amp;&amp; operationLabels[item.operationId] ? item.operationId : &#x27;manual&#x27;;
          return cutOutput(calculate());
        } finally {
          Object.assign(state, previous);
        }
      }

      function renderAllProduction() {
        const target = root.querySelector(&#x27;#d360-production-all&#x27;);
        const orderTarget = root.querySelector(&#x27;#d360-production-order-list&#x27;);
        const orderCount = root.querySelector(&#x27;#d360-production-order-count&#x27;);
        if (!target || !orderTarget || !orderCount) return;
        const project = projects.find(item =&gt; item.id === state.measureProjectId &amp;&amp; item.customerId === state.measureCustomerId)
          || projects.find(item =&gt; item.id === state.selectedProjectId);
        const items = project &amp;&amp; Array.isArray(project.items) ? project.items.map((item, index) =&gt; completeProjectItemTechnical(item, index)) : [];
        if (!project || !items.length) {
          target.innerHTML = &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Üretim ekranı için önce en az bir ürün, ölçü ve malzeme kaydını listeye ekleyin.&lt;/div&gt;&#x27;;
          orderTarget.innerHTML = &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Ürünler eklendiğinde birleşik sipariş listesi burada oluşacak.&lt;/div&gt;&#x27;;
          orderCount.textContent = &#x27;0 kalem&#x27;;
          return;
        }
        target.innerHTML = items.map((item, index) =&gt; {
          const drawing = captureProductDrawing(item, index);
          const cuts = savedItemCutOutput(item);
          const technicalStatus = item.technicalSource === &#x27;automatic&#x27; ? &#x27;Teknik profil otomatik hazır&#x27; : &#x27;Üretime hazır&#x27;;
          return `&lt;article class=&quot;card d360-production-card&quot;&gt;
            &lt;div class=&quot;d360-production-card-head&quot;&gt;&lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;${escapeHtml(item.reference || `Ürün ${index + 1}`)}&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.productName)}&lt;/strong&gt;&lt;/div&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(technicalStatus)}&lt;/span&gt;&lt;/div&gt;
            &lt;div class=&quot;d360-production-card-body&quot;&gt;
              &lt;div class=&quot;d360-production-drawing&quot;&gt;${drawing}&lt;/div&gt;
              &lt;div class=&quot;d360-production-specs&quot;&gt;
                &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Dış kasa ölçüsü&lt;/span&gt;&lt;strong&gt;${num.format(item.width)} × ${num.format(item.height)} mm · ${num.format(item.qty)} adet&lt;/strong&gt;&lt;/div&gt;
                &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Profil sistemi&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.system)}&lt;/strong&gt;&lt;/div&gt;
                &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Malzeme&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.material)}&lt;/strong&gt;&lt;/div&gt;
                &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Cam / dolgu&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.glass || &#x27;Henüz seçilmedi&#x27;)}&lt;/strong&gt;&lt;/div&gt;
                &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Renk / yüzey&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.finish || &#x27;Henüz seçilmedi&#x27;)}&lt;/strong&gt;&lt;/div&gt;
                &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Kullanım&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.operation || &#x27;Manuel&#x27;)}&lt;/strong&gt;&lt;/div&gt;
                ${item.note ? `&lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Usta notu&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.note)}&lt;/strong&gt;&lt;/div&gt;` : &#x27;&#x27;}
                ${item.photoName ? `&lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Saha fotoğrafı&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.photoName)}&lt;/strong&gt;&lt;/div&gt;` : &#x27;&#x27;}
              &lt;/div&gt;
              &lt;div class=&quot;d360-production-cuts&quot;&gt;&lt;div class=&quot;d360-heading&quot;&gt;&lt;strong&gt;Kesim ölçüleri&lt;/strong&gt;&lt;span class=&quot;viz-badge&quot;&gt;${index + 1} / ${items.length}&lt;/span&gt;&lt;/div&gt;${cuts}&lt;/div&gt;
            &lt;/div&gt;
          &lt;/article&gt;`;
        }).join(&#x27;&#x27;);
        const orderRows = projectOrderRows(project);
        orderCount.textContent = `${orderRows.length} kalem`;
        orderTarget.innerHTML = orderRows.length
          ? `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Kod&lt;/th&gt;&lt;th&gt;Profil, cam, aksesuar ve sarf&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Toplam ihtiyaç&lt;/th&gt;&lt;th&gt;Birim&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Alış tutarı&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${orderRows.map(row =&gt; `&lt;tr&gt;&lt;td&gt;&lt;code&gt;${escapeHtml(row.code)}&lt;/code&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(row.name)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;strong&gt;${num.format(row.qty)}&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(row.unit)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(rowPurchaseTotal(row))}&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;tfoot&gt;&lt;tr&gt;&lt;th colspan=&quot;4&quot;&gt;Tahmini malzeme sipariş toplamı&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;${money.format(orderRows.reduce((sum, row) =&gt; sum + rowPurchaseTotal(row), 0))}&lt;/th&gt;&lt;/tr&gt;&lt;/tfoot&gt;&lt;/table&gt;&lt;/div&gt;`
          : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Teknik seçimi tamamlanmış ürün bulunamadı.&lt;/div&gt;&#x27;;
        ensureIcons();
      }

      function customerPrintItem(item, index) {
        item = completeProjectItemTechnical(item, index);
        const drawing = captureProductDrawing(item, index);
        const technicalStatus = item.technicalSource === &#x27;automatic&#x27; ? &#x27;Profil ve teknik bilgiler otomatik hazırlandı&#x27; : &#x27;Üretim seçimi tamamlandı&#x27;;
        const itemTotal = money.format(Number(item.total) || 0);
        const position = item.reference || &#x27;Konum belirtilmedi&#x27;;
        const productInfo = `${position} için ${item.finish} ${item.productName}; ${num.format(item.width)} × ${num.format(item.height)} mm, ${num.format(item.qty || 1)} adet. ${item.system} profil sistemi ve ${item.glass} kullanılacaktır.`;
        return `&lt;article class=&quot;d360-print-item&quot;&gt;
          &lt;div&gt;${drawing}&lt;/div&gt;
          &lt;div class=&quot;d360-print-specs&quot;&gt;
            &lt;div class=&quot;d360-print-item-note&quot;&gt;&lt;span class=&quot;text-small&quot;&gt;Poz ${index + 1}&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.reference || `Ürün ${index + 1}`)} · ${escapeHtml(item.productName || &#x27;Doğrama&#x27;)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Konum / oda / cephe&lt;/span&gt;&lt;strong&gt;${escapeHtml(position)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Dış kasa ölçüsü&lt;/span&gt;&lt;strong&gt;${num.format(item.width)} × ${num.format(item.height)} mm&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Adet&lt;/span&gt;&lt;strong&gt;${num.format(item.qty || 1)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Profil sistemi&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.system)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Malzeme&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.material)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Cam / dolgu&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.glass || &#x27;Henüz seçilmedi&#x27;)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Renk / yüzey&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.finish || &#x27;Henüz seçilmedi&#x27;)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Kullanım&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.operation || &#x27;Manuel&#x27;)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Tutar&lt;/span&gt;&lt;strong&gt;${escapeHtml(itemTotal)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div class=&quot;d360-print-item-note&quot;&gt;&lt;span class=&quot;text-small&quot;&gt;Durum&lt;/span&gt;&lt;strong&gt;${escapeHtml(technicalStatus)}&lt;/strong&gt;&lt;/div&gt;
            &lt;div class=&quot;d360-print-product-info&quot;&gt;&lt;span class=&quot;text-small&quot;&gt;Ürün hakkında kısa bilgi&lt;/span&gt;&lt;strong&gt;${escapeHtml(productInfo)}&lt;/strong&gt;&lt;/div&gt;
            ${item.note ? `&lt;div class=&quot;d360-print-item-note&quot;&gt;&lt;span class=&quot;text-small&quot;&gt;Açıklama&lt;/span&gt;&lt;strong&gt;${escapeHtml(item.note)}&lt;/strong&gt;&lt;/div&gt;` : &#x27;&#x27;}
          &lt;/div&gt;
        &lt;/article&gt;`;
      }

      function buildCustomerPrint({ customer, project, items, total, documentNo }) {
        const company = root.querySelector(&#x27;#d360-company-name&#x27;).textContent.trim() || &#x27;Doğrama360 firma hesabı&#x27;;
        const date = new Date().toLocaleDateString(&#x27;tr-TR&#x27;);
        const completedItems = items.map((item, index) =&gt; completeProjectItemTechnical(item, index));
        const totalUnits = completedItems.reduce((sum, item) =&gt; sum + Number(item.qty || 0), 0);
        const positions = [...new Set(completedItems.map(item =&gt; item.reference).filter(Boolean))];
        const finishes = [...new Set(completedItems.map(item =&gt; item.finish).filter(Boolean))];
        const materials = [...new Set(completedItems.map(item =&gt; item.material).filter(Boolean))];
        const totalLabel = money.format(Number(total) || completedItems.reduce((sum, item) =&gt; sum + Number(item.total || 0), 0));
        return `&lt;div class=&quot;d360-print-header&quot;&gt;
          &lt;div&gt;&lt;strong&gt;${escapeHtml(company)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;Teklif ve ürün görselleri&lt;/div&gt;&lt;/div&gt;
          &lt;div&gt;&lt;strong&gt;${escapeHtml(documentNo)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;Düzenleme tarihi: ${escapeHtml(date)}&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;d360-print-customer&quot;&gt;
          &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Müşteri&lt;/span&gt;&lt;strong&gt;${escapeHtml(customer ? customer.name : &#x27;Müşteri seçilmedi&#x27;)}&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;${escapeHtml(customer ? customer.phone : &#x27;&#x27;)}${customer &amp;&amp; customer.email ? ` · ${escapeHtml(customer.email)}` : &#x27;&#x27;}&lt;/span&gt;&lt;/div&gt;
          &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Proje / konum&lt;/span&gt;&lt;strong&gt;${escapeHtml(project ? project.name : &#x27;Yeni teklif&#x27;)}&lt;/strong&gt;&lt;span class=&quot;text-small&quot;&gt;${escapeHtml(project &amp;&amp; project.location ? project.location : &#x27;Konum belirtilmedi&#x27;)}&lt;/span&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div&gt;&lt;strong&gt;Genel proje bilgisi&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;Müşterinin sipariş kapsamı, kullanılacak ana malzemeler ve ürün konumları.&lt;/div&gt;&lt;/div&gt;
        &lt;div class=&quot;d360-print-overview&quot;&gt;
          &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;İşin kapsamı&lt;/span&gt;&lt;strong&gt;${num.format(completedItems.length)} farklı ürün · ${num.format(totalUnits)} adet&lt;/strong&gt;&lt;/div&gt;
          &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Proje durumu&lt;/span&gt;&lt;strong&gt;${escapeHtml(project &amp;&amp; project.status ? project.status : &#x27;Teklif hazırlandı&#x27;)}&lt;/strong&gt;&lt;/div&gt;
          &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Konumlar / pozlar&lt;/span&gt;&lt;strong&gt;${escapeHtml(positions.length ? positions.join(&#x27; · &#x27;) : &#x27;Konum belirtilmedi&#x27;)}&lt;/strong&gt;&lt;/div&gt;
          &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Malzeme ve renkler&lt;/span&gt;&lt;strong&gt;${escapeHtml(`${materials.join(&#x27; · &#x27;) || &#x27;Malzeme otomatik seçildi&#x27;} / ${finishes.join(&#x27; · &#x27;) || &#x27;Renk otomatik seçildi&#x27;}`)}&lt;/strong&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div&gt;&lt;strong&gt;Ürünler ve üretim görselleri&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;Çizimler seçilen ürün tipi ve dış kasa ölçüsüne göre hazırlanmıştır.&lt;/div&gt;&lt;/div&gt;
        &lt;div&gt;${completedItems.length ? completedItems.map(customerPrintItem).join(&#x27;&#x27;) : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Çıktıya eklenecek ürün bulunamadı.&lt;/div&gt;&#x27;}&lt;/div&gt;
        &lt;div class=&quot;d360-print-summary&quot;&gt;
          &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Toplam ürün&lt;/span&gt;&lt;strong&gt;${num.format(totalUnits)} adet&lt;/strong&gt;&lt;/div&gt;
          &lt;div&gt;&lt;span class=&quot;text-small&quot;&gt;Genel toplam · KDV dahil&lt;/span&gt;&lt;strong&gt;${escapeHtml(totalLabel)}&lt;/strong&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;text-small&quot;&gt;Bu belge müşteriye sunulacak ürün görünümü ve teklif özetidir. Üretimden önce kesin ölçüler ve teknik detaylar firma tarafından tekrar kontrol edilir.&lt;/div&gt;
        &lt;div class=&quot;d360-print-signatures&quot;&gt;&lt;div class=&quot;d360-print-signature&quot;&gt;&lt;strong&gt;Firma yetkilisi&lt;/strong&gt;&lt;/div&gt;&lt;div class=&quot;d360-print-signature&quot;&gt;&lt;strong&gt;Müşteri onayı&lt;/strong&gt;&lt;/div&gt;&lt;/div&gt;`;
      }

      function showCurrentCustomerPrint() {
        const calc = calculate();
        const customer = customers.find(item =&gt; item.id === state.measureCustomerId) || null;
        const project = projects.find(item =&gt; item.id === state.measureProjectId) || {
          name: root.querySelector(&#x27;#d360-measure-project-name&#x27;).value.trim() || &#x27;Yeni teklif&#x27;,
          location: root.querySelector(&#x27;#d360-measure-project-location&#x27;).value.trim()
        };
        const currentItem = {
          productId: state.selected,
          productName: selectedProduct().name,
          width: state.width,
          height: state.height,
          qty: state.qty,
          material: materialTypes[state.material].label,
          materialId: state.material,
          projectDefaultMaterialId: project.defaultMaterialId || state.projectDefaultMaterial,
          materialOverride: state.material !== (project.defaultMaterialId || state.projectDefaultMaterial),
          system: selectedSystem().name,
          systemId: state.systemId,
          glass: glassLabels[state.glass],
          glassId: state.glass,
          finish: finishLabels[state.finish],
          finishId: state.finish,
          operation: operationLabels[state.operation],
          operationId: state.operation,
          reference: root.querySelector(&#x27;#d360-measure-reference&#x27;).value.trim(),
          note: root.querySelector(&#x27;#d360-measure-note&#x27;).value.trim(),
          total: calc.grandTotal
        };
        const now = new Date();
        const dateCode = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, &#x27;0&#x27;)}${String(now.getDate()).padStart(2, &#x27;0&#x27;)}`;
        const projectItems = Array.isArray(project.items) &amp;&amp; project.items.length ? project.items : [currentItem];
        const projectTotal = Array.isArray(project.items) &amp;&amp; project.items.length ? Number(project.total || projectItemTotal(project)) : calc.grandTotal;
        root.querySelector(&#x27;#d360-print-document&#x27;).innerHTML = buildCustomerPrint({ customer, project, items: projectItems, total: projectTotal, documentNo: `TKL-${dateCode}` });
        state.printReturnPage = &#x27;catalog&#x27;;
        showPage(&#x27;print&#x27;);
      }

      function showProjectCustomerPrint(project) {
        if (!project) return;
        const customer = customers.find(item =&gt; item.id === project.customerId) || null;
        const items = Array.isArray(project.items) ? project.items : [];
        root.querySelector(&#x27;#d360-print-document&#x27;).innerHTML = buildCustomerPrint({ customer, project, items, total: project.total, documentNo: project.no || &#x27;PROJE&#x27; });
        state.printReturnPage = &#x27;projects&#x27;;
        showPage(&#x27;print&#x27;);
      }

      function renderConfigOutput() {
        const calc = calculate();
        const target = root.querySelector(&#x27;#d360-config-output&#x27;);
        if (state.output === &#x27;cuts&#x27;) target.innerHTML = cutOutput(calc);
        else if (state.output === &#x27;offer&#x27;) target.innerHTML = offerOutput(calc);
        else target.innerHTML = materialOutput(calc);
      }

      function renderCalculation() {
        const calc = calculate();
        root.querySelector(&#x27;#d360-unit-total&#x27;).textContent = money.format(calc.totalEach);
        root.querySelector(&#x27;#d360-grand-total&#x27;).textContent = money.format(calc.grandTotal);
        root.querySelector(&#x27;#d360-material-cost&#x27;).textContent = money.format(calc.materialCostEach * state.qty);
        root.querySelector(&#x27;#d360-qty-label&#x27;).textContent = `${num.format(state.qty)} adet`;
        root.querySelector(&#x27;#d360-waste-label&#x27;).textContent = `%${num.format(calc.wastePercent)} fire · ${selectedSystem().name}`;
        root.querySelector(&#x27;#d360-offer-output&#x27;).innerHTML = offerOutput(calc);
        renderChoiceSummary();
        renderConfigOutput();
      }

      function renderConfigurator() {
        renderMeasurementModelOptions();
        renderSelected();
        root.querySelector(&#x27;#d360-prepare-offer&#x27;).hidden = !canViewCustomerContact();
        renderProductSvg();
        renderCalculation();
      }

      function renderMaterialTable() {
        const list = priceMaterials.filter(item =&gt; state.materialFilter === &#x27;all&#x27; || item.group === state.materialFilter);
        root.querySelector(&#x27;#d360-material-table&#x27;).innerHTML = list.map(item =&gt; `&lt;tr&gt;&lt;td&gt;&lt;code&gt;${item.code}&lt;/code&gt;&lt;/td&gt;&lt;td&gt;${item.name}&lt;/td&gt;&lt;td&gt;${item.unit}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;label class=&quot;sr-only&quot; for=&quot;price-${item.code}&quot;&gt;${item.name} alış fiyatı&lt;/label&gt;&lt;input class=&quot;form-control d360-table-input&quot; id=&quot;price-${item.code}&quot; data-price-code=&quot;${item.code}&quot; type=&quot;number&quot; min=&quot;0&quot; step=&quot;0.01&quot; value=&quot;${item.price}&quot;&gt;&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${num.format(item.stock)}&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;);
      }

      function updateCurrencyHelp() {
        const currency = root.querySelector(&#x27;#d360-currency&#x27;).value;
        const rateInput = root.querySelector(&#x27;#d360-exchange-rate&#x27;);
        if (currency === &#x27;TRY&#x27;) {
          rateInput.value = &#x27;1&#x27;;
          rateInput.disabled = true;
          root.querySelector(&#x27;#d360-currency-help&#x27;).textContent = &#x27;TL seçili olduğu için kur otomatik olarak 1 kullanılır.&#x27;;
        } else {
          rateInput.disabled = false;
          if (currency !== state.currency) rateInput.value = &#x27;&#x27;;
          root.querySelector(&#x27;#d360-currency-help&#x27;).textContent = `TL tabanlı fiyatları ${currency} olarak göstermek için güncel kuru siz girin. Otomatik kur kullanılmaz.`;
        }
      }

      function applyPricingSettings() {
        const currency = root.querySelector(&#x27;#d360-currency&#x27;).value;
        const rate = currency === &#x27;TRY&#x27; ? 1 : Number(root.querySelector(&#x27;#d360-exchange-rate&#x27;).value);
        const profit = Number(root.querySelector(&#x27;#d360-profit-rate&#x27;).value);
        const vat = Number(root.querySelector(&#x27;#d360-vat-rate&#x27;).value);
        if (!Number.isFinite(rate) || rate &lt;= 0 || !Number.isFinite(profit) || profit &lt; 0 || !Number.isFinite(vat) || vat &lt; 0) {
          root.querySelector(&#x27;#d360-pricing-status&#x27;).textContent = &#x27;Kur, kâr ve KDV değerlerini kontrol edin.&#x27;;
          root.querySelector(&#x27;#d360-pricing-status&#x27;).classList.add(&#x27;text-destructive&#x27;);
          return false;
        }
        state.currency = currency;
        state.exchangeRate = rate;
        state.profitRate = profit;
        state.vatRate = vat;
        root.querySelector(&#x27;#d360-pricing-status&#x27;).classList.remove(&#x27;text-destructive&#x27;);
        root.querySelector(&#x27;#d360-pricing-status&#x27;).textContent = `${currency} · %${num.format(profit)} kâr · %${num.format(vat)} KDV tüm hesaplara uygulandı.`;
        renderCalculation();
        renderProjects();
        renderCustomers();
        persistData();
        return true;
      }

      function returnToProductAfterPricing() {
        if (!state.returnToProductAfterPricing) return;
        state.returnToProductAfterPricing = false;
        showPage(&#x27;catalog&#x27;);
        showWizardStep(state.step);
        root.querySelector(&#x27;#d360-action-status&#x27;).textContent = `Fiyat ayarları kaydedildi: ${state.currency} · %${num.format(state.profitRate)} kâr · %${num.format(state.vatRate)} KDV.`;
      }

      function projectItemCount(project) {
        return (project.items || []).reduce((sum, item) =&gt; sum + Number(item.qty || 0), 0);
      }

      function projectItemTotal(project) {
        return (project.items || []).reduce((sum, item) =&gt; sum + Number(item.total || 0), 0);
      }

      function nextProjectNumber() {
        const highest = projects.reduce((max, project) =&gt; {
          const value = Number(String(project.no || &#x27;&#x27;).replace(/\D/g, &#x27;&#x27;));
          return Number.isFinite(value) ? Math.max(max, value) : max;
        }, 0);
        return `PRJ-${String(highest + 1).padStart(4, &#x27;0&#x27;)}`;
      }

      function activeMembership() {
        return membershipPlans[state.membershipPlan] || membershipPlans.free;
      }

      function limitLabel(value) {
        return Number.isFinite(value) ? num.format(value) : &#x27;Sınırsız&#x27;;
      }

      function isEmployeeRole() {
        return state.activeRole === &#x27;employee&#x27;;
      }

      function canViewCustomerContact() {
        return !isEmployeeRole();
      }

      function canManageCustomerRecord() {
        return !isEmployeeRole();
      }

      function canDeleteRecords() {
        return !isEmployeeRole();
      }

      function canCreateCustomerRecord() {
        const limit = activeMembership().customerLimit;
        return canManageCustomerRecord() &amp;&amp; (!Number.isFinite(limit) || customers.length &lt; limit);
      }

      function canCreateProjectRecord() {
        const limit = activeMembership().projectLimit;
        return !Number.isFinite(limit) || projects.length &lt; limit;
      }

      function membershipLimitMessage(type) {
        const plan = activeMembership();
        if (type === &#x27;customer&#x27;) {
          if (isEmployeeRole()) return &#x27;Çalışan rolü müşteri iletişim kaydı oluşturamaz veya değiştiremez. Yöneticinizden müşteriyi kaydetmesini isteyin.&#x27;;
          return `${plan.label} planında ${limitLabel(plan.customerLimit)} müşteri sınırına ulaştınız. Mevcut kayıtlar korunur; yeni müşteri için planı yükseltin.`;
        }
        if (type === &#x27;project&#x27;) return `${plan.label} planında ${limitLabel(plan.projectLimit)} proje sınırına ulaştınız. Mevcut projeler korunur; yeni proje için planı yükseltin.`;
        return &#x27;Şirket planı en fazla 3 girişe izin verir: 1 şirket sahibi ve 2 çalışan.&#x27;;
      }

      function createProject({ customerId, name, location, status = &#x27;Ölçü alındı&#x27;, estimatedTotal = 0, defaultMaterialId = &#x27;pvc&#x27; }) {
        const customer = customers.find(item =&gt; item.id === customerId);
        if (!customer || !canCreateProjectRecord()) return null;
        const project = {
          id: makeId(&#x27;prj&#x27;),
          no: nextProjectNumber(),
          customerId: customer.id,
          customer: customer.name,
          name,
          location,
          defaultMaterialId: materialTypes[defaultMaterialId] ? defaultMaterialId : &#x27;pvc&#x27;,
          status,
          estimatedTotal: Number(estimatedTotal) || 0,
          products: 0,
          total: Number(estimatedTotal) || 0,
          items: []
        };
        projects.unshift(project);
        return project;
      }

      function refreshProjectTotals(project) {
        project.items = Array.isArray(project.items) ? project.items : [];
        project.products = projectItemCount(project);
        project.total = Number(project.estimatedTotal || 0) + projectItemTotal(project);
      }

      function savedItemMaterialRows(item) {
        if (item.measurementOnly) return [];
        if (Array.isArray(item.orderRows) &amp;&amp; item.orderRows.length) return item.orderRows.map(row =&gt; ({ ...row, qty: Number(row.qty) || 0 }));
        const product = products.find(entry =&gt; entry.id === item.productId);
        if (!product) return [];
        const materialId = item.materialId || Object.keys(materialTypes).find(key =&gt; materialTypes[key].label === item.material) || product.materials[0];
        const glassId = item.glassId || Object.keys(glassLabels).find(key =&gt; glassLabels[key] === item.glass) || &#x27;double&#x27;;
        const operationId = item.operationId || Object.keys(operationLabels).find(key =&gt; operationLabels[key] === item.operation) || &#x27;manual&#x27;;
        const system = systems.find(entry =&gt; entry.id === item.systemId) || systems.find(entry =&gt; entry.name === item.system);
        const wasteRule = system &amp;&amp; system.rules.find(rule =&gt; rule.type === &#x27;wastePercent&#x27;);
        return materialRowsForConfiguration({
          product,
          metrics: profileMetrics(product, Number(item.width) || 1, Number(item.height) || 1),
          materialId,
          glassId,
          operationId,
          qty: Number(item.qty) || 1,
          wastePercent: wasteRule ? Number(wasteRule.value) : 8,
          width: Number(item.width) || 1
        });
      }

      function projectOrderRows(project) {
        const grouped = new Map();
        (project.items || []).flatMap(savedItemMaterialRows).forEach(row =&gt; {
          const key = `${row.code}|${row.unit}`;
          const existing = grouped.get(key);
          if (existing) existing.qty += Number(row.qty) || 0;
          else grouped.set(key, { ...row, qty: Number(row.qty) || 0 });
        });
        return [...grouped.values()].sort((a, b) =&gt; a.code.localeCompare(b.code, &#x27;tr&#x27;));
      }

      function combinedOrderRows(projectList = projects) {
        const grouped = new Map();
        projectList.flatMap(projectOrderRows).forEach(row =&gt; {
          const key = `${row.code}|${row.unit}`;
          const existing = grouped.get(key);
          if (existing) existing.qty += Number(row.qty) || 0;
          else grouped.set(key, { ...row, qty: Number(row.qty) || 0 });
        });
        return [...grouped.values()].sort((a, b) =&gt; a.code.localeCompare(b.code, &#x27;tr&#x27;));
      }

      function setDashboardStat(index, label, value, context) {
        const names = [&#x27;one&#x27;, &#x27;two&#x27;, &#x27;three&#x27;];
        const values = [&#x27;#d360-dashboard-project-count&#x27;, &#x27;#d360-dashboard-item-count&#x27;, &#x27;#d360-dashboard-total&#x27;];
        root.querySelector(`#d360-dashboard-stat-${names[index]}-label`).textContent = label;
        root.querySelector(values[index]).textContent = value;
        root.querySelector(`#d360-dashboard-stat-${names[index]}-context`).textContent = context;
      }

      function projectTableRows(list, action = &#x27;open&#x27;) {
        if (!list.length) return &#x27;&lt;tr&gt;&lt;td colspan=&quot;5&quot; class=&quot;d360-empty&quot;&gt;Bu çalışma alanında bekleyen kayıt yok.&lt;/td&gt;&lt;/tr&gt;&#x27;;
        return list.map(project =&gt; {
          const customer = customers.find(item =&gt; item.id === project.customerId);
          const button = action === &#x27;production&#x27;
            ? `&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-project-stage=&quot;${project.id}&quot; data-next-status=&quot;Üretimde&quot;&gt;Üretime al&lt;/button&gt;`
            : action === &#x27;installation&#x27;
              ? `&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-project-stage=&quot;${project.id}&quot; data-next-status=&quot;${project.status === &#x27;Montajda&#x27; ? &#x27;Teslim edildi&#x27; : &#x27;Montajda&#x27;}&quot;&gt;${project.status === &#x27;Montajda&#x27; ? &#x27;Teslim et&#x27; : &#x27;Montaja al&#x27;}&lt;/button&gt;`
              : `&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-role-project=&quot;${project.id}&quot;&gt;Projeyi aç&lt;/button&gt;`;
          return `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(project.name)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(project.location || &#x27;Konum yok&#x27;)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(customer ? customer.name : &#x27;—&#x27;)}&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(project.status)}&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${project.products}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${button}&lt;/td&gt;&lt;/tr&gt;`;
        }).join(&#x27;&#x27;);
      }
