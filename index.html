          content.innerHTML = `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Proje&lt;/th&gt;&lt;th&gt;Müşteri&lt;/th&gt;&lt;th&gt;Durum&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Ürün&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;İşlem&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${projectTableRows(ready, &#x27;production&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`;
        } else if (role.id === &#x27;procurement&#x27;) {
          const rows = combinedOrderRows(projects.filter(project =&gt; project.status !== &#x27;Teslim edildi&#x27;));
          const purchaseTotal = rows.reduce((sum, row) =&gt; sum + rowPurchaseTotal(row), 0);
          const lowStock = rows.filter(row =&gt; { const material = catalogMaterial(row.code); return material &amp;&amp; Number(material.stock) &lt; Number(row.qty); }).length;
          setDashboardStat(0, &#x27;Sipariş kalemi&#x27;, rows.length, &#x27;Birleşik proje ihtiyacı&#x27;);
          setDashboardStat(1, &#x27;Tahmini alış toplamı&#x27;, money.format(purchaseTotal), &#x27;Güncel fiyat listesi&#x27;);
          setDashboardStat(2, &#x27;Stok açığı&#x27;, lowStock, &#x27;Mevcut stoktan fazla ihtiyaç&#x27;);
          actions.innerHTML = &#x27;&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-role-action=&quot;materials&quot;&gt;Stok ve fiyatlar&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-role-action=&quot;projects&quot;&gt;Proje sipariş listeleri&lt;/button&gt;&#x27;;
          content.innerHTML = rows.length ? `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Kod&lt;/th&gt;&lt;th&gt;Malzeme / aksesuar&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;İhtiyaç&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Stok&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Alış tutarı&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${rows.map(row =&gt; { const material = catalogMaterial(row.code); return `&lt;tr&gt;&lt;td&gt;&lt;code&gt;${escapeHtml(row.code)}&lt;/code&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(row.name)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;strong&gt;${num.format(row.qty)} ${escapeHtml(row.unit)}&lt;/strong&gt;&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${material ? num.format(material.stock) : &#x27;—&#x27;}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(rowPurchaseTotal(row))}&lt;/td&gt;&lt;/tr&gt;`; }).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;` : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Açık projelere ölçü eklendiğinde birleşik satın alma listesi burada oluşacak.&lt;/div&gt;&#x27;;
        } else {
          const install = projects.filter(project =&gt; /Üretimde|Montajda/.test(project.status));
          setDashboardStat(0, &#x27;Montaj kuyruğu&#x27;, install.length, &#x27;Üretimden çıkan işler&#x27;);
          setDashboardStat(1, &#x27;Montajda&#x27;, projects.filter(project =&gt; project.status === &#x27;Montajda&#x27;).length, &#x27;Sahadaki ekipler&#x27;);
          setDashboardStat(2, &#x27;Teslim edilen&#x27;, projects.filter(project =&gt; project.status === &#x27;Teslim edildi&#x27;).length, &#x27;Servis geçmişine hazır&#x27;);
          actions.innerHTML = &#x27;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-role-action=&quot;projects&quot;&gt;Montaj projelerini aç&lt;/button&gt;&#x27;;
          content.innerHTML = `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Proje&lt;/th&gt;&lt;th&gt;Müşteri&lt;/th&gt;&lt;th&gt;Durum&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Ürün&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;İşlem&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${projectTableRows(install, &#x27;installation&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`;
        }
        renderWorkflowLane();
        ensureIcons();
      }

      function renderProjectDetail() {
        const detail = root.querySelector(&#x27;#d360-project-detail&#x27;);
        const project = projects.find(item =&gt; item.id === state.selectedProjectId);
        if (!project) {
          detail.hidden = true;
          return;
        }
        completeProjectTechnicalData(project);
        const customer = customers.find(item =&gt; item.id === project.customerId);
        detail.hidden = false;
        root.querySelector(&#x27;#d360-project-detail-name&#x27;).textContent = `${project.no} · ${project.name}`;
        root.querySelector(&#x27;#d360-project-detail-meta&#x27;).textContent = `${customer ? customer.name : &#x27;Müşteri bulunamadı&#x27;} · ${project.location || &#x27;Konum belirtilmedi&#x27;} · Ana malzeme: ${(materialTypes[project.defaultMaterialId] || materialTypes.pvc).label} · ${project.products} ürün`;
        const items = project.items || [];
        root.querySelector(&#x27;#d360-project-print&#x27;).disabled = !items.length || !canViewCustomerContact();
        root.querySelector(&#x27;#d360-project-print&#x27;).hidden = !canViewCustomerContact();
        root.querySelector(&#x27;#d360-project-delete&#x27;).disabled = !canDeleteRecords();
        root.querySelector(&#x27;#d360-project-delete&#x27;).hidden = !canDeleteRecords();
        root.querySelector(&#x27;#d360-project-items&#x27;).innerHTML = items.length
          ? `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Ürün, poz ve ölçü&lt;/th&gt;&lt;th&gt;Sistem / saha kaydı&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Adet&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Tutar&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${items.map(item =&gt; `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(item.productName)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(item.reference || &#x27;Poz belirtilmedi&#x27;)} · ${num.format(item.width)} × ${num.format(item.height)} mm · ${escapeHtml(item.addedAt || &#x27;&#x27;)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(item.system)}&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(item.material)} · ${escapeHtml(item.glass)} · ${escapeHtml(item.finish)}&lt;/div&gt;${item.note ? `&lt;div class=&quot;text-small&quot;&gt;Not: ${escapeHtml(item.note)}&lt;/div&gt;` : &#x27;&#x27;}${item.photoName ? `&lt;div class=&quot;text-small&quot;&gt;Fotoğraf: ${escapeHtml(item.photoName)}&lt;/div&gt;` : &#x27;&#x27;}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${num.format(item.qty)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(item.total)}&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`
          : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Bu projede henüz ölçü yok. “Bu projeye ölçü ekle” ile ustanın ölçü girişine geçin.&lt;/div&gt;&#x27;;
        const orderRows = projectOrderRows(project);
        root.querySelector(&#x27;#d360-order-count&#x27;).textContent = `${orderRows.length} kalem`;
        root.querySelector(&#x27;#d360-project-order-list&#x27;).innerHTML = orderRows.length
          ? `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Kod&lt;/th&gt;&lt;th&gt;Sipariş edilecek malzeme / aksesuar&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Toplam miktar&lt;/th&gt;&lt;th&gt;Birim&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Alış tutarı&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${orderRows.map(row =&gt; `&lt;tr&gt;&lt;td&gt;&lt;code&gt;${escapeHtml(row.code)}&lt;/code&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(row.name)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;strong&gt;${num.format(row.qty)}&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(row.unit)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(rowPurchaseTotal(row))}&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;tfoot&gt;&lt;tr&gt;&lt;th colspan=&quot;4&quot;&gt;Tahmini malzeme sipariş toplamı&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;${money.format(orderRows.reduce((sum, row) =&gt; sum + rowPurchaseTotal(row), 0))}&lt;/th&gt;&lt;/tr&gt;&lt;/tfoot&gt;&lt;/table&gt;&lt;/div&gt;`
          : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Projeye ilk ölçü kaydedildiğinde sipariş listesi burada otomatik oluşacak.&lt;/div&gt;&#x27;;
      }

      function renderProjectCustomerOptions() {
        const select = root.querySelector(&#x27;#d360-standalone-project-customer&#x27;);
        select.innerHTML = customers.length
          ? `&lt;option value=&quot;&quot;&gt;Müşteri seçin&lt;/option&gt;${customers.map(customer =&gt; `&lt;option value=&quot;${customer.id}&quot;&gt;${escapeHtml(customer.name)} · ${escapeHtml(customer.status || &#x27;Aktif&#x27;)}${canViewCustomerContact() ? ` · ${escapeHtml(customer.phone)}` : &#x27;&#x27;}&lt;/option&gt;`).join(&#x27;&#x27;)}`
          : &#x27;&lt;option value=&quot;&quot;&gt;Önce müşteri ekleyin&lt;/option&gt;&#x27;;
        select.disabled = !customers.length;
      }

      function renderAssignmentSummary() {
        const customer = customers.find(item =&gt; item.id === state.measureCustomerId);
        const project = projects.find(item =&gt; item.id === state.measureProjectId &amp;&amp; item.customerId === state.measureCustomerId);
        const pendingName = root.querySelector(&#x27;#d360-measure-project-name&#x27;).value.trim();
        const label = customer
          ? `${customer.name} · ${project ? project.name : (pendingName || &#x27;Yeni proje&#x27;)}`
          : &#x27;Önce müşteri ve proje seçin&#x27;;
        root.querySelectorAll(&#x27;[data-assignment-summary]&#x27;).forEach(element =&gt; { element.textContent = label; });
        const continueButton = root.querySelector(&#x27;#d360-assignment-continue&#x27;);
        if (continueButton) continueButton.disabled = !customer;
      }

      function validateAssignmentContext() {
        const customer = customers.find(item =&gt; item.id === state.measureCustomerId);
        const project = projects.find(item =&gt; item.id === state.measureProjectId &amp;&amp; item.customerId === state.measureCustomerId);
        const newName = root.querySelector(&#x27;#d360-measure-project-name&#x27;).value.trim();
        const newLocation = root.querySelector(&#x27;#d360-measure-project-location&#x27;).value.trim();
        let message = &#x27;&#x27;;
        if (!customer) message = &#x27;Önce müşteri seçin veya “Müşteri listede yok” düğmesiyle yeni kayıt oluşturun.&#x27;;
        else if (state.measureProjectId === &#x27;new&#x27; &amp;&amp; !canCreateProjectRecord()) message = membershipLimitMessage(&#x27;project&#x27;);
        else if (state.measureProjectId === &#x27;new&#x27; &amp;&amp; (!newName || !newLocation)) message = &#x27;Yeni proje için proje adı ve konum / şantiye bilgisi girin.&#x27;;
        else if (state.measureProjectId !== &#x27;new&#x27; &amp;&amp; !project) message = &#x27;Mevcut bir proje seçin veya yeni proje oluşturun.&#x27;;
        root.querySelector(&#x27;#d360-assignment-error&#x27;).textContent = message;
        return !message;
      }

      function confirmMeasurementAssignment() {
        if (!validateAssignmentContext()) return;
        const customer = customers.find(item =&gt; item.id === state.measureCustomerId);
        let project = projects.find(item =&gt; item.id === state.measureProjectId &amp;&amp; item.customerId === state.measureCustomerId);
        const chosenMaterial = root.querySelector(&#x27;#d360-project-default-material&#x27;).value || state.projectDefaultMaterial;
        if (state.measureProjectId === &#x27;new&#x27;) {
          project = createProject({
            customerId: customer.id,
            name: root.querySelector(&#x27;#d360-measure-project-name&#x27;).value.trim(),
            location: root.querySelector(&#x27;#d360-measure-project-location&#x27;).value.trim(),
            status: &#x27;Ölçü bekliyor&#x27;,
            defaultMaterialId: chosenMaterial
          });
          if (project) state.measureProjectId = project.id;
        }
        if (!project) {
          root.querySelector(&#x27;#d360-assignment-error&#x27;).textContent = canCreateProjectRecord() ? &#x27;Proje oluşturulamadı. Bilgileri kontrol edip tekrar deneyin.&#x27; : membershipLimitMessage(&#x27;project&#x27;);
          return;
        }
        project.defaultMaterialId = chosenMaterial;
        state.projectDefaultMaterial = chosenMaterial;
        setCurrentMaterial(chosenMaterial);
        state.selectedCustomerId = customer.id;
        state.selectedProjectId = project.id;
        state.maxStep = Math.max(state.maxStep, 2);
        root.querySelector(&#x27;#d360-project-badge&#x27;).textContent = `${project.name} · ${project.products || 0} ürün`;
        renderProjects();
        renderCustomers();
        renderAssignmentOptions();
        renderCategories();
        renderProductGrid();
        renderSelected();
        persistData();
        showWizardStep(2);
        root.querySelector(&#x27;#d360-product-search&#x27;).focus();
      }

      function renderAssignmentOptions() {
        const customerSelect = root.querySelector(&#x27;#d360-measure-customer&#x27;);
        const projectSelect = root.querySelector(&#x27;#d360-measure-project&#x27;);
        const materialSelect = root.querySelector(&#x27;#d360-project-default-material&#x27;);
        const newProjectFields = root.querySelector(&#x27;#d360-new-measure-project&#x27;);
        const help = root.querySelector(&#x27;#d360-measure-assignment-help&#x27;);
        materialSelect.innerHTML = Object.entries(materialTypes).map(([id, material]) =&gt; `&lt;option value=&quot;${id}&quot;&gt;${escapeHtml(material.label)}&lt;/option&gt;`).join(&#x27;&#x27;);
        customerSelect.innerHTML = customers.length
          ? `&lt;option value=&quot;&quot;&gt;Müşteri seçin&lt;/option&gt;${customers.map(customer =&gt; `&lt;option value=&quot;${customer.id}&quot;&gt;${escapeHtml(customer.name)} · ${escapeHtml(customer.status || &#x27;Aktif&#x27;)}${canViewCustomerContact() ? ` · ${escapeHtml(customer.phone)}` : &#x27;&#x27;}&lt;/option&gt;`).join(&#x27;&#x27;)}`
          : &#x27;&lt;option value=&quot;&quot;&gt;Önce müşteri ekleyin&lt;/option&gt;&#x27;;
        customerSelect.disabled = !customers.length;
        if (!customers.some(customer =&gt; customer.id === state.measureCustomerId)) state.measureCustomerId = &#x27;&#x27;;
        customerSelect.value = state.measureCustomerId;

        if (!state.measureCustomerId) {
          state.measureProjectId = &#x27;&#x27;;
          projectSelect.innerHTML = &#x27;&lt;option value=&quot;&quot;&gt;Önce müşteri seçin&lt;/option&gt;&#x27;;
          projectSelect.disabled = true;
          materialSelect.disabled = false;
          materialSelect.value = state.projectDefaultMaterial;
          newProjectFields.hidden = true;
          help.textContent = customers.length ? &#x27;Ölçünün kimin hesabına kaydedileceğini seçin.&#x27; : &#x27;Önce Müşteriler bölümünden müşteri ekleyin; sonra bu ekrana dönün.&#x27;;
          renderProjectCustomerOptions();
          renderMeasurementBatch();
          renderAssignmentSummary();
          return;
        }

        const customer = customers.find(item =&gt; item.id === state.measureCustomerId);
        const list = projects.filter(project =&gt; project.customerId === state.measureCustomerId);
        projectSelect.disabled = false;
        projectSelect.innerHTML = `&lt;option value=&quot;new&quot;&gt;+ Yeni proje oluştur&lt;/option&gt;${list.map(project =&gt; `&lt;option value=&quot;${project.id}&quot;&gt;${escapeHtml(project.name)} · ${escapeHtml(project.location || &#x27;Konum yok&#x27;)}&lt;/option&gt;`).join(&#x27;&#x27;)}`;
        if (state.measureProjectId !== &#x27;new&#x27; &amp;&amp; !list.some(project =&gt; project.id === state.measureProjectId)) state.measureProjectId = &#x27;new&#x27;;
        if (!state.measureProjectId) state.measureProjectId = &#x27;new&#x27;;
        projectSelect.value = state.measureProjectId;
        newProjectFields.hidden = state.measureProjectId !== &#x27;new&#x27;;
        const project = list.find(item =&gt; item.id === state.measureProjectId);
        if (project &amp;&amp; materialTypes[project.defaultMaterialId]) state.projectDefaultMaterial = project.defaultMaterialId;
        materialSelect.disabled = false;
        materialSelect.value = state.projectDefaultMaterial;
        help.textContent = project
          ? `Bu ölçü ${customer.name} / ${project.name} projesine eklenecek. Ana malzeme: ${materialTypes[state.projectDefaultMaterial].label}.`
          : `${customer.name} için yeni bir proje oluşturulacak; proje adı, konumu ve ana malzemeyi seçin.`;
        renderProjectCustomerOptions();
        renderMeasurementBatch();
        renderAssignmentSummary();
      }

      function renderMeasurementBatch(message = &#x27;&#x27;) {
        const table = root.querySelector(&#x27;#d360-measure-list-table&#x27;);
        const count = root.querySelector(&#x27;#d360-measure-list-count&#x27;);
        const status = root.querySelector(&#x27;#d360-measure-list-status&#x27;);
        const openButton = root.querySelector(&#x27;#d360-open-measure-project&#x27;);
        const anotherButton = root.querySelector(&#x27;#d360-add-another-product&#x27;);
        if (!table || !count || !status || !openButton || !anotherButton) return;
        const project = projects.find(item =&gt; item.id === state.measureProjectId &amp;&amp; item.customerId === state.measureCustomerId);
        const items = project &amp;&amp; Array.isArray(project.items) ? project.items.map((item, index) =&gt; completeProjectItemTechnical(item, index)) : [];
        count.textContent = project ? `${items.length} ürün · ${projectItemCount(project)} adet` : &#x27;0 ürün&#x27;;
        openButton.disabled = !project;
        anotherButton.disabled = !project;
        if (!project) {
          table.innerHTML = `&lt;tr&gt;&lt;td colspan=&quot;5&quot; class=&quot;d360-empty&quot;&gt;${state.measureProjectId === &#x27;new&#x27; ? &#x27;İlk ölçüyü eklediğinizde yeni proje ve ölçü listesi birlikte oluşturulacak.&#x27; : &#x27;Önce müşteri ve proje seçin.&#x27;}&lt;/td&gt;&lt;/tr&gt;`;
          status.textContent = message || &#x27;İlk ürünü seçin, ölçüsünü ekleyin; sonra yeni ürün için ürün ekranına dönün.&#x27;;
          return;
        }
        table.innerHTML = items.length ? items.map((item, index) =&gt; {
          if (!item.id) item.id = makeId(&#x27;itm&#x27;);
          const technical = `${item.system} · ${item.material}${item.materialOverride ? &#x27; · ürüne özel&#x27; : &#x27; · proje ana malzemesi&#x27;} · ${item.glass}`;
          return `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(item.reference || `Ürün ${index + 1}`)}&lt;/strong&gt;&lt;/td&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(item.productName)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(technical)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${num.format(item.width)} × ${num.format(item.height)} mm&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${num.format(item.qty)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost text-destructive&quot; data-measure-remove=&quot;${item.id}&quot;&gt;Kaldır&lt;/button&gt;&lt;/td&gt;&lt;/tr&gt;`;
        }).join(&#x27;&#x27;) : &#x27;&lt;tr&gt;&lt;td colspan=&quot;5&quot; class=&quot;d360-empty&quot;&gt;Bu projede henüz ölçü yok. İlk kapı veya pencereyi ekleyin.&lt;/td&gt;&lt;/tr&gt;&#x27;;
        status.textContent = message || `${project.name} açık. “Yeni ürün ekle” ile ürün seçimine dönerek listeye devam edin.`;
      }

      function resolveMeasurementProject() {
        const customer = customers.find(item =&gt; item.id === state.measureCustomerId);
        if (!customer) return null;
        let project = projects.find(item =&gt; item.id === state.measureProjectId &amp;&amp; item.customerId === state.measureCustomerId);
        if (state.measureProjectId === &#x27;new&#x27;) {
          project = createProject({
            customerId: customer.id,
            name: root.querySelector(&#x27;#d360-measure-project-name&#x27;).value.trim(),
            location: root.querySelector(&#x27;#d360-measure-project-location&#x27;).value.trim(),
            status: &#x27;Ölçü alındı&#x27;,
            defaultMaterialId: root.querySelector(&#x27;#d360-project-default-material&#x27;).value || state.projectDefaultMaterial
          });
          if (project) state.measureProjectId = project.id;
        }
        return project || null;
      }

      function addQuickMeasurement() {
        if (!validateMeasurements()) return;
        const fitsSystem = state.width &lt;= systemRule(&#x27;maxWidth&#x27;, 12000) &amp;&amp; state.height &lt;= systemRule(&#x27;maxHeight&#x27;, 6000);
        renderSystemFitStatus();
        if (!fitsSystem) {
          root.querySelector(&#x27;#d360-measure-error&#x27;).textContent = &#x27;Bu ölçü seçilen profil sisteminin üretim sınırlarını aşıyor. Profil sistemini veya ölçüyü kontrol edin.&#x27;;
          return;
        }
        const customer = customers.find(item =&gt; item.id === state.measureCustomerId);
        const project = resolveMeasurementProject();
        if (!customer || !project) {
          root.querySelector(&#x27;#d360-measure-error&#x27;).textContent = &#x27;Proje oluşturulamadı. Müşteri ve proje bilgilerini kontrol edin.&#x27;;
          return;
        }
        const calc = calculate();
        const orderRows = currentMaterialRows(calc);
        const fieldPhoto = root.querySelector(&#x27;#d360-measure-photo&#x27;).files &amp;&amp; root.querySelector(&#x27;#d360-measure-photo&#x27;).files[0];
        project.items = Array.isArray(project.items) ? project.items : [];
        project.items.push({
          id: makeId(&#x27;itm&#x27;),
          measurementOnly: false,
          productId: state.selected,
          productName: selectedProduct().name,
          width: state.width,
          height: state.height,
          qty: state.qty,
          material: materialTypes[state.material].label,
          materialId: state.material,
          projectDefaultMaterialId: project.defaultMaterialId || state.projectDefaultMaterial,
          materialOverride: state.material !== (project.defaultMaterialId || state.projectDefaultMaterial),
          system: selectedSystem().name,
          systemId: state.systemId,
          glass: glassLabels[state.glass],
          glassId: state.glass,
          finish: finishLabels[state.finish],
          finishId: state.finish,
          operation: operationLabels[state.operation],
          operationId: state.operation,
          reference: root.querySelector(&#x27;#d360-measure-reference&#x27;).value.trim(),
          note: root.querySelector(&#x27;#d360-measure-note&#x27;).value.trim(),
          photoName: fieldPhoto ? fieldPhoto.name : &#x27;&#x27;,
          orderRows,
          total: calc.grandTotal,
          addedAt: new Date().toLocaleDateString(&#x27;tr-TR&#x27;)
        });
        project.status = &#x27;Ölçü alındı&#x27;;
        refreshProjectTotals(project);
        state.selectedProjectId = project.id;
        state.selectedCustomerId = customer.id;
        state.projectItems = project.products;
        root.querySelector(&#x27;#d360-project-badge&#x27;).textContent = `${project.name} · ${project.products} ürün`;
        root.querySelector(&#x27;#d360-measure-reference&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-note&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-photo&#x27;).value = &#x27;&#x27;;
        state.qty = 1;
        root.querySelector(&#x27;#d360-qty&#x27;).value = &#x27;1&#x27;;
        renderChoiceSummary();
        renderProjects();
        renderCustomers();
        renderMeasurementBatch(`${selectedProduct().name} listeye eklendi. Sıradaki kapı veya pencere için “Yeni ürün ekle”ye basın.`);
        persistData();
      }

      function startAnotherProduct() {
        setCurrentMaterial(activeProjectMaterial());
        state.category = &#x27;all&#x27;;
        state.search = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-product-search&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-error&#x27;).textContent = &#x27;&#x27;;
        renderCategories();
        renderProductGrid();
        showWizardStep(2);
        root.querySelector(&#x27;#d360-product-search&#x27;).focus();
      }

      function renderProjects() {
        projects.forEach(project =&gt; {
          if (!project.id) project.id = makeId(&#x27;prj&#x27;);
          const customer = customers.find(item =&gt; item.id === project.customerId);
          if (customer) project.customer = customer.name;
          refreshProjectTotals(project);
        });
        const rows = projects.length
          ? projects.map(project =&gt; `&lt;tr&gt;&lt;td&gt;&lt;code&gt;${escapeHtml(project.no)}&lt;/code&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(project.name)} · ${(materialTypes[project.defaultMaterialId] || materialTypes.pvc).label}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(project.customer || &#x27;—&#x27;)}&lt;/td&gt;&lt;td&gt;${escapeHtml(project.location || &#x27;—&#x27;)}&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${project.products}&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(project.status)}&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(project.total)}&lt;/td&gt;&lt;td&gt;&lt;div class=&quot;d360-action-cell&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-project-view=&quot;${project.id}&quot;&gt;Aç&lt;/button&gt;${canDeleteRecords() ? `&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost text-destructive&quot; data-project-delete=&quot;${project.id}&quot;&gt;Sil&lt;/button&gt;` : &#x27;&#x27;}&lt;/div&gt;&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)
          : &#x27;&lt;tr&gt;&lt;td colspan=&quot;7&quot; class=&quot;d360-empty&quot;&gt;Henüz proje yok. “Yeni proje” ile müşteri ve konum bilgilerini girerek başlayın.&lt;/td&gt;&lt;/tr&gt;&#x27;;
        root.querySelector(&#x27;#d360-project-table&#x27;).innerHTML = rows;
        root.querySelector(&#x27;#d360-project-create&#x27;).disabled = !customers.length || !canCreateProjectRecord();
        const recent = root.querySelector(&#x27;#d360-home-recent&#x27;);
        if (recent) {
          recent.innerHTML = projects.length
            ? projects.slice(0, 3).map(project =&gt; `&lt;div class=&quot;d360-home-project&quot;&gt;&lt;div&gt;&lt;strong&gt;${escapeHtml(project.name)}&lt;/strong&gt;&lt;div class=&quot;text-small text-muted&quot;&gt;${escapeHtml(project.customer || &#x27;Müşteri yok&#x27;)} · ${escapeHtml(project.location || &#x27;Konum yok&#x27;)}&lt;/div&gt;&lt;/div&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(project.status)}&lt;/span&gt;&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-role-project=&quot;${project.id}&quot;&gt;Aç&lt;/button&gt;&lt;/div&gt;`).join(&#x27;&#x27;)
            : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Henüz proje yok. İlk ölçünüzü aldığınızda proje burada görünecek.&lt;/div&gt;&#x27;;
        }
        renderProjectDetail();
        renderAssignmentOptions();
        renderRoleWorkspace();
        renderMembership();
        ensureIcons();
      }

      function customerProjects(customerId) {
        return projects.filter(project =&gt; project.customerId === customerId);
      }

      function deleteProject(projectId) {
        if (!canDeleteRecords()) {
          root.querySelector(&#x27;#d360-action-status&#x27;).textContent = &#x27;Çalışan rolü proje silemez.&#x27;;
          return;
        }
        const project = projects.find(item =&gt; item.id === projectId);
        if (!project) return;
        const customer = customers.find(item =&gt; item.id === project.customerId);
        const itemCount = (project.items || []).length;
        const productCount = projectItemCount(project);
        const confirmation = `${project.no} · ${project.name} projesini kalıcı olarak silmek istediğinize emin misiniz?\n\nMüşteri: ${customer ? customer.name : &#x27;Bağlı müşteri yok&#x27;}\n${itemCount} ölçü satırı · ${productCount} ürün ve bu projeye ait sipariş listesi silinecek.\n\nBu işlem geri alınamaz.`;
        if (!globalThis.confirm(confirmation)) return;
        const projectIndex = projects.findIndex(item =&gt; item.id === projectId);
        if (projectIndex &gt;= 0) projects.splice(projectIndex, 1);
        if (state.selectedProjectId === projectId) state.selectedProjectId = null;
        if (state.measureProjectId === projectId) {
          state.measureProjectId = &#x27;&#x27;;
          state.measureCustomerId = &#x27;&#x27;;
        }
        root.querySelector(&#x27;#d360-project-badge&#x27;).textContent = &#x27;Proje seçilmedi&#x27;;
        root.querySelector(&#x27;#d360-action-status&#x27;).textContent = `${project.name} projesi ve bağlı bütün ölçüleri kalıcı olarak silindi.`;
        renderProjects();
        renderCustomers();
        renderAssignmentOptions();
        persistData(true);
      }

      function deleteCustomer(customerId) {
        if (!canDeleteRecords()) {
          root.querySelector(&#x27;#d360-action-status&#x27;).textContent = &#x27;Çalışan rolü müşteri silemez.&#x27;;
          return;
        }
        const customer = customers.find(item =&gt; item.id === customerId);
        if (!customer) return;
        const linkedProjects = customerProjects(customerId);
        const detail = linkedProjects.length
          ? ` Bu müşteriye bağlı ${linkedProjects.length} proje ve içlerindeki bütün ölçüler de silinecek.`
          : &#x27;&#x27;;
        if (!globalThis.confirm(`${customer.name} müşterisini kalıcı olarak silmek istediğinize emin misiniz?${detail}\n\nİletişim bilgileri, proje kayıtları, ölçüler ve sipariş listeleri silinecek. Bu işlem geri alınamaz.`)) return;
        const deletedProjectIds = new Set(linkedProjects.map(project =&gt; project.id));
        for (let index = projects.length - 1; index &gt;= 0; index -= 1) if (projects[index].customerId === customerId) projects.splice(index, 1);
        customers.splice(customers.findIndex(item =&gt; item.id === customerId), 1);
        if (state.selectedCustomerId === customerId) state.selectedCustomerId = null;
        if (state.editingCustomerId === customerId) state.editingCustomerId = null;
        if (state.projectCustomerId === customerId) state.projectCustomerId = null;
        if (state.measureCustomerId === customerId) {
          state.measureCustomerId = &#x27;&#x27;;
          state.measureProjectId = &#x27;&#x27;;
        }
        if (deletedProjectIds.has(state.selectedProjectId)) state.selectedProjectId = null;
        toggleForm(&#x27;#d360-customer-form&#x27;, false);
        toggleForm(&#x27;#d360-customer-project-form&#x27;, false);
        renderCustomers();
        renderProjects();
        root.querySelector(&#x27;#d360-action-status&#x27;).textContent = `${customer.name} müşterisi ve bağlı kayıtları kalıcı olarak silindi.`;
        persistData(true);
      }

      function renderCustomers() {
        const contactAccess = canViewCustomerContact();
        const customerQuery = state.customerSearch.trim().toLocaleLowerCase(&#x27;tr-TR&#x27;);
        const visibleCustomers = customers.filter(customer =&gt; `${customer.name} ${contactAccess ? `${customer.phone} ${customer.email || &#x27;&#x27;}` : &#x27;&#x27;}`.toLocaleLowerCase(&#x27;tr-TR&#x27;).includes(customerQuery));
        root.querySelector(&#x27;#d360-new-customer&#x27;).hidden = !canManageCustomerRecord();
        root.querySelector(&#x27;#d360-show-quick-customer&#x27;).hidden = !canManageCustomerRecord();
        root.querySelector(&#x27;#d360-customer-result-count&#x27;).textContent = `${visibleCustomers.length} müşteri`;
        root.querySelector(&#x27;#d360-customer-table&#x27;).innerHTML = visibleCustomers.length ? visibleCustomers.map(customer =&gt; {
          if (!customer.status) customer.status = &#x27;Aktif&#x27;;
          return `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(customer.name)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${contactAccess ? escapeHtml(customer.email || &#x27;E-posta yok&#x27;) : &#x27;İletişim bilgisi yöneticiye özel&#x27;}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;${contactAccess ? escapeHtml(customer.phone) : &#x27;&lt;span class=&quot;viz-badge&quot;&gt;Gizli&lt;/span&gt;&#x27;}&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(customer.status)}&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;div class=&quot;d360-action-cell&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-customer-measure=&quot;${customer.id}&quot;&gt;&lt;i data-lucide=&quot;ruler&quot; aria-hidden=&quot;true&quot;&gt;&lt;/i&gt;Ölçü ekle&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-customer-view=&quot;${customer.id}&quot;&gt;Projeleri aç&lt;/button&gt;&lt;/div&gt;&lt;/td&gt;&lt;/tr&gt;`;
        }).join(&#x27;&#x27;) : `&lt;tr&gt;&lt;td colspan=&quot;4&quot; class=&quot;d360-empty&quot;&gt;${customers.length ? &#x27;Aradığınız müşteri bulunamadı. Yazımı kontrol edin veya yeni müşteri kaydedin.&#x27; : &#x27;Henüz müşteri yok. “Müşteri listede yok” düğmesiyle ilk kaydı oluşturun.&#x27;}&lt;/td&gt;&lt;/tr&gt;`;
        renderCustomerDetail();
        renderAssignmentOptions();
        renderMembership();
        ensureIcons();
      }

      function renderCustomerDetail() {
        const detail = root.querySelector(&#x27;#d360-customer-detail&#x27;);
        const customer = customers.find(item =&gt; item.id === state.selectedCustomerId);
        const editButton = root.querySelector(&#x27;#d360-detail-edit-customer&#x27;);
        const projectButton = root.querySelector(&#x27;#d360-detail-add-project&#x27;);
        const deleteButton = root.querySelector(&#x27;#d360-detail-delete-customer&#x27;);
        const manageCustomer = canManageCustomerRecord();
        editButton.disabled = !customer || !manageCustomer;
        projectButton.disabled = !customer || !canCreateProjectRecord();
        deleteButton.disabled = !customer || !canDeleteRecords();
        editButton.hidden = !manageCustomer;
        deleteButton.hidden = !canDeleteRecords();
        detail.hidden = !customer;
        if (!customer) return;
        root.querySelector(&#x27;#d360-customer-detail-name&#x27;).textContent = customer.name;
        root.querySelector(&#x27;#d360-customer-detail-contact&#x27;).textContent = canViewCustomerContact() ? `${customer.phone} · ${customer.email || &#x27;E-posta yok&#x27;} · ${customer.status || &#x27;Aktif&#x27;}` : `${customer.status || &#x27;Aktif&#x27;} · İletişim bilgileri yöneticiye özeldir`;
        const list = customerProjects(customer.id);
        root.querySelector(&#x27;#d360-customer-projects&#x27;).innerHTML = list.length
          ? `&lt;div class=&quot;table-responsive&quot;&gt;&lt;table class=&quot;table table-sm&quot;&gt;&lt;thead&gt;&lt;tr&gt;&lt;th&gt;Proje&lt;/th&gt;&lt;th&gt;Durum&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;Tutar&lt;/th&gt;&lt;th class=&quot;text-end&quot;&gt;İşlem&lt;/th&gt;&lt;/tr&gt;&lt;/thead&gt;&lt;tbody&gt;${list.map(project =&gt; `&lt;tr&gt;&lt;td&gt;${escapeHtml(project.name)}&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(project.location || &#x27;&#x27;)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(project.status)}&lt;/span&gt;&lt;/td&gt;&lt;td class=&quot;text-end&quot;&gt;${money.format(project.total)}&lt;/td&gt;&lt;td&gt;&lt;div class=&quot;d360-action-cell&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn btn-primary&quot; data-project-measure=&quot;${project.id}&quot;&gt;Ölçü ekle&lt;/button&gt;${canDeleteRecords() ? `&lt;button type=&quot;button&quot; class=&quot;btn btn-ghost text-destructive&quot; data-project-delete=&quot;${project.id}&quot;&gt;Sil&lt;/button&gt;` : &#x27;&#x27;}&lt;/div&gt;&lt;/td&gt;&lt;/tr&gt;`).join(&#x27;&#x27;)}&lt;/tbody&gt;&lt;/table&gt;&lt;/div&gt;`
          : &#x27;&lt;div class=&quot;d360-empty&quot;&gt;Bu müşteriye bağlı proje yok. “Proje ekle” ile başlayın.&lt;/div&gt;&#x27;;
      }

      function openCustomerForm(customerId) {
        const customer = customers.find(item =&gt; item.id === customerId);
        if (!canManageCustomerRecord() || (!customer &amp;&amp; !canCreateCustomerRecord())) {
          root.querySelector(&#x27;#d360-action-status&#x27;).textContent = membershipLimitMessage(&#x27;customer&#x27;);
          return;
        }
        state.editingCustomerId = customer ? customer.id : null;
        root.querySelector(&#x27;#d360-customer-form-title&#x27;).textContent = customer ? &#x27;Müşteri bilgilerini düzenle&#x27; : &#x27;Yeni müşteri ekle&#x27;;
        root.querySelector(&#x27;#d360-customer-name&#x27;).value = customer ? customer.name : &#x27;&#x27;;
        root.querySelector(&#x27;#d360-customer-phone&#x27;).value = customer ? customer.phone : &#x27;&#x27;;
        root.querySelector(&#x27;#d360-customer-email&#x27;).value = customer ? customer.email : &#x27;&#x27;;
        root.querySelector(&#x27;#d360-customer-status&#x27;).value = customer ? (customer.status || &#x27;Aktif&#x27;) : &#x27;Aktif&#x27;;
        root.querySelector(&#x27;#d360-save-customer&#x27;).textContent = customer ? &#x27;Değişiklikleri kaydet&#x27; : &#x27;Müşteriyi kaydet&#x27;;
        toggleForm(&#x27;#d360-customer-project-form&#x27;, false);
        toggleForm(&#x27;#d360-customer-form&#x27;, true, &#x27;#d360-customer-name&#x27;);
      }

      function openCustomerProjectForm(customerId) {
        const customer = customers.find(item =&gt; item.id === customerId);
        if (!customer) return;
        if (!canCreateProjectRecord()) {
          root.querySelector(&#x27;#d360-action-status&#x27;).textContent = membershipLimitMessage(&#x27;project&#x27;);
          return;
        }
        state.projectCustomerId = customer.id;
        state.selectedCustomerId = customer.id;
        root.querySelector(&#x27;#d360-project-form-title&#x27;).textContent = `${customer.name} için proje ekle`;
        root.querySelector(&#x27;#d360-project-name&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-project-location&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-project-material&#x27;).innerHTML = Object.entries(materialTypes).map(([id, material]) =&gt; `&lt;option value=&quot;${id}&quot;&gt;${escapeHtml(material.label)}&lt;/option&gt;`).join(&#x27;&#x27;);
        root.querySelector(&#x27;#d360-project-material&#x27;).value = &#x27;pvc&#x27;;
        root.querySelector(&#x27;#d360-project-status&#x27;).value = &#x27;Teklif hazırlanıyor&#x27;;
        root.querySelector(&#x27;#d360-project-total&#x27;).value = &#x27;0&#x27;;
        toggleForm(&#x27;#d360-customer-form&#x27;, false);
        toggleForm(&#x27;#d360-customer-project-form&#x27;, true, &#x27;#d360-project-name&#x27;);
        renderCustomerDetail();
      }

      function openStandaloneProjectForm() {
        if (!canCreateProjectRecord()) {
          root.querySelector(&#x27;#d360-action-status&#x27;).textContent = membershipLimitMessage(&#x27;project&#x27;);
          return;
        }
        renderProjectCustomerOptions();
        root.querySelector(&#x27;#d360-standalone-project-customer&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-standalone-project-name&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-standalone-project-location&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-standalone-project-material&#x27;).innerHTML = Object.entries(materialTypes).map(([id, material]) =&gt; `&lt;option value=&quot;${id}&quot;&gt;${escapeHtml(material.label)}&lt;/option&gt;`).join(&#x27;&#x27;);
        root.querySelector(&#x27;#d360-standalone-project-material&#x27;).value = state.projectDefaultMaterial;
        root.querySelector(&#x27;#d360-standalone-project-status&#x27;).value = &#x27;Ölçü bekliyor&#x27;;
        root.querySelector(&#x27;#d360-standalone-project-error&#x27;).textContent = customers.length ? &#x27;&#x27; : &#x27;Önce Müşteriler bölümünden müşteri ekleyin.&#x27;;
        toggleForm(&#x27;#d360-standalone-project-form&#x27;, true, customers.length ? &#x27;#d360-standalone-project-customer&#x27; : null);
      }

      function openMeasurementEntry(customerId, projectId = &#x27;new&#x27;) {
        if (!customers.some(customer =&gt; customer.id === customerId)) return;
        const projectExists = projects.some(project =&gt; project.id === projectId &amp;&amp; project.customerId === customerId);
        state.measureCustomerId = customerId;
        state.measureProjectId = projectExists ? projectId : &#x27;new&#x27;;
        const project = projects.find(item =&gt; item.id === projectId);
        state.projectDefaultMaterial = project &amp;&amp; materialTypes[project.defaultMaterialId] ? project.defaultMaterialId : &#x27;pvc&#x27;;
        setCurrentMaterial(state.projectDefaultMaterial);
        state.category = &#x27;all&#x27;;
        state.search = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-product-search&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-reference&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-note&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-photo&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-field-status&#x27;).textContent = &#x27;Fotoğraf isteğe bağlıdır; poz ve not proje ekibinin tamamı tarafından görülebilir.&#x27;;
        state.step = projectExists ? 2 : 1;
        state.maxStep = projectExists ? Math.max(state.maxStep, 2) : 1;
        root.querySelector(&#x27;#d360-measure-error&#x27;).textContent = &#x27;&#x27;;
        renderCategories();
        renderProductGrid();
        renderMeasurementModelOptions();
        renderAssignmentOptions();
        showPage(&#x27;catalog&#x27;);
        showWizardStep(projectExists ? 2 : 1);
      }

      function startNewMeasurement() {
        state.measureCustomerId = &#x27;&#x27;;
        state.measureProjectId = &#x27;&#x27;;
        state.projectDefaultMaterial = &#x27;pvc&#x27;;
        setCurrentMaterial(&#x27;pvc&#x27;);
        state.category = &#x27;all&#x27;;
        state.search = &#x27;&#x27;;
        state.step = 1;
        state.maxStep = 1;
        root.querySelector(&#x27;#d360-project-badge&#x27;).textContent = &#x27;Proje seçilmedi&#x27;;
        root.querySelector(&#x27;#d360-action-status&#x27;).textContent = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-reference&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-note&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-measure-photo&#x27;).value = &#x27;&#x27;;
        root.querySelector(&#x27;#d360-product-search&#x27;).value = &#x27;&#x27;;
        renderCategories();
        renderProductGrid();
        renderMeasurementModelOptions();
        renderAssignmentOptions();
        showPage(&#x27;catalog&#x27;);
        showWizardStep(1);
      }

      function renderTeam() {
        root.querySelector(&#x27;#d360-team-count&#x27;).textContent = `${1 + teamMembers.length} / ${limitLabel(activeMembership().loginLimit)} giriş`;
        root.querySelector(&#x27;#d360-team-table&#x27;).innerHTML = teamMembers.length
          ? teamMembers.map(member =&gt; {
            const role = roleDefinitions.find(item =&gt; item.id === member.roleId) || roleDefinitions[0];
            return `&lt;tr&gt;&lt;td&gt;&lt;strong&gt;${escapeHtml(member.name)}&lt;/strong&gt;&lt;div class=&quot;text-small&quot;&gt;${escapeHtml(member.email)}&lt;/div&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;viz-badge&quot;&gt;${escapeHtml(role.label)}&lt;/span&gt;&lt;/td&gt;&lt;td&gt;${escapeHtml(member.status)}&lt;/td&gt;&lt;td&gt;&lt;div class=&quot;d360-action-cell&quot;&gt;&lt;button type=&quot;button&quot; class=&quot;btn&quot; data-team-edit=&quot;${member.id}&quot;&gt;Düzenle&lt;/button&gt;&lt;button type=&quot;button&quot; class=&quot;btn text-destructive&quot; data-team-delete=&quot;${member.id}&quot;&gt;Kaldır&lt;/button&gt;&lt;/div&gt;&lt;/td&gt;&lt;/tr&gt;`;
          }).join(&#x27;&#x27;)
          : &#x27;&lt;tr&gt;&lt;td colspan=&quot;4&quot; class=&quot;d360-empty&quot;&gt;Henüz kullanıcı hesabı yok. İlk çalışanı ekleyip rolünü seçin.&lt;/td&gt;&lt;/tr&gt;&#x27;;

      function deleteSystem(systemId) {
        const system = systems.find(item =&gt; item.id === systemId);
        if (!system) return;
        if (system.id === &#x27;sys-generic&#x27;) {
          globalThis.alert(&#x27;Genel üretim kuralları güvenli yedek sistem olarak kullanılır. Bu sistem silinemez; kurallarını düzenleyebilirsiniz.&#x27;);
          return;
        }
        const affectedItems = [];
        projects.forEach(project =&gt; (project.items || []).forEach(item =&gt; {
          if (item.systemId === systemId) affectedItems.push({ project, item });
        }));
        const affectedQuantity = affectedItems.reduce((sum, entry) =&gt; sum + Math.max(1, Number(entry.item.qty) || 1), 0);
        const usageWarning = affectedItems.length
          ? `\n\nBu sistemi kullanan ${affectedItems.length} ölçü satırı ve ${affectedQuantity} ürün var. Bu kayıtlar silinmeyecek; malzemeye uygun başka bir profil sistemi otomatik atanıp maliyet ve sipariş listeleri yeniden hesaplanacak.`
          : &#x27;&#x27;;
        if (!globalThis.confirm(`${system.brand || &#x27;Özel sistem&#x27;} · ${system.name} profil sistemini kalıcı olarak silmek istediğinize emin misiniz?${usageWarning}\n\nBu işlem geri alınamaz.`)) return;
        const systemIndex = systems.findIndex(item =&gt; item.id === systemId);
        if (systemIndex &gt;= 0) systems.splice(systemIndex, 1);
        if (!state.deletedSystemIds.includes(systemId)) state.deletedSystemIds.push(systemId);
        affectedItems.forEach(({ item }) =&gt; {
          item.systemId = &#x27;&#x27;;
          item.system = &#x27;&#x27;;
          item.technicalSource = &#x27;system-delete-reassignment&#x27;;
          item.orderRows = [];
          item.total = 0;
          completeProjectItemTechnical(item);
        });
        [...new Set(affectedItems.map(entry =&gt; entry.project))].forEach(refreshProjectTotals);
        if (state.systemId === systemId) state.systemId = automaticSystemForItem(selectedProduct(), state.material).id;
        if (state.editingSystemId === systemId) {
          state.editingSystemId = null;
          state.systemDraftRules = [];
          toggleForm(&#x27;#d360-system-form&#x27;, false);
        }
        root.querySelector(&#x27;#d360-action-status&#x27;).textContent = `${system.name} profil sistemi kalıcı olarak silindi${affectedItems.length ? &#x27;; bağlı ürünler uygun sisteme geçirildi&#x27; : &#x27;&#x27;}.`;
        renderSystems();
        renderProjects();
        renderCustomers();
        renderConfigurator();
        persistData(true);
      }

      function renderSystems() {

        }).join(&#x27;&#x27;) : &#x27;&lt;tr&gt;&lt;td colspan=&quot;6&quot; class=&quot;d360-empty&quot;&gt;Bu filtrelere uygun sistem bulunamadı. Aramayı veya filtreleri temizleyin.&lt;/td&gt;&lt;/tr&gt;&#x27;;

      function validateMeasurements() {
        const customer = customers.find(item =&gt; item.id === state.measureCustomerId);
        const project = projects.find(item =&gt; item.id === state.measureProjectId &amp;&amp; item.customerId === state.measureCustomerId);
        const newName = root.querySelector(&#x27;#d360-measure-project-name&#x27;).value.trim();
        const newLocation = root.querySelector(&#x27;#d360-measure-project-location&#x27;).value.trim();
        const fields = [root.querySelector(&#x27;#d360-width&#x27;), root.querySelector(&#x27;#d360-height&#x27;), root.querySelector(&#x27;#d360-qty&#x27;)];
        const dimensionsValid = fields.every(field =&gt; field.checkValidity() &amp;&amp; field.value !== &#x27;&#x27;);
        let message = &#x27;&#x27;;
        if (!customer) message = &#x27;Önce bu ölçünün ait olduğu müşteriyi seçin.&#x27;;
        else if (state.measureProjectId === &#x27;new&#x27; &amp;&amp; (!newName || !newLocation)) message = &#x27;Yeni proje için proje adı ve konum / şantiye bilgisi girin.&#x27;;
        else if (state.measureProjectId !== &#x27;new&#x27; &amp;&amp; !project) message = &#x27;Mevcut bir proje seçin veya yeni proje oluşturun.&#x27;;
        else if (!dimensionsValid) message = &#x27;Ölçüleri kontrol edin: genişlik 300–12.000 mm, yükseklik 300–6.000 mm ve adet en az 1 olmalıdır.&#x27;;
        root.querySelector(&#x27;#d360-measure-error&#x27;).textContent = message;
        return !message;
      }

      function showWizardStep(step) {
        const target = clamp(step, 1, 5);
        if (target &gt; state.maxStep) return;
        state.step = target;
        root.querySelectorAll(&#x27;[data-step-panel]&#x27;).forEach(panel =&gt; { panel.hidden = Number(panel.dataset.stepPanel) !== target; });
        root.querySelectorAll(&#x27;[data-wizard-step]&#x27;).forEach(button =&gt; {
          const buttonStep = Number(button.dataset.wizardStep);
          const active = buttonStep === target || (buttonStep === 2 &amp;&amp; target === 3);
          button.disabled = buttonStep &gt; state.maxStep;
          button.classList.toggle(&#x27;btn-primary&#x27;, active);
          button.classList.toggle(&#x27;btn-ghost&#x27;, !active);
          if (active) button.setAttribute(&#x27;aria-current&#x27;, &#x27;step&#x27;);
          else button.removeAttribute(&#x27;aria-current&#x27;);
        });
        const visibleStep = target === 1 ? 1 : target &lt;= 3 ? 2 : target === 4 ? 3 : 4;
        root.querySelector(&#x27;#d360-wizard-counter&#x27;).textContent = `Adım ${visibleStep} / 4`;
        root.querySelector(&#x27;#d360-wizard-title&#x27;).textContent = wizardCopy[target].title;
        root.querySelector(&#x27;#d360-wizard-help&#x27;).textContent = wizardCopy[target].help;
        renderChoiceSummary();
        if (target &gt;= 4) renderConfigurator();
        if (target === 4) renderAllProduction();

      function advanceWizard(target) {
        if (target === 3 &amp;&amp; !validateMeasurements()) return;

          const project = projects.find(item =&gt; item.id === state.measureProjectId &amp;&amp; item.customerId === state.measureCustomerId);

            state.maxStep = Math.max(state.maxStep, 3);
            showWizardStep(3);
            return;
          }
          const fits = state.width &lt;= systemRule(&#x27;maxWidth&#x27;, 12000) &amp;&amp; state.height &lt;= systemRule(&#x27;maxHeight&#x27;, 6000);
          renderSystemFitStatus();

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
    const content = getContent(trigger);
    if (!trigger.isConnected || content.length === 0) {
      return;
    }
    clearOpenTimeout();
    if (activeTrigger === trigger) {
      return;
    }
    closeTooltip();
    const floating = getTooltip();
    floating.textContent = content;
    floating.style.visibility = &quot;hidden&quot;;
    floating.style.transform = &quot;translate(0, 0)&quot;;
    document.body.appendChild(floating);
    activeTrigger = trigger;
    setDescribedBy(trigger, true);
    autoUpdateCleanup = autoUpdate(trigger, floating, () =&gt; {
      updatePosition(trigger, floating);
    });
  };
  const requestOpen = (trigger, immediate = false) =&gt; {
    if (
      getContent(trigger).length === 0 ||
      activeTrigger === trigger ||
      pendingTrigger === trigger
    ) {
      return;
    }
    clearOpenTimeout();
    pendingTrigger = trigger;
    const delay =
      immediate || activeTrigger != null || Date.now() &lt; skipDelayUntil
        ? 0
        : hoverDelay;
    if (delay === 0) {
      openTooltip(trigger);
      return;
    }
    openTimeout = window.setTimeout(() =&gt; {
      openTimeout = null;
      pendingTrigger = null;
      openTooltip(trigger);
    }, delay);
  };
  const handlePointerOpen = (event) =&gt; {
    if (event.pointerType === &quot;touch&quot;) {
      return;
    }
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    requestOpen(trigger);
  };
  const handleLeave = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger == null || containsTarget(trigger, event.relatedTarget)) {
      return;
    }
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const handleFocusIn = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (trigger?.matches(&quot;:focus-visible&quot;)) {
      requestOpen(trigger, true);
    }
  };
  const handleKeyDown = (event) =&gt; {
    if (event.key === &quot;Escape&quot;) {
      closeTooltip();
    }
  };
  const handleContextMenu = (event) =&gt; {
    const trigger = getTrigger(event.target);
    if (activeTrigger === trigger || pendingTrigger === trigger) {
      closeTooltip();
    }
  };
  const destroy = () =&gt; {
    closeTooltip(false);
    document.removeEventListener(&quot;pointerover&quot;, handlePointerOpen);
    document.removeEventListener(&quot;pointerout&quot;, handleLeave);
    document.removeEventListener(&quot;focusin&quot;, handleFocusIn);
    document.removeEventListener(&quot;focusout&quot;, handleLeave);
    document.removeEventListener(&quot;keydown&quot;, handleKeyDown);
    document.removeEventListener(&quot;contextmenu&quot;, handleContextMenu);
    tooltip = null;
  };

  document.addEventListener(&quot;pointerover&quot;, handlePointerOpen);
  document.addEventListener(&quot;pointerout&quot;, handleLeave);
  document.addEventListener(&quot;focusin&quot;, handleFocusIn);
  document.addEventListener(&quot;focusout&quot;, handleLeave);
  document.addEventListener(&quot;keydown&quot;, handleKeyDown);
  document.addEventListener(&quot;contextmenu&quot;, handleContextMenu);
  window.addEventListener(&quot;pagehide&quot;, destroy, { once: true });
})();
&lt;/script&gt;
